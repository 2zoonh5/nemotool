<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMO TOOL</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mac-menu-bar">
        <div class="left-menu">
            <div class="nemo-logo-box" onclick="location.reload()">
                <div class="cube-dot"></div>
            </div>
            <span class="menu-item logo-text" onclick="location.reload()">NEMO TOOL</span>
            
            <div class="menu-wrapper">
                <span class="menu-item" onclick="toggleDropdown(event, 'settingsMenu')">설정</span>
                <div class="mac-dropdown" id="settingsMenu">
                    <div class="dropdown-item" onclick="showMacAlert('NEMO TOOL TEST Ver.', 'All rights reserved. 무단 전재 및 재배포 금지.\n본 프로그램의 소스 코드 및 디자인을 무단 복제, 배포하는 행위는 관련 법령에 의해 처벌받을 수 있습니다.')">이 프로그램 정보</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="location.reload()">시스템 재시작</div>
                </div>
            </div>

            <div class="menu-wrapper">
                <span class="menu-item" onclick="toggleDropdown(event, 'wallpaperMenu')">배경화면</span>
                <div class="mac-dropdown" id="wallpaperMenu">
                    <div class="dropdown-item" onclick="changeBg('aurora')">기본 오로라 퍼플</div>
                    <div class="dropdown-item" onclick="changeBg('sunset')">미드나잇 선셋 로즈</div>
                    <div class="dropdown-item" onclick="changeBg('cyber')">매트릭스 사이버 그린</div>
                    <div class="dropdown-item" onclick="changeBg('mojave')">모하비 골든 샌드</div>
                    <div class="dropdown-item" onclick="changeBg('aqua')">딥오션 아쿠아 블루</div>
                    <div class="dropdown-item" onclick="changeBg('sakura')">도쿄 사쿠라 핑크</div>
                    <div class="dropdown-item" onclick="changeBg('nebula')">인터스텔라 네뷸라</div>
                </div>
            </div>
        </div>
        
        <div class="right-menu">
            <div class="status-icons">
                <svg class="bar-svg" viewBox="0 0 24 24" onclick="toggleSystemPanel(event, 'spotlightPanel')"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <svg class="bar-svg" viewBox="0 0 24 24" onclick="toggleSystemPanel(event, 'controlPanel')"><path d="M12 9.17L16.83 14H7.17L12 9.17M12 5L4 13h16l-8-8z"/></svg>
            </div>
            <span class="menu-item clock" id="macClock">11:24 AM</span>
        </div>
    </div>

    <div class="mac-spotlight-window" id="spotlightPanel" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="앱 또는 폴더 검색" id="spotlightInput" oninput="searchDesktop(this.value)">
    </div>

    <div class="mac-control-center" id="controlPanel">
        <div class="cc-slider-box">
            <div class="cc-label-row"><span>🖥️ 디스플레이 투명도</span><span id="brightnessVal">100%</span></div>
            <input type="range" min="30" max="100" value="100" oninput="document.body.style.opacity = this.value/100; document.getElementById('brightnessVal').innerText = this.value + '%'">
        </div>
        <div class="cc-slider-box">
            <div class="cc-label-row"><span>🔊 사운드 볼륨</span><span id="volumeVal">50%</span></div>
            <input type="range" min="0" max="100" value="50" oninput="updateWebVolume(this.value)">
        </div>
    </div>

    <div class="desktop" id="desktopContainer">
        <div class="icon" data-folder="pubg">
            <img src="ico/pubg_icon.png" alt="PUBG Folder">
            <span class="icon-name">배틀그라운드</span>
        </div>
        <div class="icon" data-folder="lol">
            <img src="ico/lol_icon.png" alt="LoL Folder">
            <span class="icon-name">리그오브레전드</span>
        </div>
        <div class="icon" data-folder="sudden">
            <img src="ico/sa_icon.png" alt="Sudden Folder">
            <span class="icon-name">서든어택</span>
        </div>
    </div>

    <div class="window-popup" id="folderWindow">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn disabled" id="folderBackBtn">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn" id="folderForwardBtn" onclick="forwardToApp()">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title" id="folderTitle">폴더</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('folderWindow')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('folderWindow')"></button>
                <button class="window-btn close-btn" onclick="closeFolder()"></button>
            </div>
        </div>
        <div class="window-body folder-content" id="folderContent"></div>
    </div>

    <div class="window-popup app-window" id="pubg-gacha-Window" data-icon="ico/p_gacha_icon.png">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn" onclick="backToFolder('pubg-gacha-Window')">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn disabled">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title">가챠머신</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('pubg-gacha-Window')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('pubg-gacha-Window')"></button>
                <button class="window-btn close-btn" onclick="closeApp('pubg-gacha-Window')"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="pubg-gacha.html" frameborder="0"></iframe>
        </div>
    </div>

    <div class="window-popup app-window" id="lol-memo-Window" data-icon="ico/l_memo_icon.png">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn" onclick="backToFolder('lol-memo-Window')">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn disabled">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title">롤모장</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('lol-memo-Window')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('lol-memo-Window')"></button>
                <button class="window-btn close-btn" onclick="closeApp('lol-memo-Window')"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="lol-memo.html" frameborder="0"></iframe>
        </div>
    </div>

    <div class="window-popup app-window" id="sa-memo-Window" data-icon="ico/s_memo_icon.png">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn" onclick="backToFolder('sa-memo-Window')">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn disabled">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title">서모장</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('sa-memo-Window')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('sa-memo-Window')"></button>
                <button class="window-btn close-btn" onclick="closeApp('sa-memo-Window')"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="sa-memo.html" frameborder="0"></iframe>
        </div>
    </div>

    <div class="window-popup app-window" id="pubg-bingo-Window" data-icon="ico/p_bingo_icon.png">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn" onclick="backToFolder('pubg-bingo-Window')">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn disabled">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title">빙고판</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('pubg-bingo-Window')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('pubg-bingo-Window')"></button>
                <button class="window-btn close-btn" onclick="closeApp('pubg-bingo-Window')"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="pubg-bingo.html" frameborder="0"></iframe>
        </div>
    </div>

    <div class="mac-dock-container active">
        <div class="mac-dock">
            <div id="fixedDockList" style="display: flex; gap: 14px;"></div>
            <div class="dock-divider"></div>
            <div id="minimizedList" style="display: flex; gap: 14px;"></div>
        </div>
    </div>

    <div class="desktop-footer-copyright">
        Copyright 2026. NEMO TOOL All rights reserved. 본 프로그램의 소스 코드 및 디자인 무단 복제, 전재 및 재배포 엄금.
    </div>

    <div class="mac-alert-overlay" id="macAlertOverlay" onclick="closeMacAlert()">
        <div class="mac-alert-modal" onclick="event.stopPropagation()">
            <div class="mac-alert-msg-main" id="macAlertMain">제목</div>
            <div class="mac-alert-msg-sub" id="macAlertSub">내용</div>
            <div class="mac-alert-btn-container">
                <button class="mac-alert-btn confirm" onclick="closeMacAlert()">확인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
