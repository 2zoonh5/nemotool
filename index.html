<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네모의 게임 매니저 OS</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🖥️ Mac OS 스타일 초정밀 상단바 -->
    <div class="mac-menu-bar">
        <div class="left-menu">
            <div class="nemo-logo-box" onclick="location.reload()">
                <div class="cube-dot"></div>
            </div>
            <span class="menu-item logo-text" onclick="location.reload()">NEMO TOOL</span>
            
            <div class="menu-wrapper">
                <span class="menu-item" onclick="toggleDropdown(event, 'settingsMenu')">시스템 설정</span>
                <div class="mac-dropdown" id="settingsMenu">
                    <div class="dropdown-item" onclick="alert('NEMO TOOL OS v1.5.0\nPerfect Mac OS Replication')">이 프로그램 정보</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="location.reload()">시스템 재시동</div>
                </div>
            </div>

            <div class="menu-wrapper">
                <span class="menu-item" onclick="toggleDropdown(event, 'wallpaperMenu')">배경화면</span>
                <div class="mac-dropdown" id="wallpaperMenu">
                    <div class="dropdown-item" onclick="changeBg('aurora')">기본 오로라 퍼플</div>
                    <div class="dropdown-item" onclick="changeBg('sunset')">미드나잇 선셋 로즈</div>
                    <div class="dropdown-item" onclick="changeBg('cyber')">매트릭스 사이버 그린</div>
                </div>
            </div>
        </div>
        
        <div class="right-menu">
            <div class="status-icons">
                <!-- 🔍 Spotlight 검색 버튼 -->
                <svg class="bar-svg" viewBox="0 0 24 24" onclick="toggleSystemPanel(event, 'spotlightPanel')"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <!-- 🎛️ 제어 센터 버튼 -->
                <svg class="bar-svg" viewBox="0 0 24 24" onclick="toggleSystemPanel(event, 'controlPanel')"><path d="M12 9.17L16.83 14H7.17L12 9.17M12 5L4 13h16l-8-8z"/></svg>
            </div>
            <!-- Mac OS 순정 서식 시계 -->
            <span class="menu-item clock" id="macClock">목 7월 2일 오전 11:17</span>
        </div>
    </div>

    <!-- 🔍 실시간 작동형 가상 스포트라이트 검색창 -->
    <div class="mac-spotlight-window" id="spotlightPanel">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="NEMO OS 검색" id="spotlightInput" onkeyup="searchDesktop(this.value)">
    </div>

    <!-- 🎛️ 실시간 작동형 가상 제어 센터 패널 -->
    <div class="mac-control-center" id="controlPanel">
        <div class="cc-row">
            <div class="cc-tile active" onclick="alert('Wi-Fi 커넥션 정상')">
                <div class="cc-icon">📡</div>
                <div class="cc-text"><span class="cc-title">Wi-Fi</span><span class="cc-sub">NEMO_5G</span></div>
            </div>
            <div class="cc-tile active" onclick="alert('블루투스 기기 탐색 중')">
                <div class="cc-icon">⚡</div>
                <div class="cc-text"><span class="cc-title">Bluetooth</span><span class="cc-sub">켬</span></div>
            </div>
        </div>
        <div class="cc-slider-box">
            <label>디스플레이 밝기</label>
            <input type="range" min="10" max="100" value="90" oninput="document.body.style.opacity = this.value/100">
        </div>
        <div class="cc-slider-box">
            <label>사운드 음량</label>
            <input type="range" min="0" max="100" value="70">
        </div>
    </div>

    <!-- 바탕화면 -->
    <div class="desktop">
        <div class="icon" data-folder="pubg">
            <img src="https://cdn-icons-png.flaticon.com/512/3408/3408506.png" alt="PUBG Folder">
            <span class="icon-name">배틀그라운드</span>
        </div>
        <div class="icon" data-folder="lol">
            <img src="https://cdn-icons-png.flaticon.com/512/825/825590.png" alt="LoL Folder">
            <span class="icon-name">롤모장</span>
        </div>
        <div class="icon" data-folder="sudden">
            <img src="https://cdn-icons-png.flaticon.com/512/5750/5750226.png" alt="Sudden Folder">
            <span class="icon-name">서든어택</span>
        </div>
    </div>

    <!-- 폴더 창 -->
    <div class="window-popup" id="folderWindow">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn disabled" id="folderBackBtn">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn" id="folderForwardBtn" onclick="forwardToApp()">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title" id="folderTitle">폴더</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('folderWindow')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('folderWindow')"></button>
                <button class="window-btn close-btn" onclick="closeFolder()"></button>
            </div>
        </div>
        <div class="window-body folder-content" id="folderContent"></div>
    </div>

    <!-- 프로그램 창 -->
    <div class="window-popup" id="appWindow">
        <div class="window-header">
            <div class="nav-buttons">
                <button class="nav-btn back-btn" onclick="backToFolder()">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="nav-btn forward-btn disabled">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
            <span class="window-title" id="windowTitle">프로그램</span>
            <div class="mac-buttons">
                <button class="window-btn minimize-btn" onclick="minimizeWindow('appWindow')"></button>
                <button class="window-btn maximize-btn" onclick="toggleMaximize('appWindow')"></button>
                <button class="window-btn close-btn" onclick="closeApp()"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe id="appFrame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <!-- ⚓ [전면 보완] 텅 빈 허전함을 지운 진짜 Mac OS 고정형 DOCK 바 캐리어 -->
    <div class="mac-dock-container active">
        <div class="mac-dock">
            <!-- 고정 상주 기본 앱 섹션 -->
            <div class="dock-item" onclick="openFolder('lol')">
                <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png">
                <span class="dock-tooltip">Finder (폴더 탐색기)</span>
            </div>
            <div class="dock-item" onclick="alert('Safari 브라우저 실행')">
                <img src="https://cdn-icons-png.flaticon.com/512/825/825455.png">
                <span class="dock-tooltip">Safari</span>
            </div>
            <div class="dock-item" onclick="toggleDropdown(event, 'settingsMenu')">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <span class="dock-tooltip">시스템 환경설정</span>
            </div>
            
            <!-- 실선 분할 구분선 구분자 고증 -->
            <div class="dock-divider"></div>
            
            <!-- 최소화된 동적 창 아이콘이 실시간 적재되는 구역 -->
            <div id="minimizedList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
