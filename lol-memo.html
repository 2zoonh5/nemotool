<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>롤모장</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

    :root {
      --bg-main: #0f0f12;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-soft: rgba(255, 255, 255, 0.018);
      --border: rgba(255, 255, 255, 0.08);
      --blue: #0a84ff;
      --red: #ff453a;
      --yellow: #ffd60a;
      --text: #f5f5f7;
      --muted: #8e8e93;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 34px 22px;
      background:
        radial-gradient(circle at 50% -20%, rgba(10, 132, 255, 0.11), transparent 36%),
        var(--bg-main);
      color: var(--text);
      font-family: "Noto Sans KR", sans-serif;
      user-select: none;
    }

    button,
    input,
    select {
      font-family: inherit;
    }

    .container {
      width: min(1250px, 100%);
      margin: 0 auto;
    }

    .mac-app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2px 0 18px;
      position: relative;
    }

    .mac-app-header::before {
      content: "";
      width: 108px;
      height: 32px;
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.17),
        rgba(255, 255, 255, 0.025)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 12px 28px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .mac-app-header h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 32px;
      background: linear-gradient(180deg, #ffffff 0%, #d1d1d6 52%, #8e8e93 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 7px rgba(255, 255, 255, 0.13));
    }

    .app-content {
      display: grid;
      grid-template-columns: minmax(350px, 430px) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .setup-box,
    .result-container {
      min-height: 520px;
      height: 520px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .setup-box {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
    }

    .mode-panel-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.016);
    }

    .form-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .mac-select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      outline: none;
      padding: 7px 28px 7px 10px;
      color: #fff;
      background-color: rgba(255, 255, 255, 0.055);
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 9px center;
      background-size: 10px;
      appearance: none;
      -webkit-appearance: none;
      font-size: 12px;
      font-weight: 700;
    }

    .mac-select option {
      color: #fff;
      background: #1c1c1e;
    }

    .input-table-sheet {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1fr 58px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.01);
    }

    .table-row.fixed-row {
      border-color: rgba(255, 214, 10, 0.09);
      background: rgba(255, 214, 10, 0.012);
    }

    .table-row input {
      width: 100%;
      padding: 4px;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      outline: none;
      color: #fff;
      background: transparent;
      text-align: center;
      font-size: 14px;
    }

    .table-row input:focus {
      border-bottom-color: var(--blue);
    }

    .table-row input::placeholder {
      color: #55555a;
    }

    .vs-divider {
      padding: 3px 0;
      border: 1px solid rgba(255, 255, 255, 0.025);
      border-radius: 5px;
      color: #77777d;
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
      font-size: 10px;
      font-weight: 700;
    }

    .fixed-row .vs-divider {
      color: rgba(255, 214, 10, 0.72);
      background: rgba(255, 214, 10, 0.04);
    }

    .btn-container {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn-reset,
    .btn-assign {
      height: 48px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.18s ease;
    }

    .btn-reset {
      flex: 0.75;
      border: 1px solid var(--border);
      color: #e5e5ea;
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-assign {
      flex: 1.25;
      border: 1px solid rgba(10, 132, 255, 0.38);
      color: var(--blue);
      background: rgba(10, 132, 255, 0.1);
      font-weight: 700;
      box-shadow: 0 0 18px rgba(10, 132, 255, 0.14);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.11);
    }

    .btn-assign:hover {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 8px 22px rgba(10, 132, 255, 0.32);
    }

    .result-container {
      overflow: hidden;
      min-width: 0;
    }

    .result-scroll-core {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .table-wrapper-binder {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: max-content;
      min-width: 100%;
      margin: 0;
      padding: 0;
    }

    .no-result {
      width: 100%;
      color: #53535a;
      text-align: center;
    }

    .no-result h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
    }

    .set-table {
      width: 220px;
      min-width: 220px;
      table-layout: fixed;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.25);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.28);
    }

    .set-table col.col-lane {
      width: 44px;
    }

    .set-table col.col-team {
      width: 88px;
    }

    .set-table th.set-title {
      height: 43px;
      padding: 0 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: #fff;
      background: rgba(255, 255, 255, 0.025);
      font-size: 14px;
    }

    .set-table th.sub-hdr {
      height: 32px;
      padding: 0 4px;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      color: #a1a1a6;
      font-size: 11px;
      font-weight: 700;
      line-height: 32px;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .set-table td {
      height: 42px;
      padding: 8px 4px;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .set-table tr:last-child td {
      border-bottom: 0;
    }

    .set-table td.lane-cell {
      color: #99999f;
      background: rgba(255, 255, 255, 0.008);
      border-right: 1px solid rgba(255, 255, 255, 0.025);
      font-size: 11px;
      font-weight: 700;
    }

    .hdr-blue {
      color: #fff !important;
      background: rgba(10, 132, 255, 0.52) !important;
    }

    .hdr-red {
      color: #fff !important;
      background: rgba(255, 69, 58, 0.52) !important;
    }

    .cell-blue {
      background: rgba(10, 132, 255, 0.035);
    }

    .cell-red {
      background: rgba(255, 69, 58, 0.035);
    }

    .clickable-swap-row {
      position: relative;
      cursor: pointer;
      transition:
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .clickable-swap-row:hover {
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.045),
        inset 0 -1px 0 rgba(255, 255, 255, 0.025);
    }

    .clickable-swap-row:hover td:first-child {
      color: #d1d1d6;
    }

    .clickable-swap-row.selected-token {
      background: linear-gradient(
        90deg,
        rgba(10, 132, 255, 0.22),
        rgba(10, 132, 255, 0.08)
      ) !important;
      box-shadow:
        inset 3px 0 0 #0a84ff,
        inset 0 1px 0 rgba(255, 255, 255, 0.13),
        inset 0 -1px 0 rgba(10, 132, 255, 0.3),
        0 0 18px rgba(10, 132, 255, 0.18);
    }

    .clickable-swap-row.selected-token td {
      color: #fff !important;
    }

    .clickable-swap-row.selected-token .lane-cell {
      color: #64d2ff !important;
    }

    .support-disabled-row {
      position: relative;
      cursor: not-allowed;
      opacity: 0.42;
      background: rgba(255, 214, 10, 0.012);
    }

    .support-disabled-row:hover {
      background: rgba(255, 214, 10, 0.025);
    }

    .support-disabled-row td {
      color: rgba(255, 255, 255, 0.56) !important;
    }

    .support-disabled-row .lane-cell {
      color: rgba(255, 214, 10, 0.72) !important;
    }

    .lock-icon {
      display: inline-flex;
      margin-left: 3px;
      color: rgba(255, 214, 10, 0.9);
      font-size: 11px;
      vertical-align: 1px;
    }

    .mac-alert-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
    }

    .mac-alert-modal {
      width: 280px;
      padding: 20px 16px 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      background: rgba(30, 30, 30, 0.8);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
      text-align: center;
      backdrop-filter: blur(25px);
    }

    .mac-alert-msg-main {
      margin-bottom: 4px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .mac-alert-msg-sub {
      margin-bottom: 16px;
      color: #aaaab0;
      font-size: 11.5px;
      line-height: 1.45;
    }

    .mac-alert-btn-container {
      display: flex;
      gap: 8px;
    }

    .mac-alert-btn {
      flex: 1;
      padding: 8px 0;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
    }

    .mac-alert-btn.cancel {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .mac-alert-btn.confirm {
      color: #fff;
      background: var(--blue);
    }

    @media (max-width: 900px) {
      body {
        padding: 22px 14px;
      }

      .app-content {
        grid-template-columns: 1fr;
      }

      .setup-box,
      .result-container {
        height: auto;
        min-height: 520px;
      }

      .result-scroll-core {
        align-items: flex-start;
        justify-content: flex-start !important;
        padding: 18px;
      }

      .table-wrapper-binder {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="mac-app-header">
      <h1>롤모장</h1>
    </div>

    <div class="mac-alert-overlay" id="macAlertOverlay">
      <div class="mac-alert-modal">
        <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
        <div class="mac-alert-msg-sub" id="macAlertSub"></div>
        <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
      </div>
    </div>

    <div class="app-content">
      <section class="setup-box">
        <div class="mode-panel-row">
          <div class="form-row">
            <span class="form-label">게임 모드</span>
            <select class="mac-select" disabled>
              <option selected>소환사의 협곡</option>
            </select>
          </div>

          <div class="form-row">
            <span class="form-label">경기 형식</span>
            <select id="gameMode" class="mac-select" onchange="pushInputsToFirebase()">
              <option value="Bo1">Bo1</option>
              <option value="Bo3" selected>Bo3</option>
              <option value="Bo5">Bo5</option>
            </select>
          </div>
        </div>

        <div class="input-table-sheet">
          <div class="table-row">
            <input id="p1_0" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
            <div class="vs-divider">VS</div>
            <input id="p2_0" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
          </div>
          <div class="table-row">
            <input id="p1_1" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
            <div class="vs-divider">VS</div>
            <input id="p2_1" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
          </div>
          <div class="table-row">
            <input id="p1_2" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
            <div class="vs-divider">VS</div>
            <input id="p2_2" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
          </div>
          <div class="table-row">
            <input id="p1_3" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
            <div class="vs-divider">VS</div>
            <input id="p2_3" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
          </div>
          <div class="table-row fixed-row">
            <input id="p1_4" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
            <div class="vs-divider">서폿고정</div>
            <input id="p2_4" type="text" placeholder="닉네임" oninput="pushInputsToFirebase()" />
          </div>
        </div>

        <div class="btn-container">
          <button class="btn-reset" onclick="askRollmojangReset()">초기화</button>
          <button class="btn-assign" onclick="runRollmojangAssignment()">팀 배정</button>
        </div>
      </section>

      <section class="result-container">
        <div class="result-scroll-core">
          <div class="table-wrapper-binder" id="tableWrapperBinder">
            <div class="no-result">
              <h3>배정 결과가 여기에 표시됩니다.</h3>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
      };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database().ref("nemo_lol_memo_session");

    let globalResultData = null;
    let isOperating = false;

    let selectedRowElement = null;
    let selectedSetIndex = null;
    let selectedLineIndex = null;

    function openMacAlert(title, subText, type = "alert", confirmCallback = null) {
      const overlay = document.getElementById("macAlertOverlay");
      const titleEl = document.getElementById("macAlertTitle");
      const subEl = document.getElementById("macAlertSub");
      const btnBox = document.getElementById("macAlertBtnBox");

      titleEl.textContent = title;
      subEl.textContent = subText;
      btnBox.innerHTML = "";

      const close = () => {
        overlay.style.display = "none";
      };

      if (type === "confirm") {
        const cancel = document.createElement("button");
        cancel.className = "mac-alert-btn cancel";
        cancel.textContent = "취소";
        cancel.onclick = close;

        const confirm = document.createElement("button");
        confirm.className = "mac-alert-btn confirm";
        confirm.textContent = "확인";
        confirm.onclick = async () => {
          close();
          if (confirmCallback) await confirmCallback();
        };

        btnBox.append(cancel, confirm);
      } else {
        const ok = document.createElement("button");
        ok.className = "mac-alert-btn confirm";
        ok.textContent = "확인";
        ok.onclick = close;
        btnBox.appendChild(ok);
      }

      overlay.style.display = "flex";
    }

    function clearSwapSelection() {
      if (selectedRowElement) {
        selectedRowElement.classList.remove("selected-token");
      }

      selectedRowElement = null;
      selectedSetIndex = null;
      selectedLineIndex = null;
    }

    function renderEmptyResult() {
      document.getElementById("tableWrapperBinder").innerHTML = `
        <div class="no-result">
          <h3>배정 결과가 여기에 세트별로 표시됩니다.</h3>
        </div>
      `;
    }

    function getInputs() {
      return Array.from({ length: 5 }, (_, index) => ({
        p1: document.getElementById(`p1_${index}`).value.trim(),
        p2: document.getElementById(`p2_${index}`).value.trim()
      }));
    }

    function pushInputsToFirebase() {
      if (isOperating) return;

      db.update({
        gameMode: document.getElementById("gameMode").value,
        inputs: getInputs()
      }).catch(console.error);
    }

    function localHardResetUI() {
      for (let i = 0; i < 5; i++) {
        document.getElementById(`p1_${i}`).value = "";
        document.getElementById(`p2_${i}`).value = "";
      }

      document.getElementById("gameMode").value = "Bo3";
      globalResultData = null;
      clearSwapSelection();
      renderEmptyResult();
    }

    db.on("value", (snapshot) => {
      const data = snapshot.val();

      isOperating = true;

      if (!data) {
        localHardResetUI();
        isOperating = false;
        return;
      }

      if (Array.isArray(data.inputs)) {
        data.inputs.forEach((item, index) => {
          document.getElementById(`p1_${index}`).value = item?.p1 || "";
          document.getElementById(`p2_${index}`).value = item?.p2 || "";
        });
      }

      if (data.gameMode) {
        document.getElementById("gameMode").value = data.gameMode;
      }

      if (Array.isArray(data.results) && data.results.length) {
        globalResultData = data.results;
        clearSwapSelection();
        renderResultTables(data.results);
      } else {
        globalResultData = null;
        clearSwapSelection();
        renderEmptyResult();
      }

      isOperating = false;
    });

    function askRollmojangReset() {
      openMacAlert(
        "라인업 초기화",
        "입력한 닉네임과 배정 결과를 모두 삭제할까요?",
        "confirm",
        async () => {
          try {
            isOperating = true;

            await db.set({
              gameMode: "Bo3",
              inputs: Array.from({ length: 5 }, () => ({ p1: "", p2: "" })),
              results: null
            });

            localHardResetUI();
          } catch (error) {
            console.error(error);
            openMacAlert("초기화 실패", "저장 중 오류가 발생했습니다.", "alert");
          } finally {
            isOperating = false;
          }
        }
      );
    }

    function shuffle(array) {
      const copied = [...array];

      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }

      return copied;
    }

    function runRollmojangAssignment() {
      const inputs = getInputs();

      if (inputs.some((item) => !item.p1 || !item.p2)) {
        openMacAlert("배정 실패", "모든 닉네임을 입력해주세요.", "alert");
        return;
      }

      const gameMode = document.getElementById("gameMode").value;
      const totalSets = gameMode === "Bo5" ? 5 : gameMode === "Bo3" ? 3 : 1;
      const lanes = ["탑", "정글", "미드", "원딜", "서폿"];

      const pairs = inputs.map((item, index) => ({
        p1: item.p1.slice(0, 4),
        p2: item.p2.slice(0, 4),
        isFixed: index === 4
      }));

      const fixedPair = pairs[4];
      const flexiblePairs = shuffle(pairs.slice(0, 4));

      const results = [];

      for (let setIndex = 0; setIndex < totalSets; setIndex++) {
        const shuffledFlexible = setIndex === 0
          ? flexiblePairs
          : shuffle(flexiblePairs);

        const setPairs = [...shuffledFlexible, fixedPair];

        results.push({
          setIndex,
          lines: setPairs.map((pair, laneIndex) => {
            const blueFirst = Math.random() < 0.5;

            return {
              lane: lanes[laneIndex],
              blue: blueFirst ? pair.p1 : pair.p2,
              red: blueFirst ? pair.p2 : pair.p1,
              isFixed: laneIndex === 4
            };
          })
        });
      }

      db.update({
        gameMode,
        inputs: pairs.map((pair) => ({ p1: pair.p1, p2: pair.p2 })),
        results
      }).catch((error) => {
        console.error(error);
        openMacAlert("팀 배정 실패", "결과 저장 중 오류가 발생했습니다.", "alert");
      });
    }

    function renderResultTables(results) {
      const binder = document.getElementById("tableWrapperBinder");
      binder.innerHTML = "";

      results.forEach((setObj, setIndex) => {
        const isBlueFirst = setObj.setIndex % 2 === 0;

        const firstHeader = isBlueFirst ? "블루팀" : "레드팀";
        const secondHeader = isBlueFirst ? "레드팀" : "블루팀";

        const firstHeaderClass = isBlueFirst ? "hdr-blue" : "hdr-red";
        const secondHeaderClass = isBlueFirst ? "hdr-red" : "hdr-blue";

        const firstCellClass = isBlueFirst ? "cell-blue" : "cell-red";
        const secondCellClass = isBlueFirst ? "cell-red" : "cell-blue";

        const table = document.createElement("table");
        table.className = "set-table";

        let html = `
          <colgroup>
            <col class="col-lane">
            <col class="col-team">
            <col class="col-team">
          </colgroup>
          <thead>
            <tr>
              <th colspan="3" class="set-title">${setObj.setIndex + 1}세트</th>
            </tr>
            <tr>
              <th class="sub-hdr">라인</th>
              <th class="sub-hdr ${firstHeaderClass}">${firstHeader}</th>
              <th class="sub-hdr ${secondHeaderClass}">${secondHeader}</th>
            </tr>
          </thead>
          <tbody>
        `;

        setObj.lines.forEach((lineObj, lineIndex) => {
          const rowClass = lineObj.isFixed
            ? "support-disabled-row"
            : "clickable-swap-row";

          const firstPlayer = isBlueFirst ? lineObj.blue : lineObj.red;
          const secondPlayer = isBlueFirst ? lineObj.red : lineObj.blue;

          html += `
            <tr
              class="${rowClass}"
              data-set-index="${setIndex}"
              data-line-index="${lineIndex}"
            >
              <td class="lane-cell">
                ${lineObj.lane}
              </td>
              <td class="${firstCellClass}">${firstPlayer}</td>
              <td class="${secondCellClass}">${secondPlayer}</td>
            </tr>
          `;
        });

        html += "</tbody>";
        table.innerHTML = html;

        table.querySelectorAll(".clickable-swap-row").forEach((row) => {
          row.addEventListener("click", () => {
            triggerRowTokenSelection(
              row,
              Number(row.dataset.setIndex),
              Number(row.dataset.lineIndex)
            );
          });
        });

        binder.appendChild(table);
      });
    }

    function triggerRowTokenSelection(element, setIndex, lineIndex) {
      if (!globalResultData?.[setIndex]) return;

      const clickedLine = globalResultData[setIndex].lines[lineIndex];

      if (!clickedLine || clickedLine.isFixed) return;

      if (!selectedRowElement) {
        selectedRowElement = element;
        selectedSetIndex = setIndex;
        selectedLineIndex = lineIndex;
        element.classList.add("selected-token");
        return;
      }

      if (selectedSetIndex !== setIndex) {
        clearSwapSelection();

        selectedRowElement = element;
        selectedSetIndex = setIndex;
        selectedLineIndex = lineIndex;
        element.classList.add("selected-token");
        return;
      }

      if (selectedLineIndex === lineIndex) {
        clearSwapSelection();
        return;
      }

      const nextResults = JSON.parse(JSON.stringify(globalResultData));
      const lines = nextResults[setIndex].lines;

      const first = selectedLineIndex;
      const second = lineIndex;

      const firstPair = {
        blue: lines[first].blue,
        red: lines[first].red
      };

      lines[first].blue = lines[second].blue;
      lines[first].red = lines[second].red;

      lines[second].blue = firstPair.blue;
      lines[second].red = firstPair.red;

      globalResultData = nextResults;
      clearSwapSelection();

      db.update({ results: nextResults }).catch((error) => {
        console.error(error);
        openMacAlert("라인 교체 실패", "변경 내용을 저장하지 못했습니다.", "alert");
      });
    }
  </script>
</body>
</html>
