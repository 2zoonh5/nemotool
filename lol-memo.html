<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤모장</title>
    
    <!-- 🔥 Firebase SDK 라이브러리 탑재 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 🎨 프리미엄 서체 바인딩 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        :root {
            --bg-main: #0c0c0e;
            --bg-glass-active: rgba(255, 255, 255, 0.04);
            --bg-glass-passive: rgba(255, 255, 255, 0.015);
            --border-glass: rgba(255, 255, 255, 0.06);
            --mac-blue: #007aff;
            --mac-blue-hover: #148cff;
            --mac-red: #ff453a;
            --text-gray: #8e8e93;
            --text-dim: #aeaeb2;
        }
        
        body {
            background: var(--bg-main); color: #d1d1d6; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            margin: 0; padding: 40px 24px; overflow-y: auto; box-sizing: border-box;
            min-height: 100vh; user-select: none; position: relative;
        }

        .network-badge { 
            position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; 
            font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.3); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

        .container {
            max-width: 1250px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px; z-index: 10;
        }

        .mac-app-header { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 5px; width: 100%; }
        .mac-app-header h1 { font-size: 36px; font-weight: 700; color: #ffffff; margin: 0; letter-spacing: 4px; background: linear-gradient(180deg, #ffffff 0%, #b5b5b7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 12px rgba(255,255,255,0.06)); }

        .app-content {
            display: grid; grid-template-columns: minmax(360px, 420px) 1fr; gap: 24px; align-items: stretch; width: 100%;
        }

        .setup-box {
            background: var(--bg-glass-active); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; backdrop-filter: blur(30px); box-sizing: border-box;
            height: 100%;
        }
        
        .mode-panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* 🛠️ 게임 모드, 경기 형식 내부 요소 수직 중앙 정렬 배치 마감 */
        .form-row { 
            background: rgba(255,255,255,0.015); border: 1px solid var(--border-glass);
            border-radius: 10px; padding: 8px 14px 10px 14px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; gap: 3px; height: 54px;
        }
        .form-label { font-size: 11px; font-weight: 700; color: #8e8e93; letter-spacing: -0.1px; line-height: 1; }
        
        .mac-select {
            background: rgba(255,255,255,0.05); color: #ffffff !important; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px; padding: 4px 24px 4px 10px; font-size: 12.5px; font-weight: 700; outline: none; cursor: pointer; width: 100%; box-sizing: border-box; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 10px;
            line-height: 1.2;
        }
        .mac-select:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
        .mac-select option { background: #1c1c1e; color: #ffffff !important; }

        /* 🛠️ 명단 상하 간격 비율(10px / 24px) 정밀 등간격 정렬 */
        .input-table-sheet { 
            display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto;
            margin-top: 10px; margin-bottom: 24px;
        }
        
        .table-row {
            display: grid; grid-template-columns: 1fr 60px 1fr; gap: 12px; align-items: center;
            background: rgba(255, 255, 255, 0.008); border: 1px solid rgba(255,255,255,0.03);
            padding: 10px 14px; border-radius: 12px; box-sizing: border-box;
        }
        .table-row.fixed-row { background: rgba(255, 214, 10, 0.006); border-color: rgba(255, 214, 10, 0.04); }

        .table-row input[type="text"] {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.06); color: #fff; font-size: 14px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; font-weight: 500; text-align: center;
        }
        .table-row input[type="text"]::placeholder { color: #48484a; font-weight: 400; font-size: 11.5px; letter-spacing: -0.3px; }
        .table-row input[type="text"]:focus { border-bottom-color: var(--mac-blue); }
        
        .vs-divider { text-align: center; font-size: 11px; font-weight: 700; color: #636366; background: rgba(255,255,255,0.03); padding: 3px 0; border-radius: 5px; border: 1px solid rgba(255,255,255,0.01); letter-spacing: 0.5px; }
        .fixed-row .vs-divider { color: rgba(255, 214, 10, 0.6); background: rgba(255, 214, 10, 0.04); }

        .btn-container { display: flex; gap: 14px; width: 100%; flex-shrink: 0; } 
        .btn-reset { flex: 0.7; height: 46px; background: rgba(255, 255, 255, 0.04); color: #e5e5ea; border: 1px solid var(--border-glass); border-radius: 23px; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-sizing: border-box; }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }

        .btn-assign {
            flex: 1.3; height: 46px; background: rgba(0, 122, 255, 0.08); color: #007aff; border: 1px solid rgba(0, 122, 255, 0.35); border-radius: 23px; font-weight: 700; font-size: 14.5px; cursor: pointer; letter-spacing: 0.2px; transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); white-space: nowrap; box-sizing: border-box; box-shadow: 0 0 20px rgba(0, 122, 255, 0.15);
        }
        .btn-assign:hover:not(:disabled) { background: var(--mac-blue); color: #ffffff; border-color: var(--mac-blue); transform: translateY(-1px); }
        .btn-assign:disabled { background: rgba(255,255,255,0.02); color: #48484a; border-color: rgba(255,255,255,0.05); box-shadow: none; cursor: not-allowed; }

        .result-container {
            background: var(--bg-glass-passive); border: 1px solid var(--border-glass);
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); backdrop-filter: blur(30px); box-sizing: border-box;
            height: 100%; min-height: 520px; overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }
        
        /* 🛠️ 창 가로 최소화 시 1세트 좌측 찌그러짐을 영구 방지하는 flex-start 강제 보정 기하 레이아웃 */
        .result-scroll-core {
            width: 100%; flex: 1; padding: 40px 24px 12px 24px; box-sizing: border-box;
            display: flex; gap: 20px; overflow-x: auto; overflow-y: hidden;
            align-items: flex-start; justify-content: flex-start;
        }

        /* 테이블 래퍼 묶음에 패딩 레프트를 확보하여 아이콘이 왼쪽 프레임 뒤로 짤리는 현상 완벽 조치 */
        .table-wrapper-binder {
            display: flex; gap: 20px; align-items: flex-start; justify-content: flex-start; min-height: 100%; min-width: max-content; margin: 0 auto;
            padding-left: 4px; box-sizing: border-box;
        }

        .result-scroll-core::-webkit-scrollbar { height: 6px; }
        .result-scroll-core::-webkit-scrollbar-track { background: transparent; }
        .result-scroll-core::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

        .no-result { color: #8e8e93; margin: auto; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; }
        .no-result h3 { font-size: 14px; font-weight: 500; color: #48484a; }

        .set-table {
            border-collapse: collapse; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); 
            border-radius: 12px; overflow: hidden; width: 220px; min-width: 220px; flex: 0 0 auto; box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            transition: opacity 0.3s ease;
        }
        
        .result-container.confirmed-locked .set-table { opacity: 0.65; }

        .set-table th.set-title { background-color: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 10px; font-size: 14px; font-weight: 700; text-align: center; color: #ffffff; letter-spacing: 0.5px; }
        .set-table th.sub-hdr { font-size: 11px; font-weight: 700; padding: 0 4px; height: 32px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #8e8e93; text-transform: uppercase; vertical-align: middle; line-height: 32px; box-sizing: border-box; }
        
        .clickable-swap-row { cursor: pointer; }
        .clickable-swap-row:hover { background: rgba(255, 255, 255, 0.03); }
        
        /* 🛠️ 1번 해결: 스왑기능 클릭 시 외형을 해치던 파란색 상하좌우 테두리선(outline/border/box-shadow) 완벽 삭제 */
        .clickable-swap-row.selected-token {
            background: rgba(0, 122, 255, 0.12) !important;
        }

        body.lock-system-active .clickable-swap-row { cursor: default !important; }
        body.lock-system-active .clickable-swap-row:hover { background: transparent !important; }

        .set-table td {
            padding: 10px 4px; text-align: center; font-size: 16px; height: 42px; 
            border-bottom: 1px solid rgba(255,255,255,0.015); color: #ffffff !important; font-weight: 500;
            width: 88px; max-width: 88px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            letter-spacing: -0.2px; box-sizing: border-box; vertical-align: middle;
            transition: opacity 0.2s ease, background-color 0.2s ease;
        }
        .set-table tr:last-child td { border-bottom: none; }
        
        .set-table td.lane-cell {
            background: rgba(255, 255, 255, 0.005); width: 44px; max-width: 44px; border-right: 1px solid rgba(255,255,255,0.015);
            height: 42px; padding: 0; box-sizing: border-box; vertical-align: middle; text-align: center;
        }
        .lane-icon { width: 22px; height: 22px; object-fit: contain; display: inline-block; vertical-align: middle; opacity: 0.85; }

        .hdr-blue { background: rgba(0, 122, 255, 0.5) !important; color: #ffffff !important; }
        .hdr-red { background: rgba(255, 69, 58, 0.5) !important; color: #ffffff !important; }
        
        .cell-blue { background: rgba(0, 122, 255, 0.03) !important; }
        .cell-red { background: rgba(255, 69, 58, 0.03) !important; }

        .text-mac-fade-pulse { opacity: 0.2 !important; background-color: rgba(255, 255, 255, 0.05) !important; }

        .result-action-tray {
            width: 100%; padding: 12px 24px 34px 24px; box-sizing: border-box;
            display: flex; justify-content: center; flex-shrink: 0; margin-top: auto;
        }
        .btn-confirm-lock {
            width: 200px; height: 44px; background: rgba(52, 199, 89, 0.1); color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.4); border-radius: 22px; font-weight: 700;
            font-size: 14px; letter-spacing: 0.3px; cursor: pointer; transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.08); display: none;
        }
        .btn-confirm-lock:hover:not(:disabled) { background: #34c759; color: #ffffff; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(52, 199, 89, 0.25); }
        .btn-confirm-lock:disabled { background: rgba(255,255,255,0.01) !important; color: #48484a !important; border-color: rgba(255,255,255,0.04) !important; box-shadow: none !important; cursor: not-allowed; transform: none !important; }

        .mac-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .mac-alert-modal {
            background: rgba(30, 30, 30, 0.85); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 14px; 
            width: 380px; max-width: 90vw; padding: 20px 24px; text-align: left; box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; flex-direction: column; gap: 6px; 
            animation: macPop 0.2s cubic-bezier(0.25, 1, 0.5, 1); box-sizing: border-box;
        }
        @keyframes macPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #aeaeb2; margin-bottom: 16px; line-height: 1.5; white-space: pre-line; }
        .mac-alert-btn-container { display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
        .mac-alert-btn { min-width: 76px; padding: 6px 16px; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; font-family: inherit; }
        .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mac-alert-btn.cancel:hover { background: rgba(255, 255, 255, 0.15); }
        .mac-alert-btn.confirm { background: #007aff; color: #ffffff; }
        .mac-alert-btn.confirm:hover { background: #148cff; }
    </style>
</head>
<body>

  <div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>

<div class="container">
    <div class="mac-app-header">
        <h1>롤모장</h1>
    </div>

    <div class="mac-alert-overlay" id="macAlertOverlay">
        <div class="mac-alert-modal">
            <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
            <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
            <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
        </div>
    </div>

    <div class="app-content">
        <!-- 좌측 보드 -->
        <div class="setup-box">
            <div class="mode-panel-row">
                <div class="form-row"><span class="form-label">게임 모드</span><select id="mapMode" class="mac-select" disabled><option selected>소환사의 협곡</option></select></div>
                <div class="form-row"><span class="form-label">경기 형식</span><select id="gameMode" class="mac-select" onchange="pushInputsToFirebase()"><option value="Bo1">Bo1</option><option value="Bo3" selected>Bo3</option><option value="Bo5">Bo5</option></select></div>
            </div>

            <div class="input-table-sheet">
                <div class="table-row"><input type="text" id="p1_0" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"><div class="vs-divider">VS</div><input type="text" id="p2_0" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"></div>
                <div class="table-row"><input type="text" id="p1_1" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"><div class="vs-divider">VS</div><input type="text" id="p2_1" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"></div>
                <div class="table-row"><input type="text" id="p1_2" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"><div class="vs-divider">VS</div><input type="text" id="p2_2" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"></div>
                <div class="table-row"><input type="text" id="p1_3" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"><div class="vs-divider">VS</div><input type="text" id="p2_3" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"></div>
                <div class="table-row fixed-row"><input type="text" id="p1_4" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"><div class="vs-divider">서폿고정</div><input type="text" id="p2_4" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()"></div>
            </div>

            <div class="btn-container">
                <button class="btn btn-reset" onclick="askRollmojangReset()">초기화</button>
                <button class="btn btn-assign" id="assignBtn" onclick="runRollmojangAssignment()">팀 배정</button>
            </div>
        </div>

        <!-- 우측 결과 보드 -->
        <div class="result-container" id="resultContainer">
            <div class="result-scroll-core" id="resultScrollCore">
                <div class="table-wrapper-binder" id="tableWrapperBinder">
                    <div class="no-result"><h3>배정 결과가 여기에 세트별로 표시됩니다.</h3></div>
                </div>
            </div>
            <div class="result-action-tray">
                <button class="btn-confirm-lock" id="confirmLockBtn" onclick="triggerLineupLock()">라인업 확정</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_lol_memo_session");
    
    var globalResultData = null; 
    var isOperating = false;
    var globalLockState = false;

    var selectedRowElement = null;
    var selectedSetIndex = null;
    var selectedLineIndex = null;
    var laneIconMap = { "탑": "top.png", "정글": "jg.png", "미드": "mid.png", "원딜": "adc.png", "서폿": "sp.png" };

    function openMacAlert(title, subText, type, onConfirm) {
        const overlay = document.getElementById("macAlertOverlay");
        document.getElementById("macAlertTitle").innerText = title;
        document.getElementById("macAlertSub").innerText = subText;
        const btnBox = document.getElementById("macAlertBtnBox");
        btnBox.innerHTML = "";

        if (type === "confirm") {
            const cancelBtn = document.createElement("button");
            cancelBtn.className = "mac-alert-btn cancel";
            cancelBtn.innerText = "취소";
            cancelBtn.onclick = () => { overlay.style.display = "none"; };
            
            const confirmBtn = document.createElement("button");
            confirmBtn.className = "mac-alert-btn confirm";
            confirmBtn.innerText = "확인";
            confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
            
            btnBox.appendChild(cancelBtn);
            btnBox.appendChild(confirmBtn);
        } else {
            const alertBtn = document.createElement("button");
            alertBtn.className = "mac-alert-btn confirm";
            alertBtn.innerText = "확인";
            alertBtn.onclick = () => { overlay.style.display = "none"; };
            btnBox.appendChild(alertBtn);
        }
        overlay.style.display = "flex";
    }

    function pushInputsToFirebase() {
        if (isOperating || globalLockState) return;
        let inputs = [];
        for (let i = 0; i < 5; i++) {
            inputs.push({ p1: document.getElementById(`p1_${i}`).value.trim(), p2: document.getElementById(`p2_${i}`).value.trim() });
        }
        db.update({ inputs: inputs, gameMode: document.getElementById("gameMode").value });
    }

    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) { localHardResetUI(); return; }
        isOperating = true;
        globalLockState = data.isConfirmed || false;
        
        const assignBtn = document.getElementById("assignBtn");
        const confirmLockBtn = document.getElementById("confirmLockBtn");
        const resultContainer = document.getElementById("resultContainer");

        if (globalLockState) {
            document.body.className = "lock-system-active";
            assignBtn.disabled = true;
            confirmLockBtn.disabled = true;
            resultContainer.classList.add("confirmed-locked");
        } else {
            document.body.className = "swap-mode-inactive";
            assignBtn.disabled = false;
            confirmLockBtn.disabled = false;
            resultContainer.classList.remove("confirmed-locked");
        }

        if (data.inputs) {
            data.inputs.forEach((item, idx) => {
                if(document.getElementById(`p1_${idx}`).value !== item.p1) document.getElementById(`p1_${idx}`).value = item.p1;
                if(document.getElementById(`p2_${idx}`).value !== item.p2) document.getElementById(`p2_${idx}`).value = item.p2;
            });
        }
        if (data.gameMode) {
            document.getElementById("gameMode").value = data.gameMode;
        }

        if (data.results) {
            globalResultData = data.results;
            renderResultTables(data.results);
            confirmLockBtn.style.display = "block";
        } else {
            globalResultData = null;
            document.getElementById("tableWrapperBinder").innerHTML = `
                <div class="no-result"><h3>배정 결과가 여기에 세트별로 표시됩니다.</h3></div>`;
            confirmLockBtn.style.display = "none";
        }
        isOperating = false;
    });

    function triggerLineupLock() {
        if (globalLockState || !globalResultData) return;
        openMacAlert("라인업 최종 확정", "현재 세트 결과로 매칭을 최종 확정하시겠습니까?\n확정 후 초기화 전까지 재배정이 불가합니다.", "confirm", () => {
            db.update({ isConfirmed: true });
        });
    }

    function askRollmojangReset() {
        openMacAlert("라인업 초기화", "입력창의 모든 닉네임 명단과 세트 매칭 결과를 삭제하시겠습니까?", "confirm", () => {
            db.update({
                gameMode: "Bo3",
                inputs: [ {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""} ],
                results: null,
                isConfirmed: false
            });
        });
    }

    function localHardResetUI() {
        for(let i=0; i<5; i++) { document.getElementById(`p1_${i}`).value = ""; document.getElementById(`p2_${i}`).value = ""; }
        document.getElementById("tableWrapperBinder").innerHTML = '<div class="no-result"><h3>배정 결과가 여기에 세트별로 표시됩니다.</h3></div>';
        selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
        globalLockState = false;
        document.body.className = "swap-mode-inactive";
        document.getElementById("assignBtn").disabled = false;
        document.getElementById("confirmLockBtn").style.display = "none";
        document.getElementById("resultContainer").classList.remove("confirmed-locked");
    }

    function customShuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    /* ⭐ 100% 원본 지그재그 교차 무작위 분할 알고리즘 완벽 복구 장착 */
    function runRollmojangAssignment() {
        if (globalLockState) return;
        for (let i = 0; i < 5; i++) {
            let p1Val = document.getElementById(`p1_${i}`).value.trim();
            let p2Val = document.getElementById(`p2_${i}`).value.trim();
            if (!p1Val || !p2Val) {
                openMacAlert("배정 실패", "참가자 닉네임이 모두 입력되지 않았습니다.", "alert");
                return;
            }
            if (p1Val.length > 4) document.getElementById(`p1_${i}`).value = p1Val.slice(0, 4);
            if (p2Val.length > 4) document.getElementById(`p2_${i}`).value = p2Val.slice(0, 4);
        }

        const gameMode = document.getElementById("gameMode").value;
        let totalSets = 1;
        if (gameMode === "Bo1") totalSets = 1;
        if (gameMode === "Bo3") totalSets = 3;
        if (gameMode === "Bo5") totalSets = 5;

        const rawData = [];
        for (let i = 0; i < 5; i++) {
            rawData.push([
                document.getElementById(`p1_${i}`).value.trim().slice(0, 4),
                "",
                document.getElementById(`p2_${i}`).value.trim().slice(0, 4)
            ]);
        }

        let fixedPositions = Array(5).fill(null);
        let flexiblePairs = [];

        for (let i = 0; i < rawData.length; i++) {
            let pairInfo = { p1: rawData[i][0], p2: rawData[i][2] };
            if (i === 4) {
                fixedPositions[i] = pairInfo; 
            } else {
                flexiblePairs.push(pairInfo); 
            }
        }

        customShuffleArray(flexiblePairs);

        let firstSetPairs = [];
        let flexIndex = 0;
        for (let j = 0; j < 5; j++) {
            if (fixedPositions[j] !== null) {
                firstSetPairs.push(fixedPositions[j]);
            } else {
                firstSetPairs.push(flexiblePairs[flexIndex]);
                flexIndex++;
            }
        }

        let establishedMatchups = [];
        for (let k = 0; k < firstSetPairs.length; k++) {
            let isLineFixed = (k === 4);
            let bPlayer = firstSetPairs[k].p1;
            let rPlayer = firstSetPairs[k].p2;

            if (Math.random() < 0.5) {
                establishedMatchups.push({ id: k, blue: bPlayer, red: rPlayer, isFixed: isLineFixed, history: [] });
            } else {
                establishedMatchups.push({ id: k, blue: rPlayer, red: bPlayer, isFixed: isLineFixed, history: [] });
            }
        }

        let serializedResults = [];

        for (let set = 0; set < totalSets; set++) {
            let blueResult = Array(5).fill(null);
            let redResult = Array(5).fill(null);

            if (set === 0) {
                for (let m = 0; m < 5; m++) {
                    blueResult[m] = establishedMatchups[m].blue;
                    redResult[m] = establishedMatchups[m].red;
                    establishedMatchups[m].history.push(m);
                }
            } else {
                let flexMatchups = [];
                let flexLineIndices = [];

                for (let m = 0; m < 5; m++) {
                    if (establishedMatchups[m].isFixed) {
                        blueResult[m] = establishedMatchups[m].blue;
                        redResult[m] = establishedMatchups[m].red;
                        establishedMatchups[m].history.push(m);
                    } else {
                        flexMatchups.push(establishedMatchups[m]);
                        flexLineIndices.push(m);
                    }
                }

                let matchSuccess = false;
                for (let attempt = 0; attempt < 100; attempt++) {
                    customShuffleArray(flexMatchups);
                    let hasOverlap = false;

                    for (let idx = 0; idx < flexMatchups.length; idx++) {
                        let currentLine = flexLineIndices[idx];
                        let currentGroup = flexMatchups[idx];

                        if (currentGroup.history.indexOf(currentLine) !== -1) {
                            hasOverlap = true;
                            break;
                        }
                    }
                    if (!hasOverlap) {
                        matchSuccess = true;
                        break;
                    }
                }

                for (let idx = 0; idx < flexMatchups.length; idx++) {
                    let targetLine = flexLineIndices[idx];
                    let finalGroup = flexMatchups[idx];

                    blueResult[targetLine] = finalGroup.blue;
                    redResult[targetLine] = finalGroup.red;
                    finalGroup.history.push(targetLine);
                }
            }

            let setLineArray = [];
            let laneNames = ["탑", "정글", "미드", "원딜", "서폿"];
            for(let r=0; r<5; r++) {
                setLineArray.push({
                    lane: laneNames[r],
                    blue: blueResult[r],
                    red: redResult[r],
                    isFixed: (r === 4)
                });
            }
            serializedResults.push({ setIndex: set, lines: setLineArray });
        }

        db.update({ results: serializedResults, isConfirmed: false });
    }

    function renderResultTables(results) {
        const binder = document.getElementById("tableWrapperBinder"); binder.innerHTML = "";
        results.forEach((setObj, sIdx) => {
            const table = document.createElement("table"); table.className = "set-table";
            let blueLeader = results[0].lines[4].blue, redLeader = results[0].lines[4].red;
            
            let teamAHdrClass = (setObj.setIndex % 2 === 0) ? "hdr-blue" : "hdr-red";
            let teamBHdrClass = (setObj.setIndex % 2 === 0) ? "hdr-red" : "hdr-blue";
            let teamACellClass = (setObj.setIndex % 2 === 0) ? "cell-blue" : "cell-red";
            let teamBCellClass = (setObj.setIndex % 2 === 0) ? "cell-red" : "cell-blue";

            let teamAName = (setObj.setIndex % 2 === 0) ? `${blueLeader}팀` : `${redLeader}팀`;
            let teamBName = (setObj.setIndex % 2 === 0) ? `${redLeader}팀` : `${blueLeader}팀`;

            let html = `<thead><tr><th colspan="3" class="set-title">${setObj.setIndex + 1}세트</th></tr>
                <tr><th class="sub-hdr" style="text-align:center;">라인</th><th class="sub-hdr ${teamAHdrClass}" style="text-align:center;">${teamAName}</th>
                <th class="sub-hdr ${teamBHdrClass}" style="text-align:center;">${teamBName}</th></tr></thead><tbody>`;
            
            setObj.lines.forEach((line, lIdx) => {
                let rowClass = line.isFixed ? "disabled-fixed-row" : "clickable-swap-row";
                let isSelected = (selectedSetIndex === sIdx && selectedLineIndex === lIdx);
                if (isSelected && !line.isFixed) rowClass += " selected-token";

                html += `<tr class="${rowClass}" onclick="triggerRowTokenSelection(this, ${sIdx}, ${lIdx})">
                    <td class="lane-cell"><img src="${laneIconMap[line.lane]}" class="lane-icon"></td>
                    <td class="${teamACellClass}" id="text-blue-${sIdx}-${lIdx}">${line.blue}</td><td class="${teamBCellClass}" id="text-red-${sIdx}-${lIdx}">${line.red}</td></tr>`;
            });
            table.innerHTML = html + "</tbody>"; binder.appendChild(table);
        });

        const scrollCore = document.getElementById("resultScrollCore");
        if (results.length >= 4 || window.innerWidth < 1024 || window.innerHeight < 640) {
            scrollCore.style.justifyContent = "flex-start";
            scrollCore.style.alignItems = "flex-start";
        } else {
            scrollCore.style.justifyContent = "center";
            scrollCore.style.alignItems = "center";
        }
    }

    function triggerRowTokenSelection(element, setIdx, lineDocsIdx) {
        if (globalLockState) return;
        if (globalResultData && globalResultData[setIdx]) {
            let linesArray = globalResultData[setIdx].lines;
            if (linesArray[lineDocsIdx].isFixed) return;
        }

        if (selectedRowElement && selectedSetIndex !== setIdx) {
            selectedRowElement.classList.remove("selected-token");
            selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
        }

        if (!selectedRowElement) {
            selectedRowElement = element; selectedSetIndex = setIdx; selectedLineIndex = lineDocsIdx;
            element.classList.add("selected-token");
        } else {
            let f = selectedLineIndex, s = lineDocsIdx;
            if (f === s) {
                element.classList.remove("selected-token");
                selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
                return;
            }

            if (globalResultData && globalResultData[setIdx]) {
                let d = globalResultData[setIdx].lines;
                if (d[f].isFixed || d[s].isFixed) {
                    selectedRowElement.classList.remove("selected-token");
                    selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
                    return;
                }

                let bText1 = document.getElementById(`text-blue-${setIdx}-${f}`);
                let rText1 = document.getElementById(`text-red-${setIdx}-${f}`);
                let bText2 = document.getElementById(`text-blue-${setIdx}-${s}`);
                let rText2 = document.getElementById(`text-red-${setIdx}-${s}`);

                if(bText1 && rText1 && bText2 && rText2) {
                    bText1.classList.add("text-mac-fade-pulse");
                    rText1.classList.add("text-mac-fade-pulse");
                    bText2.classList.add("text-mac-fade-pulse");
                    rText2.classList.add("text-mac-fade-pulse");
                }

                setTimeout(() => {
                    [d[f].blue, d[s].blue] = [d[s].blue, d[f].blue];
                    [d[f].red, d[s].red] = [d[s].red, d[f].red];

                    selectedRowElement.classList.remove("selected-token");
                    element.classList.remove("selected-token");
                    selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;

                    db.update({ results: globalResultData });
                }, 200);
            }
        }
    }
</script>
