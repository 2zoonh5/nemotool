<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤모장</title>
    
    <!-- 🔥 Firebase SDK 라이브러리 탑재 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 🎨 프리미엄 서체 바인딩 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        :root {
            --bg-main: #0f0f12;
            --bg-glass-active: rgba(255, 255, 255, 0.04);
            --bg-glass-passive: rgba(255, 255, 255, 0.015);
            --border-glass: rgba(255, 255, 255, 0.06);
            --mac-blue: #007aff;
            --mac-red: #ff453a;
        }
        
        body {
            background: var(--bg-main); color: #d1d1d6; font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 24px; overflow: hidden; box-sizing: border-box;
            height: 100vh; min-height: 100vh; user-select: none; position: relative;
        }

        .network-badge { 
            position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; 
            font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.3); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

        .container {
            max-width: 1250px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }

        .mac-app-header {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; flex-shrink: 0;
        }
        .mac-app-header h1 {
            font-size: 34px; font-weight: 700; color: #ffffff; margin: 0; letter-spacing: 4px; 
            background: linear-gradient(180deg, #ffffff 0%, #b5b5b7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.06));
        }

        .app-content {
            display: grid; grid-template-columns: minmax(360px, 420px) 1fr; gap: 24px; align-items: stretch; width: 100%; flex: 1; min-height: 0;
        }

        /* 🛠️ 1번 해결: 불필요한 강제 내부 연장을 배제하고 정갈하게 컴팩트 핏 레이아웃으로 변경 */
        .setup-box {
            background: var(--bg-glass-active); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; backdrop-filter: blur(30px); box-sizing: border-box;
            height: 100%; min-height: 0;
        }
        
        .mode-panel-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; box-sizing: border-box; flex-shrink: 0;
            margin-bottom: 16px;
        }
        .form-row { 
            display: flex; flex-direction: column; gap: 6px;
            background: rgba(255,255,255,0.015); border-radius: 10px; padding: 10px 14px; 
            border: 1px solid var(--border-glass); box-sizing: border-box; 
        }
        .form-label { font-size: 11px; font-weight: 700; color: #8e8e93; letter-spacing: -0.1px; }
        
        .mac-select {
            background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px; padding: 6px 24px 6px 10px; font-size: 12.5px; font-weight: 700; outline: none; 
            cursor: pointer; transition: background 0.15s; font-family: inherit; width: 100%; box-sizing: border-box;
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 10px;
        }
        .mac-select:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
        .mac-select option { background: #1c1c1e; color: #fff; }
        .mac-select:disabled { cursor: default; opacity: 0.7; }

        /* 🛠️ 1번 해결: 공백 대란의 원인이던 내부 오토 익스팬션을 막고 하단 버튼 유도를 위한 마진 배치 */
        .input-table-sheet { 
            display: flex; flex-direction: column; width: 100%; overflow-y: auto; padding-right: 4px;
            margin-bottom: 24px;
        }
        
        .table-row {
            display: grid; grid-template-columns: 1fr 60px 1fr; gap: 12px; align-items: center;
            background: rgba(255, 255, 255, 0.008); border: 1px solid rgba(255,255,255,0.03);
            padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box;
            flex-shrink: 0;
        }
        .table-row:last-child { margin-bottom: 0; }
        .table-row.fixed-row { background: rgba(255, 214, 10, 0.006); border-color: rgba(255, 214, 10, 0.04); }

        .table-row input[type="text"] {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #fff; font-size: 14px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; font-weight: 500; text-align: center;
            font-family: inherit;
        }
        .table-row input[type="text"]::placeholder { color: #48484a; font-weight: 400; }
        .table-row input[type="text"]:focus { border-bottom-color: var(--mac-blue); }
        
        .vs-divider {
            text-align: center; font-size: 11px; font-weight: 700; color: #636366; background: rgba(255,255,255,0.03); padding: 3px 0; border-radius: 5px; border: 1px solid rgba(255,255,255,0.01); letter-spacing: 0.5px;
        }
        .fixed-row .vs-divider { color: rgba(255, 214, 10, 0.6); background: rgba(255, 214, 10, 0.04); }

        .btn-container { display: flex; gap: 14px; width: 100%; flex-shrink: 0; } 
        
        .btn-reset {
            flex: 0.7; height: 50px; background: rgba(255, 255, 255, 0.04); color: #e5e5ea; 
            border: 1px solid var(--border-glass); border-radius: 25px; font-weight: 500; font-size: 14px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap; box-sizing: border-box;
        }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }
        .btn-reset:active { transform: translateY(0px) scale(0.98); }

        .btn-assign {
            flex: 1.3; height: 50px;
            background: rgba(0, 122, 255, 0.08); color: #007aff; 
            border: 1px solid rgba(0, 122, 255, 0.35); 
            border-radius: 25px; font-weight: 700; font-size: 15px; cursor: pointer; letter-spacing: 0.2px;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); white-space: nowrap; box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.15);
        }
        .btn-assign:hover { 
            background: var(--mac-blue); color: #ffffff; border-color: var(--mac-blue); 
            transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 122, 255, 0.35); 
        }
        .btn-assign:active { transform: translateY(0px) scale(0.97); }

        .result-container {
            background: var(--bg-glass-passive); border: 1px solid var(--border-glass);
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
            backdrop-filter: blur(30px); box-sizing: border-box;
            height: 100%; min-height: 0;
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .result-scroll-core {
            width: 100%; height: 100%; padding: 24px; box-sizing: border-box;
            display: flex; gap: 24px; overflow-x: auto; overflow-y: auto;
            align-items: center; justify-content: center;
        }

        @media (max-width: 1000px), (max-height: 620px) {
            .result-scroll-core { align-items: flex-start; justify-content: flex-start; }
        }

        .table-wrapper-binder {
            display: flex; gap: 24px; align-items: flex-start; justify-content: center;
        }

        .result-scroll-core::-webkit-scrollbar { height: 6px; width: 6px; }
        .result-scroll-core::-webkit-scrollbar-track { background: transparent; }
        .result-scroll-core::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
        .result-scroll-core::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2) !important; }

        .no-result { color: #8e8e93; margin: auto; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; }
        .no-result h3 { font-size: 14px; font-weight: 500; color: #48484a; }

        .set-table {
            border-collapse: collapse; background: #131316; border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 14px; overflow: hidden; 
            width: 234px; min-width: 234px; flex: 0 0 auto; 
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        }
        
        .set-table th.set-title {
            background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.08); 
            padding: 14px 10px; font-size: 15px; font-weight: 700; text-align: center; color: #ffffff; letter-spacing: 0.5px;
        }

        .set-table th.sub-hdr {
            font-size: 12px; font-weight: 700; padding: 0 4px; height: 36px;
            border-bottom: 1px solid rgba(255,255,255,0.08); color: #ffffff !important; 
            text-transform: uppercase; vertical-align: middle; line-height: 36px; box-sizing: border-box;
        }
        
        .clickable-swap-row {
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .clickable-swap-row:hover {
            background: rgba(255, 255, 255, 0.04) !important;
        }
        .clickable-swap-row.selected-token {
            background: rgba(0, 122, 255, 0.15) !important;
            box-shadow: inset 0 0 0 1.5px var(--mac-blue) !important;
        }

        .disabled-fixed-row {
            background: transparent;
        }
        body.swap-mode-active .disabled-fixed-row {
            cursor: not-allowed !important;
        }

        .set-table td {
            padding: 10px 6px; text-align: center; font-size: 15px; height: 42px; 
            border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 700;
            width: 95px; max-width: 95px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            letter-spacing: -0.2px; box-sizing: border-box;
            transition: opacity 0.22s cubic-bezier(0.25, 1, 0.5, 1), filter 0.22s cubic-bezier(0.25, 1, 0.5, 1), color 0.15s ease;
        }
        .set-table tr:last-child td { border-bottom: none; }
        .set-table td.lane-cell {
            background: rgba(255, 255, 255, 0.01); font-size: 12px; font-weight: 700; width: 44px; max-width: 44px; color: #9a9a9e !important; border-right: 1px solid rgba(255,255,255,0.03); letter-spacing: 0;
        }

        .hdr-blue { background: #007aff !important; color: #ffffff !important; font-weight: 700; }
        .hdr-red { background: #ff453a !important; color: #ffffff !important; font-weight: 700; }
        
        /* 🛠️ 2번 해결: 흰 눈 아픔 방지! 진영 교차 동기화와 완벽히 맞아떨어지는 Mac OS 고시인성 네온 컬러 배정 */
        .color-mac-blue-player { color: #59a9ff !important; }
        .color-mac-red-player { color: #ff7875 !important; }
        
        .text-mac-blur-hide {
            opacity: 0 !important;
            filter: blur(4px) !important;
        }

        .mac-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .mac-alert-modal {
            background: rgba(30, 30, 30, 0.75); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; width: 270px; padding: 20px 16px 14px 16px; text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; gap: 4px; animation: macPop 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes macPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #a5a5a7; margin-bottom: 16px; line-height: 1.4; }
        .mac-alert-btn-container { display: flex; gap: 8px; justify-content: center; }
        .mac-alert-btn { flex: 1; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; }
        .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mac-alert-btn.cancel:hover { background: rgba(255, 255, 255, 0.15); }
        .mac-alert-btn.confirm { background: #007aff; color: #ffffff; }
        .mac-alert-btn.confirm:hover { background: #148cff; }
    </style>
</head>
<body class="swap-mode-inactive">

  <div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>

<div class="container">
    <div class="mac-app-header">
        <h1>롤모장</h1>
    </div>

    <div class="mac-alert-overlay" id="macAlertOverlay">
        <div class="mac-alert-modal">
            <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
            <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
            <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
        </div>
    </div>

    <div class="app-content">
        <!-- 좌측 보드 -->
        <div class="setup-box">
            <div class="mode-panel-row">
                <div class="form-row">
                    <span class="form-label">게임 모드</span>
                    <select id="mapMode" class="mac-select" disabled>
                        <option value="SR" selected>소환사의 협곡</option>
                    </select>
                </div>
                <div class="form-row">
                    <span class="form-label">경기 형식</span>
                    <select id="gameMode" class="mac-select" onchange="pushInputsToFirebase()">
                        <option value="Bo1">Bo1</option>
                        <option value="Bo3" selected>Bo3</option>
                        <option value="Bo5">Bo5</option>
                    </select>
                </div>
            </div>

            <div class="input-table-sheet">
                <div class="table-row">
                    <input type="text" id="p1_0" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_0" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_1" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_1" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_2" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_2" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_3" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_3" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                </div>
                <div class="table-row fixed-row">
                    <input type="text" id="p1_4" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                    <div class="vs-divider">서폿고정</div>
                    <input type="text" id="p2_4" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="pushInputsToFirebase()">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-reset" onclick="askRollmojangReset()">초기화</button>
                <button class="btn btn-assign" onclick="runRollmojangAssignment()">팀 배정</button>
            </div>
        </div>

        <!-- 우측 결과 보드 -->
        <div class="result-container" id="resultContainer">
            <div class="result-scroll-core" id="resultScrollCore">
                <div class="table-wrapper-binder" id="tableWrapperBinder">
                    <div class="no-result" id="noResultGrid">
                        <h3>배정 결과가 여기에 표시됩니다.</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_lol_memo_session");

    var globalResultData = null; 
    var isOperating = false;

    var selectedRowElement = null;
    var selectedSetIndex = null;
    var selectedLineIndex = null;

    function openMacAlert(title, subText, type, onConfirm) {
        const overlay = document.getElementById("macAlertOverlay");
        document.getElementById("macAlertTitle").innerText = title;
        document.getElementById("macAlertSub").innerText = subText;
        const btnBox = document.getElementById("macAlertBtnBox");
        btnBox.innerHTML = "";

        if (type === "confirm") {
            const cancelBtn = document.createElement("button");
            cancelBtn.className = "mac-alert-btn cancel";
            cancelBtn.innerText = "취소";
            cancelBtn.onclick = () => { overlay.style.display = "none"; };
            
            const confirmBtn = document.createElement("button");
            confirmBtn.className = "mac-alert-btn confirm";
            confirmBtn.innerText = "확인";
            confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
            
            btnBox.appendChild(cancelBtn);
            btnBox.appendChild(confirmBtn);
        } else {
            const alertBtn = document.createElement("button");
            alertBtn.className = "mac-alert-btn confirm";
            alertBtn.innerText = "확인";
            alertBtn.onclick = () => { overlay.style.display = "none"; };
            btnBox.appendChild(alertBtn);
        }
        overlay.style.display = "flex";
    }

    function pushInputsToFirebase() {
        if (isOperating) return;
        let inputs = [];
        for (let i = 0; i < 5; i++) {
            inputs.push({
                p1: document.getElementById(`p1_${i}`).value.trim(),
                p2: document.getElementById(`p2_${i}`).value.trim()
            });
        }
        db.update({
            inputs: inputs,
            gameMode: document.getElementById("gameMode").value
        });
    }

    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            localHardResetUI();
            return;
        }

        isOperating = true;
        if (data.inputs) {
            data.inputs.forEach((item, idx) => {
                if(document.getElementById(`p1_${idx}`).value !== item.p1) document.getElementById(`p1_${idx}`).value = item.p1;
                if(document.getElementById(`p2_${idx}`).value !== item.p2) document.getElementById(`p2_${idx}`).value = item.p2;
            });
        }
        if (data.gameMode) {
            document.getElementById("gameMode").value = data.gameMode;
        }

        if (data.results) {
            globalResultData = data.results;
            renderResultTables(data.results);
        } else {
            globalResultData = null;
            document.getElementById("tableWrapperBinder").innerHTML = `
                <div class="no-result" id="noResultGrid">
                    <h3>배정 결과가 여기에 세트별로 표시됩니다.</h3>
                </div>`;
        }
        isOperating = false;
    });

    function askRollmojangReset() {
        openMacAlert("라인업 초기화", "입력창의 모든 닉네임 명단과 세트 매칭 결과를 삭제하시겠습니까?", "confirm", () => {
            db.update({
                gameMode: "Bo3",
                inputs: [ {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""}, {p1:"",p2:""} ],
                results: null
            });
        });
    }

    function localHardResetUI() {
        for(let i=0; i<5; i++) {
            document.getElementById(`p1_${i}`).value = "";
            document.getElementById(`p2_${i}`).value = "";
        }
        document.getElementById("tableWrapperBinder").innerHTML = `
            <div class="no-result" id="noResultGrid">
                <h3>배정 결과가 여기에 세트별로 표시됩니다.</h3>
            </div>`;
        selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
        document.body.className = "swap-mode-inactive";
    }

    function customShuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // ⭐ 기존 팀 배정 핵심 로직 원본 100% 보존 유지
    function runRollmojangAssignment() {
        for (let i = 0; i < 5; i++) {
            let p1Val = document.getElementById(`p1_${i}`).value.trim();
            let p2Val = document.getElementById(`p2_${i}`).value.trim();
            if (!p1Val || !p2Val) {
                openMacAlert("배정 실패", "참가자 닉네임이 모두 입력되지 않았습니다.", "alert");
                return;
            }
            if (p1Val.length > 4) document.getElementById(`p1_${i}`).value = p1Val.slice(0, 4);
            if (p2Val.length > 4) document.getElementById(`p2_${i}`).value = p2Val.slice(0, 4);
        }

        const gameMode = document.getElementById("gameMode").value;
        let totalSets = 1;
        if (gameMode === "Bo1") totalSets = 1;
        if (gameMode === "Bo3") totalSets = 3;
        if (gameMode === "Bo5") totalSets = 5;

        const rawData = [];
        for (let i = 0; i < 5; i++) {
            rawData.push([
                document.getElementById(`p1_${i}`).value.trim().slice(0, 4),
                "",
                document.getElementById(`p2_${i}`).value.trim().slice(0, 4)
            ]);
        }

        let fixedPositions = Array(5).fill(null);
        let flexiblePairs = [];

        for (let i = 0; i < rawData.length; i++) {
            let pairInfo = { p1: rawData[i][0], p2: rawData[i][2] };
            if (i === 4) {
                fixedPositions[i] = pairInfo; 
            } else {
                flexiblePairs.push(pairInfo); 
            }
        }

        customShuffleArray(flexiblePairs);

        let firstSetPairs = [];
        let flexIndex = 0;
        for (let j = 0; j < 5; j++) {
            if (fixedPositions[j] !== null) {
                firstSetPairs.push(fixedPositions[j]);
            } else {
                firstSetPairs.push(flexiblePairs[flexIndex]);
                flexIndex++;
            }
        }

        let establishedMatchups = [];
        for (let k = 0; k < firstSetPairs.length; k++) {
            let isLineFixed = (k === 4);
            let bPlayer = firstSetPairs[k].p1;
            let rPlayer = firstSetPairs[k].p2;

            if (Math.random() < 0.5) {
                establishedMatchups.push({ id: k, blue: bPlayer, red: rPlayer, isFixed: isLineFixed, history: [] });
            } else {
                establishedMatchups.push({ id: k, blue: rPlayer, red: bPlayer, isFixed: isLineFixed, history: [] });
            }
        }

        let serializedResults = [];

        for (let set = 0; set < totalSets; set++) {
            let blueResult = Array(5).fill(null);
            let redResult = Array(5).fill(null);

            if (set === 0) {
                for (let m = 0; m < 5; m++) {
                    blueResult[m] = establishedMatchups[m].blue;
                    redResult[m] = establishedMatchups[m].red;
                    establishedMatchups[m].history.push(m);
                }
            } else {
                let flexMatchups = [];
                let flexLineIndices = [];

                for (let m = 0; m < 5; m++) {
                    if (establishedMatchups[m].isFixed) {
                        blueResult[m] = establishedMatchups[m].blue;
                        redResult[m] = establishedMatchups[m].red;
                        establishedMatchups[m].history.push(m);
                    } else {
                        flexMatchups.push(establishedMatchups[m]);
                        flexLineIndices.push(m);
                    }
                }

                let matchSuccess = false;
                for (let attempt = 0; attempt < 100; attempt++) {
                    customShuffleArray(flexMatchups);
                    let hasOverlap = false;

                    for (let idx = 0; idx < flexMatchups.length; idx++) {
                        let currentLine = flexLineIndices[idx];
                        let currentGroup = flexMatchups[idx];

                        if (currentGroup.history.indexOf(currentLine) !== -1) {
                            hasOverlap = true;
                            break;
                        }
                    }
                    if (!hasOverlap) {
                        matchSuccess = true;
                        break;
                    }
                }

                for (let idx = 0; idx < flexMatchups.length; idx++) {
                    let targetLine = flexLineIndices[idx];
                    let finalGroup = flexMatchups[idx];

                    blueResult[targetLine] = finalGroup.blue;
                    redResult[targetLine] = finalGroup.red;
                    finalGroup.history.push(targetLine);
                }
            }

            let setLineArray = [];
            let laneNames = ["탑", "정글", "미드", "원딜", "서폿"];
            for(let r=0; r<5; r++) {
                setLineArray.push({
                    lane: laneNames[r],
                    blue: blueResult[r],
                    red: redResult[r],
                    isFixed: (r === 4)
                });
            }
            serializedResults.push({ setIndex: set, lines: setLineArray });
        }

        db.update({ results: serializedResults });
    }

    function renderResultTables(results) {
        const binder = document.getElementById("tableWrapperBinder");
        binder.innerHTML = ""; 

        results.forEach((setObj, sIdx) => {
            const table = document.createElement("table");
            table.className = "set-table";

            // 고정 팀장명 가져오기 (1세트 서폿 기준 고정)
            let fixedBlueLeader = results[0].lines[4] ? results[0].lines[4].blue : "블루";
            let fixedRedLeader = results[0].lines[4] ? results[0].lines[4].red : "레드";

            let teamAName = `${fixedBlueLeader}팀`;
            let teamBName = `${fixedRedLeader}팀`;

            // 진영 색상 헤더 지그재그 교차 배치
            let teamAHdrClass = (setObj.setIndex % 2 === 0) ? "hdr-blue" : "hdr-red";
            let teamBHdrClass = (setObj.setIndex % 2 === 0) ? "hdr-red" : "hdr-blue";
            
            // 🛠️ 2번 해결: 상단 헤더 진영 색상(블루/레드)에 따라 유저 글씨 색상도 선명하게 하이라이트 되도록 동적 클래스 분기 설계
            let leftPlayerColorClass = (setObj.setIndex % 2 === 0) ? "color-mac-blue-player" : "color-mac-red-player";
            let rightPlayerColorClass = (setObj.setIndex % 2 === 0) ? "color-mac-red-player" : "color-mac-blue-player";

            let htmlPayload = `
                <thead>
                    <tr>
                        <th colspan="3" class="set-title">${setObj.setIndex + 1}세트</th>
                    </tr>
                    <tr>
                        <th class="sub-hdr" style="background: rgba(255,255,255,0.02); width:44px;">라인</th>
                        <th class="sub-hdr ${teamAHdrClass}">${teamAName}</th>
                        <th class="sub-hdr ${teamBHdrClass}">${teamBName}</th>
                    </tr>
                </thead>
                <tbody data-set="${sIdx}">
            `;

            setObj.lines.forEach((lineObj, lIdx) => {
                let rowClass = "";
                if (lineObj.isFixed) {
                    rowClass = `class="disabled-fixed-row"`;
                } else {
                    let isSelected = (selectedSetIndex === sIdx && selectedLineIndex === lIdx);
                    rowClass = `class="clickable-swap-row ${isSelected ? 'selected-token' : ''}" onclick="triggerRowTokenSelection(this, ${sIdx}, ${lIdx})"`;
                }

                htmlPayload += `
                    <tr ${rowClass} id="cell-row-${sIdx}-${lIdx}">
                        <td class="lane-cell">${lineObj.lane}</td>
                        <td class="${leftPlayerColorClass}" id="text-blue-${sIdx}-${lIdx}">${lineObj.blue}</td>
                        <td class="${rightPlayerColorClass}" id="text-red-${sIdx}-${lIdx}">${lineObj.red}</td>
                    </tr>
                `;
            });

            htmlPayload += `</tbody>`;
            table.innerHTML = htmlPayload;
            binder.appendChild(table);
        });
        
        const scrollCore = document.getElementById("resultScrollCore");
        if (results.length >= 4) {
            scrollCore.style.justifyContent = "flex-start";
        } else {
            if (window.innerWidth < 1000 || window.innerHeight < 620) {
                scrollCore.style.justifyContent = "flex-start";
                scrollCore.style.alignItems = "flex-start";
            } else {
                scrollCore.style.justifyContent = "center";
                scrollCore.style.alignItems = "center";
            }
        }
    }

    window.addEventListener("resize", () => {
        if (globalResultData) {
            const scrollCore = document.getElementById("resultScrollCore");
            if (window.innerWidth < 1000 || window.innerHeight < 620) {
                scrollCore.style.justifyContent = "flex-start";
                scrollCore.style.alignItems = "flex-start";
            } else {
                if (globalResultData.length < 4) {
                    scrollCore.style.justifyContent = "center";
                    scrollCore.style.alignItems = "center";
                }
            }
        }
    });

    function triggerRowTokenSelection(element, setIdx, lineDocsIdx) {
        if (globalResultData && globalResultData[setIdx]) {
            let linesArray = globalResultData[setIdx].lines;
            if (linesArray[lineDocsIdx].isFixed) return;
        }

        if (selectedRowElement && selectedSetIndex !== setIdx) {
            selectedRowElement.classList.remove("selected-token");
            selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
        }

        if (!selectedRowElement) {
            selectedRowElement = element;
            selectedSetIndex = setIdx;
            selectedLineIndex = lineDocsIdx;
            element.classList.add("selected-token");
            document.body.className = "swap-mode-active";
        } else {
            let firstLineIdx = selectedLineIndex;
            let secondLineIdx = lineDocsIdx;

            if (firstLineIdx === secondLineIdx) {
                element.classList.remove("selected-token");
                selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
                document.body.className = "swap-mode-inactive";
                return;
            }

            if (globalResultData && globalResultData[setIdx]) {
                let linesArray = globalResultData[setIdx].lines;

                if (linesArray[firstLineIdx].isFixed || linesArray[secondLineIdx].isFixed) {
                    selectedRowElement.classList.remove("selected-token");
                    selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
                    document.body.className = "swap-mode-inactive";
                    return;
                }

                let bText1 = document.getElementById(`text-blue-${setIdx}-${firstLineIdx}`);
                let rText1 = document.getElementById(`text-red-${setIdx}-${firstLineIdx}`);
                let bText2 = document.getElementById(`text-blue-${setIdx}-${secondLineIdx}`);
                let rText2 = document.getElementById(`text-red-${setIdx}-${secondLineIdx}`);

                if(bText1 && rText1 && bText2 && rText2) {
                    bText1.classList.add("text-mac-blur-hide");
                    rText1.classList.add("text-mac-blur-hide");
                    bText2.classList.add("text-mac-blur-hide");
                    rText2.classList.add("text-mac-blur-hide");
                }

                setTimeout(() => {
                    let holdBlue = linesArray[firstLineIdx].blue;
                    let holdRed = linesArray[firstLineIdx].red;

                    linesArray[firstLineIdx].blue = linesArray[secondLineIdx].blue;
                    linesArray[firstLineIdx].red = linesArray[secondLineIdx].red;

                    linesArray[secondLineIdx].blue = holdBlue;
                    linesArray[secondLineIdx].red = holdRed;

                    selectedRowElement.classList.remove("selected-token");
                    element.classList.remove("selected-token");
                    selectedRowElement = null; selectedSetIndex = null; selectedLineIndex = null;
                    document.body.className = "swap-mode-inactive";

                    db.update({ results: globalResultData });
                }, 220);
            }
        }
    }
</script>
