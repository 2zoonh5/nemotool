<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤모장</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poiret+One&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #0f0f12;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --mac-accent: #e2b4bd;
            --mac-blue: #007aff;
        }
        
        body {
            background: var(--bg-main); color: #d1d1d6; font-family: 'Inter', 'Malgun Gothic', sans-serif;
            margin: 0; padding: 40px 20px; overflow-y: auto; box-sizing: border-box;
            min-height: 100vh; user-select: none;
        }

        .container {
            max-width: 1200px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px; z-index: 10;
        }

        .mac-app-header {
            display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; width: 100%;
        }
        .mac-app-header img { width: 34px; height: 34px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(255,255,255,0.1)); }
        .mac-app-header h1 {
            font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 700; color: #ffffff; margin: 0; letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #b5b5b7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .app-content {
            display: flex; gap: 35px; align-items: flex-start; justify-content: center; width: 100%; flex-wrap: wrap;
        }

        /* 좌측 라인업 보드 */
        .setup-box {
            flex: 1.1; min-width: 460px; background: var(--bg-glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 22px; backdrop-filter: blur(30px); box-sizing: border-box;
        }
        
        .form-row { display: flex; justify-content: space-between; align-items: center; width: 100%; background: rgba(255,255,255,0.015); border-radius: 12px; padding: 10px 14px; border: 1px solid var(--border-glass); box-sizing: border-box; }
        .form-label { font-size: 13.5px; font-weight: 600; color: #8e8e93; }
        
        .mac-select {
            background: rgba(255,255,255,0.06); color: #ffffff; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; outline: none; cursor: pointer; transition: background 0.15s;
        }
        .mac-select:hover { background: rgba(255,255,255,0.12); }
        .mac-select option { background: #1c1c1e; color: #fff; }

        /* 매칭 설정 테이블 컴포넌트 */
        .input-table-sheet { display: flex; flex-direction: column; width: 100%; }
        
        .table-row {
            display: grid; grid-template-columns: 1fr 65px 1fr; gap: 12px; align-items: center;
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255,255,255,0.04);
            padding: 14px 16px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box;
        }
        .table-row:last-child { margin-bottom: 0; }
        .table-row.fixed-row { background: rgba(255, 214, 10, 0.01); border-color: rgba(255, 214, 10, 0.06); }

        .table-row input[type="text"] {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #fff; font-size: 14px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; font-weight: 500; text-align: center;
        }
        .table-row input[type="text"]:focus { border-bottom-color: var(--mac-blue); }
        
        .vs-divider {
            text-align: center; font-size: 11px; font-weight: 700; color: #8e8e93; background: rgba(255,255,255,0.04); padding: 4px 0; border-radius: 6px; border: 1px solid rgba(255,255,255,0.02); letter-spacing: 0.5px;
        }
        .fixed-row .vs-divider { color: #ffd60a; background: rgba(255, 214, 10, 0.06); border-color: rgba(255, 214, 10, 0.04); }

        /* 🛠️ [리뉴얼] 2번 요청: 크기 황금 비율 분할 및 Mac App Store 감성 알약 액션 버튼 컴포넌트 */
        .btn-container { display: flex; gap: 14px; width: 100%; margin-top: 5px; }
        
        .btn-reset {
            flex: 0.8; height: 52px; background: rgba(255, 255, 255, 0.05); color: #ffffff; 
            border: 1px solid var(--border-glass); border-radius: 26px; font-weight: 600; font-size: 14.5px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap; box-sizing: border-box;
        }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }
        .btn-reset:active { transform: translateY(0px) scale(0.98); }

        .btn-assign {
            flex: 1.4; height: 52px;
            background: rgba(0, 122, 255, 0.08); 
            color: #007aff; 
            border: 1px solid rgba(0, 122, 255, 0.35); 
            border-radius: 26px; font-weight: 700; font-size: 15.5px; cursor: pointer; letter-spacing: 0.3px;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); white-space: nowrap; box-sizing: border-box;
        }
        .btn-assign:hover { 
            background: var(--mac-blue); color: #ffffff; border-color: var(--mac-blue); 
            transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 122, 255, 0.25); 
        }
        .btn-assign:active { transform: translateY(0px) scale(0.97); }

        /* 우측 결과 보드 */
        .result-container {
            flex: 1.4; min-width: 500px; background: var(--bg-glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 24px; min-height: 440px; display: flex; gap: 18px; overflow-x: auto; align-items: flex-start; box-shadow: 0 20px 50px rgba(0,0,0,0.4); backdrop-filter: blur(30px); box-sizing: border-box;
        }
        .no-result { color: #8e8e93; margin: auto; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .no-result h3 { font-size: 15px; font-weight: 500; color: #636366; letter-spacing: -0.2px; }

        /* 결과 시트 테이블 및 진영별 테마 보정 CSS 클래스 분리화 (버그 원인 제거) */
        .set-table {
            border-collapse: collapse; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 12px; overflow: hidden; min-width: 240px; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .set-table th.set-title {
            background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid var(--border-glass); padding: 12px; font-size: 14.5px; font-weight: 700; text-align: center; color: #ffffff; letter-spacing: 0.3px;
        }
        .set-table th.sub-hdr {
            font-size: 11.5px; font-weight: 700; padding: 9px 6px; border-bottom: 1px solid var(--border-glass); color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .set-table td {
            padding: 10px; text-align: center; font-size: 14px; height: 32px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e5e5ea; font-weight: 500;
        }
        .set-table tr:last-child td { border-bottom: none; }
        .set-table td.lane-cell {
            background: rgba(255, 255, 255, 0.01); font-size: 11.5px; font-weight: 700; width: 50px; color: #aeaea2; border-right: 1px solid rgba(255,255,255,0.03);
        }

        /* 🎨 3번 무응답 해결: 진영 반전 헬퍼 전용 디자인 스케일 테마 클래스 정의 */
        .hdr-blue { background: rgba(0, 122, 255, 0.25) !important; color: #ffffff !important; }
        .hdr-red { background: rgba(255, 69, 58, 0.25) !important; color: #ffffff !important; }
        .cell-blue { background: rgba(0, 122, 255, 0.04) !important; }
        .cell-red { background: rgba(255, 69, 58, 0.04) !important; }

        /* Mac OS 스타일 알림창 모달 */
        .mac-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .mac-alert-modal {
            background: rgba(30, 30, 30, 0.75); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; width: 270px; padding: 20px 16px 14px 16px; text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; gap: 4px; animation: macPop 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes macPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #a5a5a7; margin-bottom: 16px; line-height: 1.4; }
        .mac-alert-btn-container { display: flex; gap: 8px; justify-content: center; }
        .mac-alert-btn { flex: 1; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; }
        .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mac-alert-btn.cancel:hover { background: rgba(255, 255, 255, 0.15); }
        .mac-alert-btn.confirm { background: #007aff; color: #ffffff; }
        .mac-alert-btn.confirm:hover { background: #148cff; }
    </style>
</head>
<body>

<div class="container">
    <div class="mac-app-header">
        <img src="l_memo_icon.png" alt="롤모장 아이콘">
        <h1>롤모장</h1>
    </div>

    <div class="mac-alert-overlay" id="macAlertOverlay">
        <div class="mac-alert-modal">
            <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
            <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
            <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
        </div>
    </div>

    <div class="app-content">
        <!-- 좌측 구성 제어 셋 보드 -->
        <div class="setup-box">
            <div class="form-row">
                <span class="form-label">게임 모드</span>
                <select id="gameMode" class="mac-select">
                    <option value="Bo1">Bo1</option>
                    <option value="Bo3" selected>Bo3</option>
                    <option value="Bo5">Bo5</option>
                </select>
            </div>

            <div class="input-table-sheet">
                <div class="table-row">
                    <input type="text" id="p1_0" placeholder="닉네임을 입력하세요" autocomplete="off">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_0" placeholder="닉네임을 입력하세요" autocomplete="off">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_1" placeholder="닉네임을 입력하세요" autocomplete="off">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_1" placeholder="닉네임을 입력하세요" autocomplete="off">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_2" placeholder="닉네임을 입력하세요" autocomplete="off">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_2" placeholder="닉네임을 입력하세요" autocomplete="off">
                </div>
                <div class="table-row">
                    <input type="text" id="p1_3" placeholder="닉네임을 입력하세요" autocomplete="off">
                    <div class="vs-divider">VS</div>
                    <input type="text" id="p2_3" placeholder="닉네임을 입력하세요" autocomplete="off">
                </div>
                <div class="table-row fixed-row">
                    <input type="text" id="p1_4" placeholder="닉네임을 입력하세요" autocomplete="off">
                    <div class="vs-divider">서폿고정</div>
                    <input type="text" id="p2_4" placeholder="닉네임을 입력하세요" autocomplete="off">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-reset" onclick="askRollmojangReset()">초기화</button>
                <button class="btn btn-assign" onclick="runRollmojangAssignment()">팀 배정</button>
            </div>
        </div>

        <!-- 우측 시트 보드 -->
        <div class="result-container" id="resultContainer">
            <div class="no-result" id="noResultGrid">
                <h3>배정 결과가 여기에 세트별로 표시됩니다.</h3>
            </div>
        </div>
    </div>
</div>

<script>
    function openMacAlert(title, subText, type, onConfirm) {
        const overlay = document.getElementById("macAlertOverlay");
        document.getElementById("macAlertTitle").innerText = title;
        document.getElementById("macAlertSub").innerText = subText;
        const btnBox = document.getElementById("macAlertBtnBox");
        btnBox.innerHTML = "";

        if (type === "confirm") {
            const cancelBtn = document.createElement("button");
            cancelBtn.className = "mac-alert-btn cancel";
            cancelBtn.innerText = "취소";
            cancelBtn.onclick = () => { overlay.style.display = "none"; };
            
            const confirmBtn = document.createElement("button");
            confirmBtn.className = "mac-alert-btn confirm";
            confirmBtn.innerText = "확인";
            confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
            
            btnBox.appendChild(cancelBtn);
            btnBox.appendChild(confirmBtn);
        } else {
            const alertBtn = document.createElement("button");
            alertBtn.className = "mac-alert-btn confirm";
            alertBtn.innerText = "확인";
            alertBtn.onclick = () => { overlay.style.display = "none"; };
            btnBox.appendChild(alertBtn);
        }
        overlay.style.display = "flex";
    }

    function askRollmojangReset() {
        openMacAlert("라인업 초기화", "입력창의 모든 닉네임 명단과 세트 매칭 결과를 삭제하시겠습니까?", "confirm", () => {
            executeFormReset();
        });
    }

    function executeFormReset() {
        for(let i=0; i<5; i++) {
            document.getElementById(`p1_${i}`).value = "";
            document.getElementById(`p2_${i}`).value = "";
        }
        const container = document.getElementById("resultContainer");
        container.innerHTML = `
            <div class="no-result" id="noResultGrid">
                <h3>배정 결과가 여기에 표시됩니다.</h3>
            </div>`;
    }

    function customShuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 🛠️ 3번 버그 해결: 무응답 현상을 일으키던 스타일 var 바인딩 수식을 제거하고 CSS 테마 클래스로 리렌더링 오케스트레이션 가동
    function runRollmojangAssignment() {
        for (let i = 0; i < 5; i++) {
            const p1 = document.getElementById(`p1_${i}`).value.trim();
            const p2 = document.getElementById(`p2_${i}`).value.trim();
            if (!p1 || !p2) {
                openMacAlert("배정 실패", "참가자 닉네임이 모두 입력되지 않았습니다.", "alert");
                return;
            }
        }

        const gameMode = document.getElementById("gameMode").value;
        let totalSets = 1;
        if (gameMode === "Bo3") totalSets = 3;
        if (gameMode === "Bo5") totalSets = 5;

        const rawData = [];
        for (let i = 0; i < 5; i++) {
            rawData.push([
                document.getElementById(`p1_${i}`).value.trim(),
                "",
                document.getElementById(`p2_${i}`).value.trim()
            ]);
        }

        let fixedPositions = Array(5).fill(null);
        let flexiblePairs = [];

        for (let i = 0; i < rawData.length; i++) {
            let pairInfo = { p1: rawData[i][0], p2: rawData[i][2] };
            if (i === 4) {
                fixedPositions[i] = pairInfo; 
            } else {
                flexiblePairs.push(pairInfo); 
            }
        }

        customShuffleArray(flexiblePairs);

        let firstSetPairs = [];
        let flexIndex = 0;
        for (let j = 0; j < 5; j++) {
            if (fixedPositions[j] !== null) {
                firstSetPairs.push(fixedPositions[j]);
            } else {
                firstSetPairs.push(flexiblePairs[flexIndex]);
                flexIndex++;
            }
        }

        let establishedMatchups = [];
        for (let k = 0; k < firstSetPairs.length; k++) {
            let isLineFixed = (k === 4);
            let bPlayer = firstSetPairs[k].p1;
            let rPlayer = firstSetPairs[k].p2;

            if (Math.random() < 0.5) {
                establishedMatchups.push({ id: k, blue: bPlayer, red: rPlayer, isFixed: isLineFixed, history: [] });
            } else {
                establishedMatchups.push({ id: k, blue: rPlayer, red: bPlayer, isFixed: isLineFixed, history: [] });
            }
        }

        const resultContainer = document.getElementById("resultContainer");
        resultContainer.innerHTML = ""; 

        for (let set = 0; set < totalSets; set++) {
            let blueResult = Array(5).fill(null);
            let redResult = Array(5).fill(null);

            if (set === 0) {
                for (let m = 0; m < 5; m++) {
                    blueResult[m] = establishedMatchups[m].blue;
                    redResult[m] = establishedMatchups[m].red;
                    establishedMatchups[m].history.push(m);
                }
            } else {
                let flexMatchups = [];
                let flexLineIndices = [];

                for (let m = 0; m < 5; m++) {
                    if (establishedMatchups[m].isFixed) {
                        blueResult[m] = establishedMatchups[m].blue;
                        redResult[m] = establishedMatchups[m].red;
                        establishedMatchups[m].history.push(m);
                    } else {
                        flexMatchups.push(establishedMatchups[m]);
                        flexLineIndices.push(m);
                    }
                }

                let matchSuccess = false;
                for (let attempt = 0; attempt < 100; attempt++) {
                    customShuffleArray(flexMatchups);
                    let hasOverlap = false;

                    for (let idx = 0; idx < flexMatchups.length; idx++) {
                        let currentLine = flexLineIndices[idx];
                        let currentGroup = flexMatchups[idx];

                        if (currentGroup.history.indexOf(currentLine) !== -1) {
                            hasOverlap = true;
                            break;
                        }
                    }
                    if (!hasOverlap) {
                        matchSuccess = true;
                        break;
                    }
                }

                for (let idx = 0; idx < flexMatchups.length; idx++) {
                    let targetLine = flexLineIndices[idx];
                    let finalGroup = flexMatchups[idx];

                    blueResult[targetLine] = finalGroup.blue;
                    redResult[targetLine] = finalGroup.red;
                    finalGroup.history.push(targetLine);
                }
            }

            // 고정 상수 클래스로 안전 결합 트리거 포지셔닝
            let teamAHdrClass = (set % 2 === 0) ? "hdr-blue" : "hdr-red";
            let teamBHdrClass = (set % 2 === 0) ? "hdr-red" : "hdr-blue";
            let teamACellClass = (set % 2 === 0) ? "cell-blue" : "cell-red";
            let teamBCellClass = (set % 2 === 0) ? "cell-red" : "cell-blue";

            const table = document.createElement("table");
            table.className = "set-table";

            let laneNames = ["탑", "정글", "미드", "원딜", "서폿"];
            let teamAName = (set % 2 === 0) ? "블루팀" : "레드팀";
            let teamBName = (set % 2 === 0) ? "레드팀" : "블루팀";
            
            let htmlPayload = `
                <thead>
                    <tr>
                        <th colspan="3" class="set-title">${set + 1}세트</th>
                    </tr>
                    <tr>
                        <th class="sub-hdr" style="background: rgba(255,255,255,0.02); width:50px;">라인</th>
                        <th class="sub-hdr ${teamAHdrClass}" style="width:95px;">${teamAName}</th>
                        <th class="sub-hdr ${teamBHdrClass}" style="width:95px;">${teamBName}</th>
                    </tr>
                </thead>
                <tbody>
            `;

            for(let r=0; r<5; r++) {
                htmlPayload += `
                    <tr>
                        <td class="lane-cell">${laneNames[r]}</td>
                        <td class="${teamACellClass}">${blueResult[r]}</td>
                        <td class="${teamBCellClass}">${redResult[r]}</td>
                    </tr>
                `;
            }
            htmlPayload += `</tbody>`;
            table.innerHTML = htmlPayload;
            resultContainer.appendChild(table);
        }
    }
</script>
</body>
</html>
