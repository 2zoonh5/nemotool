<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 점검 중</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-main: #0c0c0e;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --mac-blue: #007aff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        .mac-bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120, 119, 198, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .maintenance-container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .mac-spinner {
            position: relative;
            width: 36px;
            height: 36px;
        }
        .mac-spinner div {
            position: absolute;
            width: 3px;
            height: 10px;
            background: #fff;
            left: 16.5px;
            top: 0;
            opacity: 0.15;
            border-radius: 2px;
            transform-origin: 1.5px 18px;
        }
        .mac-spinner div:nth-child(1) { transform: rotate(0deg); animation: macLoad 1.2s linear infinite; }
        .mac-spinner div:nth-child(2) { transform: rotate(30deg); animation: macLoad 1.2s linear -1.1s infinite; }
        .mac-spinner div:nth-child(3) { transform: rotate(60deg); animation: macLoad 1.2s linear -1s infinite; }
        .mac-spinner div:nth-child(4) { transform: rotate(90deg); animation: macLoad 1.2s linear -0.9s infinite; }
        .mac-spinner div:nth-child(5) { transform: rotate(120deg); animation: macLoad 1.2s linear -0.8s infinite; }
        .mac-spinner div:nth-child(6) { transform: rotate(150deg); animation: macLoad 1.2s linear -0.7s infinite; }
        .mac-spinner div:nth-child(7) { transform: rotate(180deg); animation: macLoad 1.2s linear -0.6s infinite; }
        .mac-spinner div:nth-child(8) { transform: rotate(210deg); animation: macLoad 1.2s linear -0.5s infinite; }
        .mac-spinner div:nth-child(9) { transform: rotate(240deg); animation: macLoad 1.2s linear -0.4s infinite; }
        .mac-spinner div:nth-child(10) { transform: rotate(270deg); animation: macLoad 1.2s linear -0.3s infinite; }
        .mac-spinner div:nth-child(11) { transform: rotate(300deg); animation: macLoad 1.2s linear -0.2s infinite; }
        .mac-spinner div:nth-child(12) { transform: rotate(330deg); animation: macLoad 1.2s linear -0.1s infinite; }

        @keyframes macLoad {
            from { opacity: 1; }
            to { opacity: 0.15; }
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.4px;
            margin: 0;
            color: var(--text-main);
        }

        .description {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-sub);
            line-height: 1.5;
            margin: -10px 0 0 0;
            white-space: pre-line;
            letter-spacing: -0.1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="mac-bg-glow"></div>

    <div class="maintenance-container">
        <div class="mac-spinner">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
        
        <h1 class="title">시스템 점검 중</h1>
        <p class="description">더 안정적인 NEMO TOOL 서비스를 위해 시스템 점검 중입니다.
        잠시 후 자동으로 페이지가 새로고침됩니다.</p>
    </div>

</body>
</html>
