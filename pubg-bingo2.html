<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빙고판</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --bg-main: #0c0c0e;
            --bg-sidebar: rgba(30, 30, 32, 0.6);
            --bg-glass-active: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.06);
            --mac-blue: #007aff;
            --mac-blue-hover: #148cff;
            --mac-orange: #ff9f0a;
            --mac-red: #ff453a;
            --text-dim: #aeaeb2;
            --text-gray: #8e8e93;
        }
        
        body {
            background: var(--bg-main); color: #d1d1d6; font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0; overflow: hidden; box-sizing: border-box; height: 100vh; user-select: none;
        }

        .network-badge { 
            position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; 
            font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.4); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); z-index: 99;
        }
        .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

        /* 🛠️ MacOS 시스템 설정 뷰 스타일의 2분할 레이아웃으로 싹 리디자인 */
        .mac-settings-window {
            display: grid; grid-template-columns: 320px 1fr; width: 100vw; height: 100vh; background: var(--bg-main);
        }

        /* 왼쪽 시스템 사이드바 */
        .mac-sidebar {
            background: var(--bg-sidebar); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid var(--border-glass); padding: 50px 16px 20px 16px;
            display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; height: 100%; min-width: 0;
        }

        .sidebar-section-title {
            font-size: 11px; font-weight: 700; color: var(--text-gray); text-transform: uppercase;
            letter-spacing: 0.5px; padding-left: 8px; margin-bottom: 4px;
        }

        .mac-list-group {
            background: rgba(0, 0, 0, 0.15); border: 1px solid var(--border-glass); border-radius: 10px;
            overflow: hidden; display: flex; flex-direction: column; width: 100%; box-sizing: border-box;
        }

        .mac-list-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); min-height: 40px; box-sizing: border-box;
        }
        .mac-list-row:last-child { border-bottom: none; }
        .row-title { font-size: 12px; font-weight: 500; color: #ffffff; }

        .mac-select {
            background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px; padding: 2px 4px; font-size: 11.5px; outline: none; cursor: pointer; width: 105px; height: 24px; text-align: right;
        }
        .mac-select option { background: #1c1c1e; color: #fff; }

        /* 팀 관리 리스트 고정 높이 지정 및 내부 스크롤 완벽 대응 */
        .team-scroll-area {
            flex: 1; overflow-y: auto; max-height: 180px; padding-right: 2px; display: flex; flex-direction: column; gap: 6px;
        }
        
        .team-item-row {
            display: grid; grid-template-columns: auto 1fr auto auto; gap: 8px; align-items: center;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
            padding: 6px 10px; border-radius: 8px; height: 36px; box-sizing: border-box; cursor: pointer;
        }
        .team-item-row.selected-marker {
            border-color: var(--mac-blue); background: rgba(0, 122, 255, 0.12);
        }
        .team-color-dot { width: 8px; height: 8px; border-radius: 50%; }
        .team-name-text { font-size: 12px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .chicken-stepper {
            display: flex; align-items: center; background: rgba(255,255,255,0.04); border-radius: 4px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; height: 20px;
        }
        .chicken-btn { background: transparent; border: none; color: #fff; font-size: 10px; padding: 0 5px; cursor: pointer; height: 100%; }
        .chicken-btn:hover { background: rgba(255,255,255,0.1); }
        .chicken-count { font-size: 11px; font-weight: 700; width: 22px; text-align: center; color: #ffd60a; font-family: 'Space Mono', monospace; }

        /* 맥 버튼 디자인 통일 */
        .mac-btn {
            height: 30px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
            border: 1px solid var(--border-glass); transition: all 0.15s; box-sizing: border-box;
        }
        .mac-btn.primary { background: var(--mac-blue); color: #fff; border-color: var(--mac-blue); font-weight: 600; }
        .mac-btn.primary:hover { background: var(--mac-blue-hover); }
        .mac-btn.secondary { background: rgba(255,255,255,0.04); color: #fff; }
        .mac-btn.secondary:hover { background: rgba(255,255,255,0.08); }
        .mac-btn.danger { background: rgba(255, 69, 58, 0.06); color: #ff453a; border-color: rgba(255, 69, 58, 0.15); }
        .mac-btn.danger:hover { background: #ff453a; color: #fff; }
        
        .btn-trash { background: transparent; border: none; cursor: pointer; padding: 2px; display: flex; align-items: center; }
        .btn-trash svg { width: 13px; height: 13px; fill: #ff453a; }

        .mac-toggle-btn {
            background: rgba(255,255,255,0.06); color: #8e8e93; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 12px; border: 1px solid var(--border-glass); cursor: pointer;
        }
        .mac-toggle-btn.active { background: #ffd60a; color: #000; border-color: #ffd60a; }

        /* 오른쪽 메인 콘텐츠 대시보드 박스 */
        .main-dashboard {
            padding: 40px 30px 20px 30px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; height: 100vh; overflow: hidden;
        }

        .scoreboard-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; width: 100%; flex-shrink: 0;
        }
        .score-card {
            background: rgba(20, 20, 22, 0.5); border: 1px solid var(--border-glass); padding: 10px 14px; border-radius: 12px; text-align: center; backdrop-filter: blur(20px);
        }
        .score-card-title { font-size: 11.5px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .score-main-value { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; color: #fff; }
        .score-sub-value { font-size: 10.5px; color: #8e8e93; }

        /* 빙고판 격자 크기 강제 완전 고정 패치 */
        .bingo-board-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 0;
        }
        .bingo-grid {
            display: grid; gap: 6px; background: rgba(0,0,0,0.35); border: 1px solid var(--border-glass); 
            padding: 16px; border-radius: 20px; box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
            width: 100%; max-width: 540px; aspect-ratio: 1 / 1; box-sizing: border-box;
        }
        
        .bingo-cell {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.03); border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            font-family: 'Space Mono', monospace; font-weight: 700; color: #8e8e93; transition: all 0.1s; position: relative; box-sizing: border-box;
        }
        .bingo-cell:hover { background: rgba(255,255,255,0.06); transform: scale(1.04); color: #fff; z-index: 2; }
        .bingo-cell.shield-locked::after {
            content: '🍗'; position: absolute; bottom: 3px; right: 3px; font-size: 9px; filter: drop-shadow(0 0 2px #000);
        }

        /* 알림창 */
        .mac-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .mac-alert-modal {
            background: rgba(35, 35, 35, 0.85); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; width: 280px; padding: 20px 16px 14px 16px; text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column; gap: 4px; animation: macPop 0.18s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes macPop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #a5a5a7; margin-bottom: 16px; line-height: 1.4; white-space: pre-line; }
        .mac-alert-btn-container { display: flex; gap: 8px; justify-content: center; }
        .mac-alert-btn { flex: 1; padding: 6px 0; font-size: 12.5px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; }
        .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; }
        .mac-alert-btn.confirm { background: var(--mac-blue); color: #ffffff; }
    </style>
</head>
<body>

<div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>

<div class="mac-alert-overlay" id="macAlertOverlay">
    <div class="mac-alert-modal">
        <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
        <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
        <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
    </div>
</div>

<div class="mac-settings-window">
    <!-- 왼쪽 사이드바 (환경설정 패널 컴포넌트화) -->
    <div class="mac-sidebar">
        <span class="sidebar-section-title">규칙 및 판 설정</span>
        <div class="mac-list-group">
            <div class="mac-list-row">
                <span class="row-title">게임 모드</span>
                <select id="gameMode" class="mac-select">
                    <option value="bingo" selected>일반 빙고</option>
                    <option value="conquer">땅따먹기</option>
                </select>
            </div>
            <div class="mac-list-row">
                <span class="row-title">빙고 칸 수</span>
                <select id="boardSize" class="mac-select" onchange="updateTargetBingoOptions()">
                    <option value="3">3 x 3</option>
                    <option value="4">4 x 4</option>
                    <option value="5">5 x 5</option>
                    <option value="8">8 x 8</option>
                    <option value="10" selected>10 x 10</option>
                </select>
            </div>
            <div class="mac-list-row">
                <span class="row-title">내용물 형식</span>
                <select id="contentType" class="mac-select">
                    <option value="num" selected>숫자 (1-100)</option>
                    <option value="alpha">알파벳 (A-Z)</option>
                </select>
            </div>
            <div class="mac-list-row">
                <span class="row-title">배열 방식</span>
                <select id="arraySortMode" class="mac-select">
                    <option value="origin" selected>오리지널</option>
                    <option value="random">무작위 랜덤</option>
                </select>
            </div>
            <div class="mac-list-row">
                <span class="row-title">목표 빙고 수</span>
                <select id="targetBingo" class="mac-select"></select>
            </div>
        </div>

        <!-- 🛠️ 치명적 오류의 주범이었던 비동기 동기화 해제 후 일괄 트리거 버튼화 수동 격리 -->
        <button class="mac-btn primary" onclick="executeApplyNewGame()">새 게임 적용 및 시작</button>

        <span class="sidebar-section-title" style="margin-top: 8px;">획득 버프 컨트롤</span>
        <div class="mac-list-group">
            <div class="mac-list-row" style="min-height: 44px;">
                <span class="row-title">🍗 치킨 고정 찬스</span>
                <button class="mac-toggle-btn" id="chanceToggle" onclick="toggleChickenChance()">OFF</button>
            </div>
            <div class="mac-list-row" style="background: rgba(0,0,0,0.1); min-height: 36px;">
                <span class="row-title" style="color: var(--text-gray); font-size: 11px;">마킹 전용 타겟 팀</span>
                <span id="currentTurnText" style="font-size: 11.5px; font-weight: 700; color: var(--mac-blue);">선택 대기</span>
            </div>
        </div>

        <span class="sidebar-section-title" style="margin-top: 8px;">참여 팀 빌더</span>
        <div class="team-scroll-area" id="teamListContainer"></div>
        <button class="mac-btn secondary" onclick="addNewTeam()">+ 새로운 팀 생성</button>

        <div style="margin-top: auto; padding-top: 10px;">
            <button class="mac-btn danger" onclick="askBingoReset()">빙고판 전체 완전 초기화</button>
        </div>
    </div>

    <!-- 오른쪽 메인 대시보드 -->
    <div class="main-dashboard" id="resultContainer">
        <div class="scoreboard-layout" id="scoreboardZone"></div>
        <div class="bingo-board-wrapper">
            <div class="bingo-grid" id="bingoGridContainer"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_pubg_bingo_session");

    const sysColors = [
        { name: "파란색", hex: "#0a84ff" },
        { name: "빨간색", hex: "#ff453a" },
        { name: "주황색", hex: "#ff9f0a" },
        { name: "노란색", hex: "#ffd60a" },
        { name: "초록색", hex: "#30d158" },
        { name: "보라색", hex: "#bf5af2" }
    ];

    let isOperating = false;
    let localChickenChanceActive = false;
    let serverTeams = [];
    let serverCells = {};
    let activeTurnIndex = 0;
    let localWinTriggered = false;

    function openMacAlert(title, subText, type, onConfirm) {
        const overlay = document.getElementById("macAlertOverlay");
        document.getElementById("macAlertTitle").innerText = title;
        document.getElementById("macAlertSub").innerText = subText;
        const btnBox = document.getElementById("macAlertBtnBox");
        btnBox.innerHTML = "";

        if (type === "confirm") {
            const cancelBtn = document.createElement("button");
            cancelBtn.className = "mac-alert-btn cancel"; cancelBtn.innerText = "취소";
            cancelBtn.onclick = () => { overlay.style.display = "none"; };
            const confirmBtn = document.createElement("button");
            confirmBtn.className = "mac-alert-btn confirm"; confirmBtn.innerText = "확인";
            confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
            btnBox.appendChild(cancelBtn); btnBox.appendChild(confirmBtn);
        } else {
            const alertBtn = document.createElement("button");
            alertBtn.className = "mac-alert-btn confirm"; alertBtn.innerText = "확인";
            alertBtn.onclick = () => { overlay.style.display = "none"; };
            btnBox.appendChild(alertBtn);
        }
        overlay.style.display = "flex";
    }

    function updateTargetBingoOptions() {
        const size = parseInt(document.getElementById("boardSize").value);
        const targetSelect = document.getElementById("targetBingo");
        const currentVal = targetSelect.value;
        targetSelect.innerHTML = "";
        
        let maxBingo = size === 3 ? 3 : (size === 4 ? 4 : 5);
        for(let i = 1; i <= maxBingo; i++) {
            targetSelect.innerHTML += `<option value="${i}">${i}줄 빙고</option>`;
        }
        targetSelect.innerHTML += `<option value="999">올빙고 (All)</option>`;
        
        if (currentVal) targetSelect.value = currentVal;
        else targetSelect.value = "3";
    }
    updateTargetBingoOptions();

    function shuffleArray(arr) {
        let array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 🛠️ 수동 세팅 전송: 모듈 일괄 주입으로 비동기 스크립트 충돌 원천 차단
    function executeApplyNewGame() {
        const size = parseInt(document.getElementById("boardSize").value);
        const cType = document.getElementById("contentType").value;
        const sMode = document.getElementById("arraySortMode").value;
        const targetBingo = parseInt(document.getElementById("targetBingo").value);
        const gameMode = document.getElementById("gameMode").value;

        if (size >= 8 && cType === "alpha") {
            openMacAlert("알파벳 제한 안내", "알파벳 전용 모드는 26자 고정 제한으로 인해\n5x5 이하 크기의 빙고판에서만 개설할 수 있습니다.", "alert");
            return;
        }

        const totalCells = size * size;
        let matrixMap = {};
        let tempPool = [];
        const alphas = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        if (cType === "alpha") {
            for(let i=0; i<totalCells; i++) tempPool.push(alphas[i % alphas.length]);
        } else {
            for(let i=1; i<=totalCells; i++) tempPool.push(String(i));
        }

        if (sMode === "random") {
            tempPool = shuffleArray(tempPool);
        }

        for(let i=0; i<totalCells; i++) {
            matrixMap[i] = tempPool[i];
        }

        localWinTriggered = false;
        
        db.update({
            config: { gameMode, boardSize: size, contentType: cType, arraySortMode: sMode, targetBingo },
            matrixSeed: matrixMap,
            cells: null
        }, (err) => {
            if(!err) openMacAlert("시스템 동기화 완료", "새로운 설정으로 격자판 배열이 안전하게 재생성되었습니다.", "alert");
        });
    }

    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            setupDefaultSession();
            return;
        }

        isOperating = true;
        
        if (data.config) {
            document.getElementById("gameMode").value = data.config.gameMode;
            if (parseInt(document.getElementById("boardSize").value) !== data.config.boardSize) {
                document.getElementById("boardSize").value = data.config.boardSize;
                updateTargetBingoOptions();
            }
            document.getElementById("contentType").value = data.config.contentType;
            document.getElementById("arraySortMode").value = data.config.arraySortMode || "origin";
            document.getElementById("targetBingo").value = data.config.targetBingo;
        }

        serverTeams = data.teams || [];
        serverCells = data.cells || {};
        activeTurnIndex = data.activeTurnIndex || 0;
        let currentMatrixSeed = data.matrixSeed || {};

        const indicator = document.getElementById("currentTurnText");
        if (serverTeams[activeTurnIndex]) {
            indicator.innerText = serverTeams[activeTurnIndex].name;
            indicator.style.color = serverTeams[activeTurnIndex].color;
        } else {
            indicator.innerText = "선택 대기";
            indicator.style.color = "var(--mac-blue)";
        }

        renderTeamManagerUI();
        renderBingoGridUI(data.config?.boardSize || 10, currentMatrixSeed);
        calculateAndRenderScores(data.config?.boardSize || 10, data.config?.targetBingo || 3);

        isOperating = false;
    });

    function setupDefaultSession() {
        let initialTeams = [
            { id: 0, name: "A팀 (블루)", color: sysColors[0].hex, chickens: 0 },
            { id: 1, name: "B팀 (레드)", color: sysColors[1].hex, chickens: 0 }
        ];
        let matrixMap = {};
        for(let i=0; i<100; i++) matrixMap[i] = String(i + 1);

        db.set({
            config: { gameMode: "bingo", boardSize: 10, contentType: "num", arraySortMode: "origin", targetBingo: 3 },
            teams: initialTeams,
            activeTurnIndex: 0,
            matrixSeed: matrixMap,
            cells: {}
        });
    }

    function renderTeamManagerUI() {
        const container = document.getElementById("teamListContainer");
        container.innerHTML = "";
        
        serverTeams.forEach((team, idx) => {
            const isSelected = (idx === activeTurnIndex);
            let item = document.createElement("div");
            item.className = `team-item-row ${isSelected ? 'selected-marker' : ''}`;
            item.onclick = () => { if(!isOperating) db.child("activeTurnIndex").set(idx); };
            
            item.innerHTML = `
                <span class="team-color-dot" style="background: ${team.color}"></span>
                <span class="team-name-text">${team.name}</span>
                <div class="chicken-stepper" onclick="event.stopPropagation()">
                    <button class="chicken-btn" onclick="adjustChicken(${idx}, -1)">-</button>
                    <span class="chicken-count">${team.chickens}</span>
                    <button class="chicken-btn" onclick="adjustChicken(${idx}, 1)">+</button>
                </div>
                <button class="btn-trash" onclick="event.stopPropagation(); removeTeamItem(${idx})">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
            `;
            container.appendChild(item);
        });
    }

    function addNewTeam() {
        if (serverTeams.length >= 6) {
            openMacAlert("생성 불가", "최대 6개 팀까지만 개설 가능합니다.", "alert");
            return;
        }
        let nextColor = sysColors[serverTeams.length % sysColors.length].hex;
        let alphabet = ["A", "B", "C", "D", "E", "F"][serverTeams.length];
        serverTeams.push({ id: Date.now(), name: `${alphabet}팀`, color: nextColor, chickens: 0 });
        db.child("teams").set(serverTeams);
    }

    function removeTeamItem(idx) {
        if (serverTeams.length <= 1) {
            openMacAlert("삭제 불가", "최소 1개 팀은 존재해야 게임 운용이 가능합니다.", "alert");
            return;
        }
        serverTeams.splice(idx, 1);
        let nextMarker = activeTurnIndex >= serverTeams.length ? 0 : activeTurnIndex;
        db.update({ teams: serverTeams, activeTurnIndex: nextMarker });
    }

    function adjustChicken(teamIdx, amount) {
        let current = serverTeams[teamIdx].chickens || 0;
        let next = current + amount;
        if (next < 0) next = 0;
        db.child(`teams/${teamIdx}/chickens`).set(next);
    }

    function toggleChickenChance() {
        if (serverTeams.length === 0) return;
        const currentTeam = serverTeams[activeTurnIndex];
        if (!localChickenChanceActive && (!currentTeam.chickens || currentTeam.chickens <= 0)) {
            openMacAlert("잔여 치킨 부족", "선택된 팀에 획득한 치킨 개수가 없어 방어막 고정 찬스를 쓸 수 없습니다.", "alert");
            return;
        }
        localChickenChanceActive = !localChickenChanceActive;
        const toggleBtn = document.getElementById("chanceToggle");
        toggleBtn.className = `mac-toggle-btn ${localChickenChanceActive ? 'active' : ''}`;
        toggleBtn.innerText = localChickenChanceActive ? "ON" : "OFF";
    }

    function renderBingoGridUI(size, currentMatrixSeed) {
        const grid = document.getElementById("bingoGridContainer");
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        
        let fSize = "20px";
        if (size >= 10) fSize = "15px";
        else if (size >= 8) fSize = "17px";

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                let cellId = `cell_${r}_${c}`;
                let cellData = serverCells[cellId];
                let cellIndex = (r * size) + c;
                
                let box = document.createElement("div");
                box.className = "bingo-cell";
                box.style.fontSize = fSize;
                box.innerText = currentMatrixSeed[cellIndex] || String(cellIndex + 1);

                if (cellData) {
                    box.style.backgroundColor = cellData.color;
                    box.style.color = "#ffffff";
                    box.style.borderColor = "transparent";
                    if (cellData.shield) box.classList.add("shield-locked");
                }

                box.onclick = () => handleCellClick(cellId);
                grid.appendChild(box);
            }
        }
    }

    function handleCellClick(cellId) {
        if (serverTeams.length === 0) return;
        const currentTeam = serverTeams[activeTurnIndex];
        const mode = document.getElementById("gameMode").value;
        const targetCell = serverCells[cellId];

        if (targetCell && targetCell.shield) {
            if (targetCell.color === currentTeam.color) {
                db.child(`cells/${cellId}`).set(null);
                adjustChicken(activeTurnIndex, 1);
                return;
            }
            openMacAlert("방어막 작동 칸", "치킨 방어막으로 영구 고정된 상대 팀의 칸은 뺏을 수 없습니다.", "alert");
            return;
        }

        if (targetCell && targetCell.color === currentTeam.color) {
            db.child(`cells/${cellId}`).set(null);
            return;
        }

        if (targetCell && targetCell.color !== currentTeam.color && mode === "bingo") {
            openMacAlert("선점 완료", "일반 빙고 모드에서는 선점된 타 팀의 영역을 침범할 수 없습니다.", "alert");
            return;
        }

        if (localChickenChanceActive) {
            db.child(`cells/${cellId}`).set({ color: currentTeam.color, teamName: currentTeam.name, shield: true });
            adjustChicken(activeTurnIndex, -1);
            toggleChickenChance();
        } else {
            db.child(`cells/${cellId}`).set({ color: currentTeam.color, teamName: currentTeam.name, shield: false });
        }
    }

    function calculateAndRenderScores(size, targetBingo) {
        const scoreboard = document.getElementById("scoreboardZone");
        scoreboard.innerHTML = "";
        let totalCellsCount = size * size;

        serverTeams.forEach(team => {
            let occupied = 0;
            let matrix = Array(size).fill(0).map(() => Array(size).fill(false));

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let cell = serverCells[`cell_${r}_${c}`];
                    if (cell && cell.color === team.color) { occupied++; matrix[r][c] = true; }
                }
            }

            let bingoLines = 0;
            for (let r = 0; r < size; r++) { if (matrix[r].every(v => v)) bingoLines++; }
            for (let c = 0; c < size; c++) {
                let colCheck = true;
                for (let r = 0; r < size; r++) { if (!matrix[r][c]) { colCheck = false; break; } }
                if (colCheck) bingoLines++;
            }
            let diag1 = true;
            for (let i = 0; i < size; i++) { if (!matrix[i][i]) { diag1 = false; break; } }
            if (diag1) bingoLines++;
            let diag2 = true;
            for (let i = 0; i < size; i++) { if (!matrix[i][size - 1 - i]) { diag2 = false; break; } }
            if (diag2) bingoLines++;

            let pct = totalCellsCount > 0 ? Math.round((occupied / totalCellsCount) * 100) : 0;
            let isAllBingoMode = (targetBingo === 999);
            let displayScoreText = isAllBingoMode ? `${occupied} / ${totalCellsCount} 칸` : `${bingoLines} / ${targetBingo} 줄`;

            let card = document.createElement("div");
            card.className = "score-card";
            card.innerHTML = `
                <div class="score-card-title" style="color: ${team.color}"><span class="team-color-dot" style="background: ${team.color}"></span> ${team.name}</div>
                <div class="score-main-value">${displayScoreText}</div>
                <div class="score-sub-value">달성 및 점유율 ${pct}%</div>
            `;
            scoreboard.appendChild(card);

            let winCondition = isAllBingoMode ? (occupied === totalCellsCount) : (bingoLines >= targetBingo);

            if (winCondition && !localWinTriggered) {
                localWinTriggered = true;
                let msg = isAllBingoMode ? `모든 칸을 차지했습니다!` : `${targetBingo}줄 빙고를 먼저 달성했습니다!`;
                setTimeout(() => { openMacAlert("🏆 승리 팀 확정", `축하합니다!\n${team.name}이(가) 목표 스펙을 달성했습니다.`, "alert"); }, 100);
            }
        });
    }

    // 🛠️ 초기화 오류 완전 해결: 이제 클릭 시 완벽하게 'cells'와 'teams'를 클리어하여 리셋 보장
    function askBingoReset() {
        openMacAlert("전체 초기화", "모든 칸 점령 현황과 점수, 그리고 추가된 팀 목록을 지우고 완전히 처음 상태로 되돌리시겠습니까?", "confirm", () => {
            localWinTriggered = false;
            let defaultTeams = [
                { id: 0, name: "A팀 (블루)", color: sysColors[0].hex, chickens: 0 },
                { id: 1, name: "B팀 (레드)", color: sysColors[1].hex, chickens: 0 }
            ];
            let matrixMap = {};
            let size = parseInt(document.getElementById("boardSize").value) || 10;
            for(let i=0; i<(size*size); i++) matrixMap[i] = String(i + 1);

            db.update({ cells: null, teams: defaultTeams, activeTurnIndex: 0, matrixSeed: matrixMap }, (err) => {
                if(!err && localChickenChanceActive) toggleChickenChance();
            });
        });
    }
</script>
</body>
</html>
