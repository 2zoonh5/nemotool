<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>NEMO GACHA SYSTEM</title>
  
  <!-- 🔥 Firebase SDK 라이브러리 탑재 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poiret+One&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --mac-accent: #e2b4bd;
    }

    body { 
      background: #0f0f12; color: #d1d1d6; font-family: 'Inter', sans-serif; 
      display: flex; flex-direction: column; gap: 24px; align-items: center; justify-content: flex-start;
      min-height: 100vh; margin: 0; padding: 40px 20px; overflow-y: auto; position: relative;
      box-sizing: border-box; user-select: none;
    }
    
    #jackpotCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
    
    .btn-skip { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); color: #8e8e93; border: 1px solid var(--border-glass); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.2s; z-index: 100; backdrop-filter: blur(10px); }
    .btn-skip:hover { background: var(--mac-accent); color: #1c1c1e; box-shadow: 0 0 15px rgba(226, 180, 189, 0.4); }

    .gacha-main-workspace {
      display: flex; gap: 35px; align-items: flex-start; justify-content: center;
      max-width: 1100px; width: 100%; z-index: 10; flex-wrap: wrap;
    }

    /* 📊 좌측 컨트롤 패널 */
    .sheet-control-panel {
      flex: 1.2; min-width: 500px; background: var(--bg-glass); border: 1px solid var(--border-glass);
      border-radius: 20px; padding: 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      display: flex; flex-direction: column; gap: 24px; backdrop-filter: blur(30px);
    }
    .sheet-top-row { display: flex; gap: 14px; align-items: center; }
    .sheet-box { 
      background: rgba(255,255,255,0.015); border: 1px solid var(--border-glass); 
      border-radius: 10px; padding: 10px 14px; text-align: center; flex: 1;
    }
    .sheet-box-title { font-size: 11px; color: #8e8e93; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
    .sheet-box input[type="number"] {
      width: 70px; background: transparent; border: none; color: #ff453a; font-family: 'Space Mono';
      font-size: 20px; font-weight: 700; text-align: center; outline: none;
    }
    .btn-reset {
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); color: #fff;
      font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(255, 255, 255, 0.12); }
    
    .btn-click {
      flex: 1.6; background: var(--mac-accent); color: #1c1c1e; border: none; border-radius: 10px;
      padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(226, 180, 189, 0.2);
    }
    .btn-click:hover { background: #f2f2f7; transform: translateY(-1px); }
    .btn-click:disabled { background: #2c2c2e; color: #48484a; cursor: default; box-shadow: none; transform: none; }

    .participant-table { display: flex; flex-direction: column; gap: 12px; }
    .table-header { display: grid; grid-template-columns: 1.2fr 2.3fr 0.7fr; padding: 0 10px; font-size: 12px; color: #8e8e93; font-weight: 600; }
    
    .table-row {
      display: grid; grid-template-columns: 1.2fr 2.3fr 0.7fr; gap: 16px; align-items: center;
      background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255,255,255,0.04);
      padding: 12px; border-radius: 12px; transition: all 0.2s ease;
    }
    .table-row.active { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.1); }
    
    .table-row input[type="text"] {
      background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #fff; font-size: 13.5px; padding: 4px; outline: none; width: 100%; box-sizing: border-box;
    }
    .table-row input[type="text"]:focus { border-bottom-color: #0a84ff; }
    
    .mac-capsule-control {
      display: flex; background: rgba(255, 255, 255, 0.04); border-radius: 8px;
      padding: 2px; border: 1px solid rgba(255, 255, 255, 0.02); justify-content: space-between; gap: 2px;
    }
    .capsule-chip-label {
      flex: 1; text-align: center; font-size: 11px; font-weight: 600; padding: 6px 0;
      border-radius: 6px; cursor: pointer; color: #8e8e93; position: relative;
      transition: color 0.15s, background 0.15s;
    }
    .capsule-chip-label input[type="radio"] { display: none; }
    .capsule-chip-label:hover { color: #fff; background: rgba(255, 255, 255, 0.03); }
    .capsule-chip-label:has(input[type="radio"]:checked) {
      color: #fff; background: var(--theme-color);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .result-score { font-family: 'Space Mono'; font-size: 16px; font-weight: 700; text-align: center; color: #48484a; }
    .table-row.active .result-score { color: #8e8e93; }
    .table-row.done .result-score { color: #ff453a; }
    .table-row.done.jackpot-row .result-score { color: var(--mac-accent); text-shadow: 0 0 8px var(--mac-accent); }

    /* 우측 가챠 머신 패널 */
    .gacha-machine-panel { flex: 0.8; min-width: 280px; display: flex; flex-direction: column; align-items: center; gap: 24px; z-index: 10; }
    .header-main { font-family: 'Poiret One', cursive; font-size: 38px; font-weight: 400; color: var(--mac-accent); margin: 0; letter-spacing: 6px; text-shadow: 0 4px 15px rgba(226, 180, 189, 0.15); }
    .machine-frame { background: #161618; padding: 16px; border-radius: 44px; border: 1px solid #2c2c2e; box-shadow: 0 30px 60px rgba(0,0,0,0.5); width: 250px; box-sizing: border-box; }
    .slot-display { width: 100%; height: 210px; border-radius: 32px; overflow: hidden; position: relative; background: #000000; border: 1px solid rgba(255,255,255,0.03); }
    .curve-shadow { position: absolute; left: 0; width: 100%; height: 85px; z-index: 15; pointer-events: none; }
    .top-shadow { top: 0; background: linear-gradient(to bottom, #000, transparent); }
    .bottom-shadow { bottom: 0; background: linear-gradient(to top, #000, transparent); }
    .center-line { position: absolute; top: 50%; left: 8%; width: 84%; height: 1px; background: var(--mac-accent); box-shadow: 0 0 12px var(--mac-accent); transform: translateY(-50%); z-index: 25; pointer-events: none; }
    .reel { position: absolute; width: 100%; top: 0; display: flex; flex-direction: column; align-items: center; }
    
    .spinning { transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1); }
    .snap-smooth, .snap-undershoot, .snap-overshoot { transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
    
    .number { height: 85px; line-height: 85px; font-size: 50px; font-family: 'Space Mono', monospace; color: #2c2c2e; font-weight: 700; }
    .final-hit { color: #ff453a !important; }
    .jackpot-hit { color: var(--mac-accent) !important; text-shadow: 0 0 20px rgba(226, 180, 189, 0.6); }

    .btn-save { display: none; padding: 14px 45px; background: rgba(255,255,255,0.06); color: #fff; font-weight: 600; border: 1px solid var(--border-glass); border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .btn-save:hover { background: #ffffff; color: #1c1c1e; }

    /* 하단 세이브 히스토리 시트 */
    .history-sheet {
      max-width: 1100px; width: 100%; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px; padding: 22px; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      display: none; flex-direction: column; gap: 14px; backdrop-filter: blur(20px);
    }
    .history-title { font-size: 13px; color: #8e8e93; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
    .history-title::before { content: '📂'; }
    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .history-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .history-card .p-info { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .history-card .p-dot { width: 8px; height: 8px; border-radius: 50%; }
    .history-card .p-score { font-family: 'Space Mono'; font-weight: 700; font-size: 15px; color: #ff453a; }
    .history-card.jackpot .p-score { color: var(--mac-accent); text-shadow: 0 0 6px var(--mac-accent); }
    
    .network-badge { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }
  </style>
</head>
<body>
  <canvas id="jackpotCanvas"></canvas>
  <div class="network-badge"><div class="network-dot"></div><span>FIREBASE REALTIME ONLINE</span></div>
  <button class="btn-skip" id="skipBtn" style="display:none;" onclick="skipAll()">»</button>
  
  <div class="gacha-main-workspace">
    <div class="sheet-control-panel">
      <div class="sheet-top-row">
        <div class="sheet-box">
          <div class="sheet-box-title">최대값</div>
          <input type="number" id="maxValInput" min="1" max="99" value="5" oninput="pushGridToFirebase()">
        </div>
        <div class="sheet-box">
          <div class="sheet-box-title">SYSTEM ARCHIVE</div>
          <button class="btn-reset" onclick="triggerFirebaseReset()">RESET GRID</button>
        </div>
        <button class="btn-click" id="clickBtn" onclick="triggerFirebaseStart()">START GACHA MACHINE</button>
      </div>

      <div class="participant-table">
        <div class="table-header">
          <span>PARTICIPANT NAME</span>
          <center>CHIPS SELECTION</center>
          <center>SCORE SHEET</center>
        </div>
        <div id="tableRowsContainer"></div>
      </div>
    </div>

    <div class="gacha-machine-panel">
      <div class="header-box">
        <h1 class="header-main">NEMO GACHA</h1>
      </div>
      <div class="machine-frame">
        <div class="slot-display">
          <div class="top-shadow curve-shadow"></div>
          <div class="bottom-shadow curve-shadow"></div>
          <div class="center-line"></div>
          <div id="reel" class="reel"></div>
        </div>
      </div>
      <button id="saveBtn" class="btn-save" onclick="saveGachaResult()">SAVE RESULT</button>
    </div>
  </div>

  <div class="history-sheet" id="historySheet">
    <div class="history-title">SAVED SESSION RECORDS</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <script>
    // 보내준 Firebase 정보 연동
    const firebaseConfig = {
      apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
      authDomain: "nemotool.firebaseapp.com",
      databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
      projectId: "nemotool",
      storageBucket: "nemotool.firebasestorage.app",
      messagingSenderId: "1003940918420",
      appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_gacha_session");

    var reel = document.getElementById('reel');
    var clickBtn = document.getElementById('clickBtn');
    var saveBtn = document.getElementById('saveBtn');
    var skipBtn = document.getElementById('skipBtn');
    var historySheet = document.getElementById('historySheet');
    var historyGrid = document.getElementById('historyGrid');
    
    var isSkipped = false;
    var isRunning = false;
    var ITEM_HEIGHT = 85;
    var DISPLAY_HEIGHT = 210;
    var CENTER_OFFSET = (DISPLAY_HEIGHT / 2) - (ITEM_HEIGHT / 2); 
    
    var colorHexMap = { "빨간색": "#ff453a", "주황색": "#ff9f0a", "노랑색": "#ffd60a", "초록색": "#30d158", "파랑색": "#0a84ff", "보라색": "#bf5af2" };
    var colorList = ["빨간색", "주황색", "노랑색", "초록색", "파랑색", "보라색"];
    var colorShortMap = { "빨간색": "빨", "주황색": "주", "노랑색": "노", "초록색": "초", "파랑색": "파", "보라색": "보" };

    var container = document.getElementById("tableRowsContainer");
    for (let i = 0; i < 6; i++) {
      let row = document.createElement("div");
      row.className = "table-row";
      row.id = `row-${i}`;
      
      let segmentsHtml = colorList.map(color => `
        <label class="capsule-chip-label" style="--theme-color: ${colorHexMap[color]};">
          <input type="radio" name="color-${i}" value="${color}" onchange="activateRow(${i})">
          <span>${colorShortMap[color]}</span>
        </label>
      `).join('');

      row.innerHTML = `
        <input type="text" id="name-${i}" placeholder="Enter Name" oninput="activateRow(${i})">
        <div class="mac-capsule-control">
          ${segmentsHtml}
        </div>
        <div class="result-score" id="score-${i}">--</div>
      `;
      container.appendChild(row);
    }

    // 🌐 Firebase Realtime 스트리밍 감지기
    db.on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // 실시간 입력창 동기화
      if (data.grid && !isRunning) {
        data.grid.forEach((item, idx) => {
          const nameInput = document.getElementById(`name-${idx}`);
          if(nameInput.value !== item.name) nameInput.value = item.name;
          
          if(item.color) {
            var rad = document.querySelector(`input[name="color-${idx}"][value="${item.color}"]`);
            if(rad && !rad.checked) rad.checked = true;
          } else {
            var checked = document.querySelector(`input[name="color-${idx}"]:checked`);
            if(checked) checked.checked = false;
          }
          
          var row = document.getElementById(`row-${idx}`);
          if (item.name.trim() !== "" && item.color) row.classList.add("active");
          else row.classList.remove("active");
        });
      }
      
      if (data.maxVal && !isRunning) {
        document.getElementById("maxValInput").value = data.maxVal;
      }

      // 실시간 머신 동시 작동 시그널
      if (data.status === "spinning" && !isRunning) {
        runGachaMachine(data.seedPool);
      }

      // 실시간 리셋 시그널
      if (data.status === "reset" && !isRunning) {
        localResetGrid();
      }
    });

    function pushGridToFirebase() {
      if (isRunning) return;
      var gridData = [];
      for(let i=0; i<6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var checkedColor = document.querySelector(`input[name="color-${i}"]:checked`);
        gridData.push({ name: name, color: checkedColor ? checkedColor.value : null });
      }
      db.update({
        grid: gridData,
        maxVal: document.getElementById("maxValInput").value,
        status: "ready"
      });
    }

    function activateRow(idx) {
      var name = document.getElementById(`name-${idx}`).value;
      var checkedColor = document.querySelector(`input[name="color-${idx}"]:checked`);
      var row = document.getElementById(`row-${idx}`);
      if (name.trim() !== "" && checkedColor) row.classList.add("active");
      else row.classList.remove("active");
      
      pushGridToFirebase();
    }

    function triggerFirebaseReset() {
      if (isRunning) return;
      db.update({ status: "reset" }).then(() => {
        localResetGrid();
      });
    }

    function localResetGrid() {
      for (let i = 0; i < 6; i++) {
        document.getElementById(`name-${i}`).value = "";
        var checked = document.querySelector(`input[name="color-${i}"]:checked`);
        if(checked) checked.checked = false;
        document.getElementById(`score-${i}`).innerText = "--";
        document.getElementById(`row-${i}`).className = "table-row";
      }
      reel.style.transition = 'none';
      reel.style.transform = 'none';
      reel.innerHTML = ""; 
      saveBtn.style.display = "none"; clickBtn.disabled = false;
      historyGrid.innerHTML = "";
      historySheet.style.display = "none";
    }

    function triggerFirebaseStart() {
      if (isRunning) return;
      var maxVal = parseInt(document.getElementById("maxValInput").value) || 5;
      
      var seedPool = [];
      for (var i = 0; i <= maxVal; i++) seedPool.push(i === 0 ? 0 : -i);
      for (var i = seedPool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = seedPool[i]; seedPool[i] = seedPool[j]; seedPool[j] = temp;
      }

      db.update({
        status: "spinning",
        seedPool: seedPool
      });
    }

    function createNumberElement(max, excludeValue) {
      var div = document.createElement('div'); div.className = 'number';
      var val;
      do {
        var tmp = Math.floor(Math.random() * (max + 1));
        val = (tmp === 0 ? 0 : -tmp);
      } while (excludeValue !== undefined && Math.abs(val - excludeValue) < 2);
      div.innerText = val; return div;
    }

    function appendRandomNumbers(max, count) {
      var fragment = document.createDocumentFragment();
      for(var j=0; j < count; j++) { fragment.appendChild(createNumberElement(max)); }
      reel.appendChild(fragment);
    }

    function wait(ms) {
      return new Promise(resolve => {
        var start = Date.now();
        var timer = setInterval(() => {
          if (isSkipped || (Date.now() - start) >= ms) { clearInterval(timer); resolve(); }
        }, 30);
      });
    }

    async function runGachaMachine(seedPool) {
      var maxVal = parseInt(document.getElementById("maxValInput").value) || 5;
      var activeParticipants = [];

      for (let i = 0; i < 6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var checkedColor = document.querySelector(`input[name="color-${i}"]:checked`);
        if (name.trim() !== "" && checkedColor) {
          activeParticipants.push({ id: i, name: name, color: checkedColor.value, score: null });
        }
      }

      if (activeParticipants.length === 0) { return; }

      isRunning = true; clickBtn.disabled = true; skipBtn.style.display = "block"; 
      
      reel.style.transition = 'none';
      reel.style.transform = 'translateY(0px)';
      reel.innerHTML = "";
      isSkipped = false;

      var colorScoreMap = {};
      colorList.forEach((color, idx) => {
        colorScoreMap[color] = seedPool[idx % seedPool.length];
      });

      activeParticipants.forEach(p => { p.score = colorScoreMap[p.color]; });

      var spacer = document.createElement('div'); spacer.className = 'number'; reel.appendChild(spacer); 

      for (var i = 0; i < activeParticipants.length; i++) {
        if (isSkipped) break;
        var p = activeParticipants[i];
        var rowEl = document.getElementById(`row-${p.id}`);
        
        rowEl.style.borderColor = colorHexMap[p.color];

        var spinCount = 24; 
        var startIndex = reel.children.length;
        appendRandomNumbers(maxVal, spinCount - 1);
        reel.appendChild(createNumberElement(maxVal, p.score));

        var f = document.createElement('div'); f.className = 'number'; f.id = 'target-' + i; f.innerText = p.score; reel.appendChild(f); 
        var finalTargetIndex = startIndex + spinCount;
        reel.appendChild(createNumberElement(maxVal, p.score));
        appendRandomNumbers(maxVal, 2);
        
        await new Promise(r => requestAnimationFrame(() => setTimeout(r, 20)));
        var targetY = (finalTargetIndex * ITEM_HEIGHT) - CENTER_OFFSET;
        var rand = Math.random();
        var mode = (rand < 0.2) ? 'A' : (rand < 0.6 ? 'B' : 'C');

        reel.className = 'reel spinning';
        var stopOffset = mode === 'B' ? -35 : (mode === 'C' ? 35 : 0);
        reel.style.transform = 'translateY(-' + (targetY + stopOffset) + 'px)';
        
        await wait(3800); 

        if(!isSkipped) {
          var snapClass = (mode === 'A') ? 'snap-smooth' : (mode === 'B' ? 'snap-undershoot' : 'snap-overshoot');
          reel.className = 'reel ' + snapClass; reel.style.transform = 'translateY(-' + targetY + 'px)';
          await wait(300); 

          var targetEl = document.getElementById('target-' + i);
          rowEl.classList.add("done");
          
          if (p.score === 0) {
            targetEl.className = 'number jackpot-hit'; rowEl.classList.add('jackpot-row'); triggerJackpotBurst();
          } else {
            targetEl.className = 'number final-hit';
          }
          document.getElementById(`score-${p.id}`).innerText = p.score;
          await wait(600);
        }
      }
      showFinalGachaState(activeParticipants);
    }

    function skipAll() { isSkipped = true; }

    function showFinalGachaState(activeParticipants) {
      var canvas = document.getElementById('jackpotCanvas');
      if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      reel.style.transition = 'none';
      activeParticipants.forEach((p) => {
        var rowEl = document.getElementById(`row-${p.id}`);
        document.getElementById(`score-${p.id}`).innerText = p.score;
        rowEl.classList.add("done");
        if (p.score === 0) rowEl.classList.add('jackpot-row');
      });
      document.querySelectorAll(".table-row").forEach(r => r.style.borderColor = "");
      skipBtn.style.display = 'none'; saveBtn.style.display = 'block'; isRunning = false;
      db.update({ status: "done" });
    }

    function triggerJackpotBurst() {
      var canvas = document.getElementById('jackpotCanvas'); var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      var particles = [];
      for(var i=0; i<60; i++) {
        particles.push({ x: canvas.width/2 + 160, y: canvas.height/2.5, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12 - 4, w: Math.random()*3+1, h: Math.random()*3+1, color: i % 2 === 0 ? '#e2b4bd' : '#ffffff', life: 1.0 });
      }
      function animate() {
        if (isSkipped) return; ctx.clearRect(0,0,canvas.width, canvas.height); var alive = false;
        particles.forEach(p => {
          if(p.life > 0) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.02;
            ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.w, 0, Math.PI*2); ctx.fill(); ctx.restore(); alive = true;
          }
        });
        if(alive) requestAnimationFrame(animate);
      }
      animate();
    }

    function saveGachaResult() {
      historySheet.style.display = "flex";
      for (let i = 0; i < 6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var checkedColor = document.querySelector(`input[name="color-${i}"]:checked`);
        var scoreText = document.getElementById(`score-${i}`).innerText;
        
        if (name.trim() !== "" && checkedColor && scoreText !== "--") {
          var card = document.createElement("div");
          card.className = "history-card";
          if (scoreText === "0") card.classList.add("jackpot");
          
          card.innerHTML = `
            <div class="p-info">
              <div class="p-dot" style="background: ${colorHexMap[checkedColor.value]}"></div>
              <span>${name} (${checkedColor.value})</span>
            </div>
            <div class="p-score">${scoreText}</div>
          `;
          historyGrid.appendChild(card);
        }
      }
      saveBtn.style.display = "none";
      clickBtn.disabled = false;
    }
  </script>
</body>
</html>
