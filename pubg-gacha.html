<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>NEMO GACHA SYSTEM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poiret+One&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
    
    body { 
      background: #0f0f12; color: #d1d1d6; font-family: 'Inter', sans-serif; 
      display: flex; gap: 30px; align-items: center; justify-content: center;
      height: 100vh; margin: 0; padding: 20px; overflow: hidden; position: relative;
      box-sizing: border-box; user-select: none;
    }
    #jackpotCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
    .btn-skip { position: absolute; top: 15px; right: 15px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.03); color: #636366; border: 1px solid rgba(226, 180, 189, 0.2); border-radius: 50%; cursor: pointer; font-size: 14px; transition: all 0.3s ease; z-index: 100; backdrop-filter: blur(10px); }
    .btn-skip:hover { background: rgba(226, 180, 189, 0.8); color: #1c1c1e; border-color: #e2b4bd; box-shadow: 0 0 15px rgba(226, 180, 189, 0.3); }

    /* 📊 좌측 컨트롤 패널 (구글 시트 레이아웃 완벽 고증 및 Mac化) */
    .sheet-control-panel {
      width: 480px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; gap: 18px; z-index: 10;
    }
    .sheet-top-row { display: flex; gap: 12px; }
    .sheet-box { 
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
      border-radius: 8px; padding: 8px 12px; text-align: center; flex: 1;
    }
    .sheet-box-title { font-size: 11px; color: #8e8e93; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .sheet-box input[type="number"] {
      width: 60px; background: transparent; border: none; color: #ff3b30; font-family: 'Space Mono';
      font-size: 18px; font-weight: 700; text-align: center; outline: none;
    }
    .btn-reset {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;
      font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.15); }
    
    .btn-click {
      flex: 1.5; background: #e2b4bd; color: #1c1c1e; border: none; border-radius: 8px;
      font-size: 18px; font-weight: 700; font-family: 'Inter'; cursor: pointer;
      transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(226, 180, 189, 0.2);
    }
    .btn-click:hover { background: #f2f2f7; transform: translateY(-1px); }
    .btn-click:disabled { background: #3a3a3c; color: #636366; cursor: default; box-shadow: none; transform: none; }

    /* 참가자 등록 Grid 테이블 */
    .participant-table { display: flex; flex-direction: column; gap: 8px; }
    .table-header { display: grid; grid-template-columns: 1.2fr 2fr 0.8fr; padding: 0 8px; font-size: 11px; color: #8e8e93; font-weight: 600; }
    .table-row {
      display: grid; grid-template-columns: 1.2fr 2fr 0.8fr; gap: 10px; align-items: center;
      background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05);
      padding: 8px; border-radius: 8px; transition: all 0.3s ease;
    }
    .table-row.active { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); }
    .table-row input[type="text"] {
      background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 13px; padding: 2px 4px; outline: none; width: 100%; box-sizing: border-box;
    }
    .table-row input[type="text"]:focus { border-bottom-color: #007aff; }
    
    /* 빨주노초파보 커스텀 색상 피커 */
    .color-picker-group { display: flex; gap: 5px; justify-content: space-between; }
    .color-dot-label {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; display: block; position: relative; transition: transform 0.15s;
    }
    .color-dot-label:hover { transform: scale(1.15); }
    .color-dot-label input[type="radio"] { display: none; }
    .color-dot-label input[type="radio"]:checked + .dot-core { transform: scale(0.6); border: 2px solid #fff; }
    .dot-core {
      position: absolute; top:0; left:0; right:0; bottom:0; border-radius: 50%;
      background: var(--picker-color); transition: transform 0.15s;
    }

    .result-score { font-family: 'Space Mono'; font-size: 15px; font-weight: 700; text-align: center; color: #8e8e93; }
    .table-row.done .result-score { color: #ff3b30; }
    .table-row.done.jackpot-row .result-score { color: #e2b4bd; text-shadow: 0 0 8px #e2b4bd; }

    /* 🎰 우측 가챠 머신 프레임 */
    .gacha-machine-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
    .header-box { text-align: center; }
    .header-main { font-family: 'Poiret One', cursive; font-size: 34px; font-weight: 400; color: #e2b4bd; margin: 0; letter-spacing: 4px; }
    .machine-frame { background: #1c1c1e; padding: 12px; border-radius: 40px; border: 1px solid #3a3a3c; box-shadow: 0 30px 60px rgba(0,0,0,0.6); width: 240px; }
    .slot-display { width: 200px; height: 200px; border-radius: 30px; overflow: hidden; position: relative; margin: 0 auto; background: #000000; }
    .curve-shadow { position: absolute; left: 0; width: 100%; height: 80px; z-index: 15; pointer-events: none; }
    .top-shadow { top: 0; background: linear-gradient(to bottom, #000, transparent); }
    .bottom-shadow { bottom: 0; background: linear-gradient(to top, #000, transparent); }
    .center-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 1px; background: #e2b4bd; box-shadow: 0 0 10px #e2b4bd; transform: translateY(-50%); z-index: 25; pointer-events: none; }
    .reel { position: absolute; width: 100%; top: 0; display: flex; flex-direction: column; align-items: center; will-change: transform; }
    .spinning { transition: transform 6.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .snap-smooth, .snap-undershoot, .snap-overshoot { transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
    .number { height: 80px; line-height: 80px; font-size: 48px; font-family: 'Space Mono', monospace; color: #2c2c2e; font-weight: 700; }
    .final-hit { color: #ff3b30 !important; }
    .jackpot-hit { color: #e2b4bd !important; text-shadow: 0 0 20px rgba(226, 180, 189, 0.6); animation: softPulse 0.5s infinite alternate; }
    @keyframes softPulse { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.05); } }

    .btn-finish { display: none; padding: 12px 40px; background: rgba(255,255,255,0.08); color: #fff; font-weight: 600; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .btn-finish:hover { background: #ffffff; color: #1c1c1e; }
  </style>
</head>
<body>
  <audio id="gachaAudio" src=""></audio>
  <canvas id="jackpotCanvas"></canvas>
  <button class="btn-skip" id="skipBtn" style="display:none;" onclick="skipAll()">»</button>
  
  <div class="sheet-control-panel">
    <div class="sheet-top-row">
      <div class="sheet-box">
        <div class="sheet-box-title">- 최대값 (B3)</div>
        <input type="number" id="maxValInput" min="1" max="99" value="5">
      </div>
      <div class="sheet-box">
        <div class="sheet-box-title">초기화 (C3)</div>
        <button class="btn-reset" onclick="resetGachaGrid()">RESET</button>
      </div>
      <button class="btn-click" id="clickBtn" onclick="runGachaMachine()">CLICK (D2)</button>
    </div>

    <div class="participant-table">
      <div class="table-header">
        <span>참가자 이름 (B열)</span>
        <center>지정 색상 (C열)</center>
        <center>결과값 (D열)</center>
      </div>
      
      <div id="tableRowsContainer"></div>
    </div>
  </div>

  <div class="gacha-machine-panel">
    <div class="header-box">
      <h1 class="header-main">NEMO GACHA</h1>
    </div>
    <div class="machine-frame">
      <div class="slot-display">
        <div class="top-shadow curve-shadow"></div>
        <div class="bottom-shadow curve-shadow"></div>
        <div class="center-line"></div>
        <div id="reel" class="reel"></div>
      </div>
    </div>
    <button id="finishBtn" class="btn-finish" onclick="closeGachaApp()">CLOSE WINDOW</button>
  </div>

  <script>
    var reel = document.getElementById('reel');
    var clickBtn = document.getElementById('clickBtn');
    var finishBtn = document.getElementById('finishBtn');
    var skipBtn = document.getElementById('skipBtn');
    
    var isSkipped = false;
    var isRunning = false;
    var ITEM_HEIGHT = 80;
    var DISPLAY_HEIGHT = 200;
    var CENTER_OFFSET = (DISPLAY_HEIGHT / 2) - (ITEM_HEIGHT / 2); 
    
    var colorHexMap = { "빨간색": "#ff3b30", "주황색": "#ff9500", "노랑색": "#ffcc00", "초록색": "#34c759", "파랑색": "#007aff", "보라색": "#af52de" };
    var colorList = ["빨간색", "주황색", "노랑색", "초록색", "파랑색", "보라색"];

    // 6개의 열 빌드
    var container = document.getElementById("tableRowsContainer");
    for (let i = 0; i < 6; i++) {
      let row = document.createElement("div");
      row.className = "table-row";
      row.id = `row-${i}`;
      
      let pickerHtml = colorList.map(color => `
        <label class="color-dot-label" style="--picker-color: ${colorHexMap[color]};">
          <input type="radio" name="color-${i}" value="${color}" onchange="activateRow(${i})">
          <div class="dot-core"></div>
        </label>
      `).join('');

      row.innerHTML = `
        <input type="text" id="name-${i}" placeholder="이름 입력" oninput="activateRow(${i})">
        <div class="color-picker-group">${pickerHtml}</div>
        <div class="result-score" id="score-${i}">--</div>
      `;
      container.appendChild(row);
    }

    function activateRow(idx) {
      var name = document.getElementById(`name-${idx}`).value;
      var checkedColor = document.querySelector(`input[name="color-${idx}"]:checked`);
      var row = document.getElementById(`row-${idx}`);
      if (name.trim() !== "" && checkedColor) {
        row.classList.add("active");
      } else {
        row.classList.remove("active");
      }
    }

    function resetGachaGrid() {
      if(isRunning) return;
      for (let i = 0; i < 6; i++) {
        document.getElementById(`name-${i}`).value = "";
        var checked = document.querySelector(`input[name="color-${i}"]:checked`);
        if(checked) checked.checked = false;
        document.getElementById(`score-${i}`).innerText = "--";
        var row = document.getElementById(`row-${i}`);
        row.className = "table-row";
      }
      reel.innerHTML = "";
      reel.style.transform = "none";
      finishBtn.style.display = "none";
      clickBtn.disabled = false;
    }

    function createNumberElement(maxVal, excludeValue) {
      var div = document.createElement('div');
      div.className = 'number';
      var val;
      do {
        var tmp = Math.floor(Math.random() * (maxVal + 1));
        val = (tmp === 0 ? 0 : -tmp);
      } while (excludeValue !== undefined && Math.abs(val - excludeValue) < 2);
      div.innerText = val;
      return div;
    }

    function appendRandomNumbers(maxVal, count) {
      var fragment = document.createDocumentFragment();
      for(var j=0; j < count; j++) { fragment.appendChild(createNumberElement(maxVal)); }
      reel.appendChild(fragment);
    }

    function wait(ms) {
      return new Promise(resolve => {
        var start = Date.now();
        var timer = setInterval(() => {
          if (isSkipped || (Date.now() - start) >= ms) { clearInterval(timer); resolve(); }
        }, 40);
      });
    }

    async function runGachaMachine() {
      var maxVal = parseInt(document.getElementById("maxValInput").value) || 5;
      var activeParticipants = [];

      // 유효 참가자 데이터 스캔
      for (let i = 0; i < 6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var checkedColor = document.querySelector(`input[name="color-${i}"]:checked`);
        if (name.trim() !== "" && checkedColor) {
          activeParticipants.push({ id: i, color: checkedColor.value });
        }
      }

      if (activeParticipants.length === 0) {
        alert("이름과 색상이 모두 선택된 유효한 참가자가 없습니다.");
        return;
      }

      isRunning = true;
      clickBtn.disabled = true;
      skipBtn.style.display = "block";
      reel.innerHTML = "";
      
      // 난수 스코어 풀 생성
      var scorePool = [];
      for (var i = 0; i <= maxVal; i++) scorePool.push(i === 0 ? 0 : -i);
      for (var i = scorePool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = scorePool[i]; scorePool[i] = scorePool[j]; scorePool[j] = temp;
      }

      activeParticipants.forEach((p, idx) => {
        p.score = scorePool[idx % scorePool.length];
      });

      var spacer = document.createElement('div');
      spacer.className = 'number'; reel.appendChild(spacer); 

      for (var i = 0; i < activeParticipants.length; i++) {
        if (isSkipped) break;
        var p = activeParticipants[i];
        var rowEl = document.getElementById(`row-${p.id}`);
        
        // 탐색 행 하이라이트 집중
        document.querySelectorAll(".table-row").forEach(r => r.style.borderColor = "rgba(255,255,255,0.05)");
        rowEl.style.borderColor = colorHexMap[p.color];

        var spinCount = 35; 
        var startIndex = reel.children.length;
        appendRandomNumbers(maxVal, spinCount - 1);
        reel.appendChild(createNumberElement(maxVal, p.score));

        var f = document.createElement('div'); 
        f.className = 'number'; f.id = 'target-' + i;
        f.innerText = p.score; reel.appendChild(f); 
        
        var finalTargetIndex = startIndex + spinCount;
        reel.appendChild(createNumberElement(maxVal, p.score));
        appendRandomNumbers(maxVal, 2);
        
        await new Promise(r => requestAnimationFrame(() => setTimeout(r, 40)));
        var targetY = (finalTargetIndex * ITEM_HEIGHT) - CENTER_OFFSET;
        var rand = Math.random();
        var mode = (rand < 0.2) ? 'A' : (rand < 0.6 ? 'B' : 'C');

        reel.className = 'reel spinning';
        var stopOffset = mode === 'B' ? -40 : (mode === 'C' ? 40 : 0);
        reel.style.transform = 'translateY(-' + (targetY + stopOffset) + 'px)';
        
        await wait(6000); 

        if(!isSkipped) {
          var snapClass = (mode === 'A') ? 'snap-smooth' : (mode === 'B' ? 'snap-undershoot' : 'snap-overshoot');
          reel.className = 'reel ' + snapClass;
          reel.style.transform = 'translateY(-' + targetY + 'px)';
          await wait(400); 

          var targetEl = document.getElementById('target-' + i);
          rowEl.classList.add("done");
          
          if (p.score === 0) {
            targetEl.className = 'number jackpot-hit';
            rowEl.classList.add('jackpot-row');
            triggerJackpotBurst();
          } else {
            targetEl.className = 'number final-hit';
          }
          document.getElementById(`score-${p.id}`).innerText = p.score;
          await wait(1000);
        }
      }
      showFinalGachaState(activeParticipants);
    }

    function skipAll() { isSkipped = true; }

    function showFinalGachaState(activeParticipants) {
      var canvas = document.getElementById('jackpotCanvas');
      if (canvas) { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }
      reel.style.transition = 'none';
      
      activeParticipants.forEach((p) => {
        var rowEl = document.getElementById(`row-${p.id}`);
        document.getElementById(`score-${p.id}`).innerText = p.score;
        rowEl.classList.add("done");
        if (p.score === 0) rowEl.classList.add('jackpot-row');
      });
      
      document.querySelectorAll(".table-row").forEach(r => r.style.borderColor = "");
      skipBtn.style.display = 'none';
      finishBtn.style.display = 'block';
      isRunning = false;
    }

    function triggerJackpotBurst() {
      var canvas = document.getElementById('jackpotCanvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      var particles = [];
      for(var i=0; i<80; i++) {
        particles.push({ x: canvas.width/2 + 100, y: canvas.height/2.2, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12 - 4, w: Math.random()*3+1, h: Math.random()*3+1, color: i % 2 === 0 ? '#e2b4bd' : '#ffffff', life: 1.0 });
      }
      function animate() {
        if (isSkipped) return; 
        ctx.clearRect(0,0,canvas.width, canvas.height);
        var alive = false;
        particles.forEach(p => {
          if(p.life > 0) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.02;
            ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.w, 0, Math.PI*2); ctx.fill(); ctx.restore();
            alive = true;
          }
        });
        if(alive) requestAnimationFrame(animate);
      }
      animate();
    }

    function closeGachaApp() {
      if(window.parent && window.parent.closeApp) {
        window.parent.closeApp();
      }
    }
  </script>
</body>
</html>
