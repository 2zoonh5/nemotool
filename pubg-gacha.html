<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가챠머신</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poiret+One&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --mac-accent: #e2b4bd;
    }

    body { 
      background: #0f0f12; color: #d1d1d6; font-family: 'Inter', sans-serif; 
      display: flex; flex-direction: column; gap: 24px; align-items: center; justify-content: flex-start;
      min-height: 100vh; margin: 0; padding: 40px 20px; overflow-y: auto; position: relative;
      box-sizing: border-box; user-select: none;
    }
    
    #jackpotCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
    
    .btn-skip { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); color: #8e8e93; border: 1px solid var(--border-glass); border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.2s; z-index: 100; backdrop-filter: blur(10px); }
    .btn-skip:hover { background: var(--mac-accent); color: #1c1c1e; box-shadow: 0 0 15px rgba(226, 180, 189, 0.4); }

    .gacha-main-workspace {
      display: flex; gap: 35px; align-items: flex-start; justify-content: center;
      max-width: 1200px; width: 100%; z-index: 10; flex-wrap: wrap;
    }

    .sheet-control-panel {
      flex: 1.3; min-width: 480px; background: var(--bg-glass); border: 1px solid var(--border-glass);
      border-radius: 20px; padding: 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      display: flex; flex-direction: column; gap: 24px; backdrop-filter: blur(30px); box-sizing: border-box;
    }
    .sheet-top-row { display: flex; gap: 14px; align-items: center; width: 100%; }
    
    .mac-stepper-box {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); 
      border-radius: 10px; padding: 6px 14px; display: flex; align-items: center; gap: 12px; height: 52px; box-sizing: border-box;
    }
    .stepper-label-group { display: flex; flex-direction: column; text-align: left; }
    .mac-stepper-box input[type="number"] {
      width: 45px; background: transparent; border: none; color: #ff453a; font-family: 'Space Mono';
      font-size: 22px; font-weight: 700; text-align: center; outline: none; -moz-appearance: textfield;
    }
    .mac-stepper-box input[type="number"]::-webkit-outer-spin-button,
    .mac-stepper-box input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    
    .stepper-buttons { display: flex; flex-direction: column; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); width: 22px; }
    .stepper-btn { background: transparent; border: none; color: #fff; font-size: 10px; cursor: pointer; height: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .stepper-btn:hover { background: rgba(255, 255, 255, 0.15); }
    .stepper-btn:first-child { border-bottom: 1px solid rgba(255,255,255,0.08); }

    .btn-reset {
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); color: #fff;
      font-size: 13px; font-weight: 600; padding: 0 20px; border-radius: 10px; cursor: pointer; transition: background 0.2s; height: 52px; box-sizing: border-box; white-space: nowrap;
    }
    .btn-reset:hover { background: rgba(255, 255, 255, 0.12); }
    
    .btn-click {
      flex: 1.4; 
      background: rgba(226, 180, 189, 0.08); 
      color: var(--mac-accent); 
      border: 1px solid rgba(226, 180, 189, 0.35); 
      border-radius: 26px; 
      height: 52px; 
      font-size: 15.5px; 
      font-weight: 700; 
      cursor: pointer; 
      letter-spacing: 0.5px;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); 
      white-space: nowrap;
    }
    .btn-click:hover { 
      background: var(--mac-accent); 
      color: #161618; 
      border-color: var(--mac-accent);
      transform: translateY(-1px); 
      box-shadow: 0 8px 24px rgba(226, 180, 189, 0.25); 
    }
    .btn-click:active {
      transform: translateY(0px) scale(0.98); 
      box-shadow: 0 4px 12px rgba(226, 180, 189, 0.15);
    }
    .btn-click:disabled { background: #2c2c2e; color: #48484a; border-color: transparent; cursor: default; box-shadow: none; transform: none; }

    .participant-table { display: flex; flex-direction: column; } 
    .table-header { display: grid; grid-template-columns: 1.4fr 3fr 1.1fr; padding: 0 12px; font-size: 12.5px; color: #8e8e93; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; }
    .table-header center { text-align: center; }
    .table-header right-head { text-align: right; padding-right: 12px; }

    .table-row {
      display: grid; grid-template-columns: 1.4fr 3fr 1.1fr; gap: 14px; align-items: center;
      background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255,255,255,0.04);
      padding: 14px 16px; border-radius: 12px; 
      margin-bottom: 8px; 
      transition: all 0.2s ease; 
    }
    .table-row:last-child { margin-bottom: 0; } 
    .table-row.active { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.1); }
    .table-row.active-border { border-color: var(--theme-color) !important; }
    
    .table-row input[type="text"] {
      background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #fff; font-size: 14px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; font-weight: 500;
    }
    .table-row input[type="text"]:focus { border-bottom-color: #0a84ff; }
    
    .mac-capsule-control {
      display: flex; background: rgba(255, 255, 255, 0.04); border-radius: 8px;
      padding: 2px; border: 1px solid rgba(255, 255, 255, 0.02); justify-content: space-between; gap: 2px;
    }
    .capsule-chip-btn {
      flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 6px 0;
      border-radius: 6px; cursor: pointer; color: #8e8e93; position: relative; min-width: 24px;
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .capsule-chip-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.03); }
    .capsule-chip-btn.checked { color: #fff; background: var(--theme-color); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

    .result-score { font-family: 'Space Mono'; font-size: 17px; font-weight: 700; text-align: right; padding-right: 12px; color: #48484a; }
    .table-row.active .result-score { color: #8e8e93; }
    .table-row.done .result-score { color: #ff453a; }
    .table-row.done.jackpot-row .result-score { color: var(--mac-accent); text-shadow: 0 0 8px var(--mac-accent); }

    .gacha-machine-panel { flex: 0.7; min-width: 260px; display: flex; flex-direction: column; align-items: center; gap: 24px; z-index: 10; }
    .header-main { font-family: 'Poiret One', cursive; font-size: 38px; font-weight: 400; color: var(--mac-accent); margin: 0; letter-spacing: 6px; text-shadow: 0 4px 15px rgba(226, 180, 189, 0.15); }
    .machine-frame { background: #161618; padding: 16px; border-radius: 44px; border: 1px solid #2c2c2e; box-shadow: 0 30px 60px rgba(0,0,0,0.5); width: 245px; box-sizing: border-box; }
    .slot-display { width: 100%; height: 210px; border-radius: 32px; overflow: hidden; position: relative; background: #000000; border: 1px solid rgba(255,255,255,0.03); }
    .curve-shadow { position: absolute; left: 0; width: 100%; height: 85px; z-index: 15; pointer-events: none; }
    .top-shadow { top: 0; background: linear-gradient(to bottom, #000, transparent); }
    .bottom-shadow { bottom: 0; background: linear-gradient(to top, #000, transparent); }
    .center-line { position: absolute; top: 50%; left: 8%; width: 84%; height: 1px; background: var(--mac-accent); box-shadow: 0 0 12px var(--mac-accent); transform: translateY(-50%); z-index: 25; pointer-events: none; }
    .reel { position: absolute; width: 100%; top: 0; display: flex; flex-direction: column; align-items: center; }
    
    .spinning { transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1); }
    .snap-smooth, .snap-undershoot, .snap-overshoot { transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
    
    .number { height: 85px; line-height: 85px; font-size: 50px; font-family: 'Space Mono', monospace; color: #2c2c2e; font-weight: 700; }
    .final-hit { color: #ff453a !important; }
    .jackpot-hit { color: var(--mac-accent) !important; text-shadow: 0 0 20px rgba(226, 180, 189, 0.6); }

    .btn-save { display: none; padding: 14px 45px; background: rgba(255,255,255,0.06); color: #fff; font-weight: 600; border: 1px solid var(--border-glass); border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .btn-save:hover { background: #ffffff; color: #1c1c1e; }

    .history-sheet {
      max-width: 1200px; width: 100%; background: rgba(255, 255, 255, 0.015); border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px; padding: 22px; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      display: none; flex-direction: column; gap: 14px; backdrop-filter: blur(20px); box-sizing: border-box; margin-top: 10px;
    }
    .history-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 10px; }
    .history-title { font-size: 13.5px; color: #8e8e93; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
    .history-title::before { content: '📂'; }
    
    .btn-trash-clear {
      background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px; transition: background 0.15s; padding: 0;
    }
    .btn-trash-clear:hover { background: rgba(255,69,58,0.15); }
    .btn-trash-clear svg { width: 18px; height: 18px; fill: #ff453a; }

    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; width: 100%; }
    .history-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .history-card .p-info { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .history-card .p-dot { width: 8px; height: 8px; border-radius: 50%; }
    .history-card .p-score { font-family: 'Space Mono'; font-weight: 700; font-size: 15px; color: #ff453a; }
    .history-card.jackpot .p-score { color: var(--mac-accent); text-shadow: 0 0 6px var(--mac-accent); }
    
    .network-badge { position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

    .mac-alert-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
    }
    .mac-alert-modal {
      background: rgba(30, 30, 30, 0.75); border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px; width: 270px; padding: 20px 16px 14px 16px; text-align: center;
      box-shadow: 0 15px 45px rgba(0,0,0,0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      display: flex; flex-direction: column; gap: 4px; animation: macPop 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
    @keyframes macPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
    .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #a5a5a7; margin-bottom: 16px; line-height: 1.4; }
    .mac-alert-btn-container { display: flex; gap: 8px; justify-content: center; }
    .mac-alert-btn { flex: 1; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; }
    .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.05); }
    .mac-alert-btn.cancel:hover { background: rgba(255, 255, 255, 0.15); }
    .mac-alert-btn.confirm { background: #007aff; color: #ffffff; }
    .mac-alert-btn.confirm:hover { background: #148cff; }
  </style>
</head>
<body>
  <canvas id="jackpotCanvas"></canvas>
  <div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>
  <button class="btn-skip" id="skipBtn" style="display:none;" onclick="triggerLocalSkip()">»</button>
  
  <div class="mac-alert-overlay" id="macAlertOverlay">
    <div class="mac-alert-modal">
      <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
      <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
      <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
    </div>
  </div>

  <div class="gacha-main-workspace">
    <div class="sheet-control-panel">
      <div class="sheet-top-row">
        <div class="mac-stepper-box">
          <div class="stepper-label-group">
            <span class="sheet-box-title" style="margin-bottom:2px;">최대값</span>
          </div>
          <input type="number" id="maxValInput" min="1" max="99" value="5" readonly>
          <div class="stepper-buttons">
            <button class="stepper-btn" onclick="stepMaxVal(1)">▲</button>
            <button class="stepper-btn" onclick="stepMaxVal(-1)">▼</button>
          </div>
        </div>
        
        <button class="btn-reset" onclick="askFirebaseReset()">초기화</button>
        <button class="btn-click" id="clickBtn" onclick="triggerFirebaseStart()">가챠머신 실행</button>
      </div>

      <div class="participant-table">
        <div class="table-header">
          <span>닉네임</span>
          <center>색상</center>
          <right-head>마이너스 값</right-head>
        </div>
        <div id="tableRowsContainer"></div>
      </div>
    </div>

    <div class="gacha-machine-panel">
      <div class="header-box">
        <h1 class="header-main">NEMO GACHA</h1>
      </div>
      <div class="machine-frame">
        <div class="slot-display">
          <div class="top-shadow curve-shadow"></div>
          <div class="bottom-shadow curve-shadow"></div>
          <div class="center-line"></div>
          <div id="reel" class="reel"></div>
        </div>
      </div>
      <button id="saveBtn" class="btn-save" onclick="triggerFirebaseSave()">결과값 저장</button>
    </div>
  </div>

  <div class="history-sheet" id="historySheet">
    <div class="history-header-row">
      <div class="history-title">가챠 결과 기록</div>
      <button class="btn-trash-clear" title="기록 전체 삭제" onclick="askTrashHistoryClear()">
        <svg viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
      </button>
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', e => {
        if (
            e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'i' || e.key === 'j')) || 
            (e.ctrlKey && (e.key === 'U' || e.key === 'u'))
        ) {
            e.preventDefault();
            return false;
        }
    });
    
    const firebaseConfig = {
      apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
      authDomain: "nemotool.firebaseapp.com",
      databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
      projectId: "nemotool",
      storageBucket: "nemotool.firebasestorage.app",
      messagingSenderId: "1003940918420",
      appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_gacha_session");

    const STATE = {
      IDLE: "idle",
      READY: "ready",
      SPINNING: "spinning",
      SKIP: "skip",
      RESULT: "result",
      SAVED: "saved",
      RESET: "reset"
    };

    var reel = document.getElementById('reel');
    var clickBtn = document.getElementById('clickBtn');
    var saveBtn = document.getElementById('saveBtn');
    var skipBtn = document.getElementById('skipBtn');
    var historySheet = document.getElementById('historySheet');
    var historyGrid = document.getElementById('historyGrid');
    
    var isSkipped = false;
    var isRunning = false;
    var ITEM_HEIGHT = 85;
    var DISPLAY_HEIGHT = 210;
    var CENTER_OFFSET = (DISPLAY_HEIGHT / 2) - (ITEM_HEIGHT / 2); 
    
    var colorHexMap = { "빨간색": "#ff453a", "주황색": "#ff9f0a", "노랑색": "#ffd60a", "초록색": "#30d158", "파랑색": "#0a84ff", "보라색": "#bf5af2" };
    var colorList = ["빨간색", "주황색", "노랑색", "초록색", "파랑색", "보라색"];
    var colorShortMap = { "빨간색": "빨", "주황색": "주", "노랑색": "노", "초록색": "초", "파랑색": "파", "보라색": "보" };

    var activeColorsState = ["", "", "", "", "", ""];

    var container = document.getElementById("tableRowsContainer");
    for (let i = 0; i < 6; i++) {
      let row = document.createElement("div");
      row.className = "table-row";
      row.id = `row-${i}`;
      
      let segmentsHtml = colorList.map(color => `
        <div class="capsule-chip-btn color-btn-${i}" data-color="${color}" style="--theme-color: ${colorHexMap[color]};" onclick="toggleColorBtn(${i}, '${color}')">
          <span>${colorShortMap[color]}</span>
        </div>
      `).join('');

      row.innerHTML = `
        <input type="text" id="name-${i}" placeholder="닉네임을 입력하세요" autocomplete="off" oninput="activateRow(${i})">
        <div class="mac-capsule-control">
          ${segmentsHtml}
        </div>
        <div class="result-score" id="score-${i}">--</div>
      `;
      container.appendChild(row);
    }

    function openMacAlert(title, subText, type, onConfirm) {
      const overlay = document.getElementById("macAlertOverlay");
      document.getElementById("macAlertTitle").innerText = title;
      document.getElementById("macAlertSub").innerText = subText;
      const btnBox = document.getElementById("macAlertBtnBox");
      btnBox.innerHTML = "";

      if (type === "confirm") {
        const cancelBtn = document.createElement("button");
        cancelBtn.className = "mac-alert-btn cancel";
        cancelBtn.innerText = "취소";
        cancelBtn.onclick = () => { overlay.style.display = "none"; };
        
        const confirmBtn = document.createElement("button");
        confirmBtn.className = "mac-alert-btn confirm";
        confirmBtn.innerText = "확인";
        confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
        
        btnBox.appendChild(cancelBtn);
        btnBox.appendChild(confirmBtn);
      } else {
        const alertBtn = document.createElement("button");
        alertBtn.className = "mac-alert-btn confirm";
        alertBtn.innerText = "확인";
        alertBtn.onclick = () => { overlay.style.display = "none"; };
        btnBox.appendChild(alertBtn);
      }
      overlay.style.display = "flex";
    }

    function stepMaxVal(amount) {
      if (isRunning) return;
      var input = document.getElementById("maxValInput");
      var current = parseInt(input.value) || 5;
      var next = current + amount;
      if (next >= 1 && next <= 99) {
        input.value = next;
        pushGridToFirebase();
      }
    }

    function toggleColorBtn(rowIdx, color) {
      if (isRunning) return;
      if (activeColorsState[rowIdx] === color) activeColorsState[rowIdx] = "";
      else activeColorsState[rowIdx] = color;
      
      renderCapsuleChips(rowIdx, activeColorsState[rowIdx]);
      activateRow(rowIdx);
    }

    function renderCapsuleChips(rowIdx, activeColor) {
      document.querySelectorAll(`.color-btn-${rowIdx}`).forEach(btn => {
        if (btn.getAttribute("data-color") === activeColor) btn.classList.add("checked");
        else btn.classList.remove("checked");
      });
    }

    function hardResetUI() {
      document.querySelectorAll(".table-row").forEach(r => {
        r.className = "table-row";
        r.classList.remove("active-border");
        r.style.borderColor = "";
      });
      document.querySelectorAll(".number").forEach(n => {
        n.className = "number";
      });
      for (let i = 0; i < 6; i++) {
        document.getElementById(`score-${i}`).innerText = "--";
      }
      reel.style.transition = 'none';
      reel.style.transform = 'translateY(0px)';
      reel.innerHTML = ""; 
      
      saveBtn.style.display = "none";
      clickBtn.disabled = true;
      skipBtn.style.display = "none";
    }

    db.on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      if (data.grid && !isRunning) {
        data.grid.forEach((item, idx) => {
          const nameInput = document.getElementById(`name-${idx}`);
          if(nameInput.value !== item.name) nameInput.value = item.name;
          
          activeColorsState[idx] = item.color || "";
          renderCapsuleChips(idx, activeColorsState[idx]);
          
          var row = document.getElementById(`row-${idx}`);
          row.classList.remove("active");
          if (item.name.trim() !== "" && item.color) row.classList.add("active");
        });
      }
      
      if (data.maxVal && !isRunning) {
        document.getElementById("maxValInput").value = data.maxVal;
      }

      handleSystemState(data);
    });

    function handleSystemState(data) {
      switch(data.state) {
        case STATE.READY:
          if (!isRunning) {
            clickBtn.disabled = false;
            saveBtn.style.display = "none";
            skipBtn.style.display = "none";
          }
          break;
        case STATE.SPINNING:
          if (!isRunning) {
            runGachaMachine(data.fullReelSequence, data.activeParticipants, data.modeSequence);
          }
          break;
        case STATE.SKIP:
          isSkipped = true;
          break;
        case STATE.RESET:
          localResetGrid();
          break;
        case STATE.SAVED:
          if (data.history) renderHistoryList(data.history);
          else {
            historyGrid.innerHTML = "";
            historySheet.style.display = "none";
          }
          break;
      }
    }

    function pushGridToFirebase() {
      if (isRunning) return;
      var gridData = [];
      for(let i=0; i<6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        gridData.push({ name: name, color: activeColorsState[i] || null });
      }
      db.update({
        grid: gridData,
        maxVal: document.getElementById("maxValInput").value,
        state: STATE.READY
      });
    }

    function activateRow(idx) {
      var nameVal = document.getElementById(`name-${idx}`).value;
      if (nameVal.trim() === "") {
        activeColorsState[idx] = ""; 
        renderCapsuleChips(idx, "");
      }
      pushGridToFirebase();
    }

    function askFirebaseReset() {
      if (isRunning) return;
      openMacAlert("참가자 명단 초기화", "작성 중인 모든 명단 정보를 지우시겠습니까?", "confirm", () => {
        executeFirebaseReset();
      });
    }

    function executeFirebaseReset() {
      for (let i = 0; i < 6; i++) {
        document.getElementById(`name-${i}`).value = "";
        activeColorsState[i] = "";
        renderCapsuleChips(i, "");
      }
      var gridData = [];
      for(let i=0; i<6; i++) {
        gridData.push({ name: "", color: null });
      }
      db.update({ 
        grid: gridData,
        state: STATE.RESET
      });
    }

    function askTrashHistoryClear() {
      openMacAlert("결과 기록 삭제", "저장된 가챠 결과 기록을 모두 삭제하시겠습니까?", "confirm", () => {
        db.update({
          state: STATE.SAVED,
          history: null
        });
      });
    }

    function localResetGrid() {
      hardResetUI();
      for (let i = 0; i < 6; i++) {
        activeColorsState[i] = "";
        renderCapsuleChips(i, "");
      }
      clickBtn.disabled = false;
      isRunning = false;
    }

    function triggerFirebaseStart() {
      if (isRunning) return;
      var maxVal = parseInt(document.getElementById("maxValInput").value) || 5;
      var activeParticipants = [];

      for (let i = 0; i < 6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var useColor = activeColorsState[i];
        if (name.trim() !== "" && useColor) {
          activeParticipants.push({ id: i, name: name, color: useColor, score: null });
        }
      }

      if (activeParticipants.length === 0) {
        openMacAlert("실행 불가 안내", "닉네임과 색상이 지정된 참가자가 없습니다.", "alert");
        return;
      }

      var seedPool = [];
      for (var i = 0; i <= maxVal; i++) seedPool.push(i === 0 ? 0 : -i);
      for (var i = seedPool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = seedPool[i]; seedPool[i] = seedPool[j]; seedPool[j] = temp;
      }

      var colorScoreMap = {};
      colorList.forEach((color, idx) => {
        colorScoreMap[color] = seedPool[idx % seedPool.length];
      });

      var fullReelSequence = []; 
      var modeSequence = [];

      function getFilteredRandomNum(max, lastNum, forbiddenList) {
        let val;
        let attempts = 0;
        do {
          let tmp = Math.floor(Math.random() * (max + 1));
          val = (tmp === 0 ? 0 : -tmp);
          attempts++;
        } while (
          (val === lastNum || (forbiddenList && forbiddenList.includes(val))) && attempts < 50
        );
        return val;
      }

      let lastNum = null;

      activeParticipants.forEach((p, pIdx) => {
        p.score = colorScoreMap[p.color];
        
        var rand = Math.random();
        modeSequence.push((rand < 0.2) ? 'A' : (rand < 0.6 ? 'B' : 'C'));

        let spoilerForbidden = [p.score];

        for (let k = 0; k < 27; k++) {
          if (k === 0 && pIdx === 0) {
            fullReelSequence.push(0);
            lastNum = 0;
          } else if (k === 24) {
            fullReelSequence.push(p.score);
            lastNum = p.score;
          } else if (k === 23 || k === 25) {
            let num = getFilteredRandomNum(maxVal, lastNum, spoilerForbidden);
            fullReelSequence.push(num);
            lastNum = num;
          } else {
            let num = getFilteredRandomNum(maxVal, lastNum);
            fullReelSequence.push(num);
            lastNum = num;
          }
        }
      });

      db.update({
        state: STATE.SPINNING,
        activeParticipants: activeParticipants,
        fullReelSequence: fullReelSequence,
        modeSequence: modeSequence
      });
    }

    function triggerLocalSkip() {
      db.update({ state: STATE.SKIP });
    }

    function wait(ms) {
      return new Promise(resolve => {
        var start = Date.now();
        var timer = setInterval(() => {
          if (isSkipped || (Date.now() - start) >= ms) { clearInterval(timer); resolve(); }
        }, 20);
      });
    }

    async function runGachaMachine(fullReelSequence, activeParticipants, modeSequence) {
      hardResetUI();
      isRunning = true;

      fullReelSequence.forEach((val, idx) => {
        var div = document.createElement('div');
        div.className = 'number';
        div.innerText = val;
        
        if (idx > 0 && idx % 27 === 24) {
          var pIdx = Math.floor(idx / 27);
          div.id = 'target-' + pIdx;
        }
        reel.appendChild(div);
      });

      reel.style.removeProperty("transition");
      reel.offsetHeight;
      await new Promise(resolve => requestAnimationFrame(resolve));
      await new Promise(resolve => requestAnimationFrame(resolve));

      var spinCount = 24;

      for (var i = 0; i < activeParticipants.length; i++) {
        if (isSkipped) break;
        var p = activeParticipants[i];
        var rowEl = document.getElementById(`row-${p.id}`);
        var mode = modeSequence[i];
        
        document.querySelectorAll(".table-row").forEach(r => r.classList.remove("active-border"));
        rowEl.style.setProperty('--theme-color', colorHexMap[p.color]);
        rowEl.classList.add("active-border");

        await new Promise(r => requestAnimationFrame(r));
        reel.className = 'reel spinning';
        await new Promise(r => requestAnimationFrame(r));

        var finalTargetIndex = (i * 27) + spinCount;
        var targetY = (finalTargetIndex * ITEM_HEIGHT) - CENTER_OFFSET;
        var stopOffset = mode === 'B' ? -35 : (mode === 'C' ? 35 : 0);
        
        reel.style.transform = 'translateY(-' + (targetY + stopOffset) + 'px)';
        await wait(4050); 

        if(!isSkipped) {
          var snapClass = (mode === 'A') ? 'snap-smooth' : (mode === 'B' ? 'snap-undershoot' : 'snap-overshoot');
          reel.className = 'reel ' + snapClass; 
          reel.style.transform = 'translateY(-' + targetY + 'px)';
          await wait(550); 

          document.querySelectorAll(".jackpot-hit, .final-hit").forEach(e => e.className = "number");

          var targetEl = document.getElementById('target-' + i);
          rowEl.classList.add("done");
          
          if (p.score === 0) {
            if(targetEl) targetEl.className = 'number jackpot-hit'; 
            rowEl.classList.add('jackpot-row'); 
            triggerJackpotBurst();
          } else {
            if(targetEl) targetEl.className = 'number final-hit';
          }
          document.getElementById(`score-${p.id}`).innerText = p.score;
          await wait(700);
        }
      }
      showFinalGachaState(activeParticipants);
    }

    function showFinalGachaState(activeParticipants) {
      var canvas = document.getElementById('jackpotCanvas');
      if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      
      reel.style.transition = 'none';
      document.querySelectorAll(".jackpot-hit, .final-hit").forEach(e => e.className = "number");

      activeParticipants.forEach((p) => {
        var rowEl = document.getElementById(`row-${p.id}`);
        document.getElementById(`score-${p.id}`).innerText = p.score;
        rowEl.classList.add("done");
        if (p.score === 0) rowEl.classList.add('jackpot-row');
      });
      
      document.querySelectorAll(".table-row").forEach(r => r.classList.remove("active-border"));
      
      skipBtn.style.display = 'none'; 
      saveBtn.style.display = 'block'; 
      clickBtn.disabled = false;
      isRunning = false;
      
      db.update({ state: STATE.RESULT });
    }

    function triggerJackpotBurst() {
      var canvas = document.getElementById('jackpotCanvas'); var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      var particles = [];
      for(var i=0; i<60; i++) {
        particles.push({ x: canvas.width/2 + 160, y: canvas.height/2.5, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12 - 4, w: Math.random()*3+1, h: Math.random()*3+1, color: i % 2 === 0 ? '#e2b4bd' : '#ffffff', life: 1.0 });
      }
      function animate() {
        if (isSkipped) return; ctx.clearRect(0,0,canvas.width, canvas.height); var alive = false;
        particles.forEach(p => {
          if(p.life > 0) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.02;
            ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.w, 0, Math.PI*2); ctx.fill(); ctx.restore(); alive = true;
          }
        });
        if(alive) requestAnimationFrame(animate);
      }
      animate();
    }

    function triggerFirebaseSave() {
      saveBtn.style.display = "none";
      var currentGachaData = [];
      for (let i = 0; i < 6; i++) {
        var name = document.getElementById(`name-${i}`).value;
        var useColor = activeColorsState[i];
        var scoreText = document.getElementById(`score-${i}`).innerText;
        
        if (name.trim() !== "" && useColor && scoreText !== "--") {
          currentGachaData.push({
            name: name,
            color: useColor,
            score: scoreText
          });
        }
      }

      db.once("value", (snapshot) => {
        var serverData = snapshot.val();
        if (serverData && serverData.state === STATE.SAVED) return; 

        var oldHistory = serverData?.history || [];
        var mergedHistory = [...oldHistory, ...currentGachaData];
        
        db.update({
          state: STATE.SAVED,
          history: mergedHistory
        });
      });
    }

    function renderHistoryList(historyData) {
      historySheet.style.display = "flex";
      historyGrid.innerHTML = ""; 
      
      historyData.forEach(item => {
        var card = document.createElement("div");
        card.className = "history-card";
        if (item.score === "0") card.classList.add("jackpot");
        
        card.innerHTML = `
          <div class="p-info">
            <div class="p-dot" style="background: ${colorHexMap[item.color]}"></div>
            <span>${item.name}</span>
          </div>
          <div class="p-score">${item.score}</div>
        `;
        historyGrid.appendChild(card);
      });

      saveBtn.style.display = "none";
      clickBtn.disabled = false;
    }
  </script>
</body>
