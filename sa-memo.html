<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --bg-main: #0c0c0e;
            --bg-glass-active: rgba(255, 255, 255, 0.04);
            --bg-glass-passive: rgba(255, 255, 255, 0.015);
            --border-glass: rgba(255, 255, 255, 0.06);
            --mac-blue: #007aff;
            --sa-orange: #ff9f0a;
            --sa-orange-hover: #ffb340;
            --sa-blue: #0a84ff;
            --sa-red: #ff453a;
            --text-dim: #aeaeb2;
            --text-gray: #8e8e93;
        }
        
        body {
            background: var(--bg-main); color: #d1d1d6; font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 40px 24px; overflow-y: auto; box-sizing: border-box;
            min-height: 100vh; user-select: none; position: relative;
        }

        .network-badge { 
            position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; 
            font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.3); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

        .container {
            max-width: 1450px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px;
        }

        .mac-app-header h1 {
            font-size: 36px; font-weight: 700; text-align: center; margin: 0 0 5px 0; letter-spacing: 4px; 
            background: linear-gradient(180deg, #ffffff 0%, #b5b5b7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.06));
        }

        .app-content {
            display: grid; grid-template-columns: 1.15fr 1fr; gap: 24px; align-items: stretch; width: 100%;
        }
        
        .setup-box {
            background: var(--bg-glass-active); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 16px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            box-sizing: border-box; min-height: 580px;
        }
        
        .control-system-row { display: flex; gap: 12px; width: 100%; align-items: flex-end; }
        
        .form-row { 
            flex: 1; display: flex; flex-direction: column; gap: 4px;
            background: rgba(255,255,255,0.015); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--border-glass); 
            box-sizing: border-box; height: 62px; justify-content: center;
        }
        .form-label { font-size: 11px; font-weight: 700; color: #8e8e93; letter-spacing: -0.1px; margin-bottom: 2px; }
        
        .mac-select {
            background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px; padding: 4px 24px 4px 10px; font-size: 12.5px; font-weight: 700; outline: none; cursor: pointer; width: 100%; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 10px;
            height: 28px; line-height: 20px; box-sizing: border-box;
        }
        .mac-select option { background: #1c1c1e; color: #fff; }

        .tier-table-wrapper {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%;
        }
        .tier-column {
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 12px; overflow: hidden; background: rgba(255, 255, 255, 0.008);
            display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .tier-column-header {
            padding: 10px 2px; font-size: 11.5px; font-weight: 700; text-align: center; color: #ffffff;
            letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 2px solid transparent;
        }
        .tier-column:nth-child(1) .tier-column-header { background: rgba(255, 69, 58, 0.08); border-bottom-color: rgba(255, 69, 58, 0.4); color: #ff453a; }
        .tier-column:nth-child(2) .tier-column-header { background: rgba(10, 132, 255, 0.08); border-bottom-color: rgba(10, 132, 255, 0.4); color: #0a84ff; }
        .tier-column:nth-child(3) .tier-column-header { background: rgba(48, 209, 88, 0.08); border-bottom-color: rgba(48, 209, 88, 0.4); color: #30d158; }
        .tier-column:nth-child(4) .tier-column-header { background: rgba(255, 214, 10, 0.08); border-bottom-color: rgba(255, 214, 10, 0.4); color: #ffd60a; }
        .tier-column:nth-child(5) .tier-column-header { background: rgba(191, 90, 242, 0.08); border-bottom-color: rgba(191, 90, 242, 0.4); color: #bf5af2; }

        .tier-inputs-vertical-list {
            padding: 10px 6px; display: flex; flex-direction: column; gap: 8px;
        }
        
        .tier-inputs-vertical-list input[type="text"] {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #ffffff; font-size: 14px; height: 38px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; text-align: center; font-weight: 500;
            transition: all 0.15s ease;
        }
        .tier-inputs-vertical-list input[type="text"]::placeholder { color: #48484a; font-weight: 400; font-size: 11.5px; }
        .tier-inputs-vertical-list input[type="text"]:focus { 
            border-bottom-color: var(--sa-orange); 
            text-shadow: 0 0 4px rgba(255,159,10,0.3);
        }

        .custom-map-selector-box { display: none; flex-direction: column; gap: 4px; background: rgba(255,255,255,0.01); border-radius: 4px; padding: 8px; border: 1px solid rgba(255,255,255,0.04); }
        .custom-map-chips { display: flex; flex-wrap: wrap; gap: 4px; max-height: 70px; overflow-y: auto; }
        .map-chip { font-size: 11px; padding: 3px 6px; background: rgba(255,255,255,0.04); border-radius: 3px; cursor: pointer; }
        .map-chip.selected { background: rgba(255,159,10,0.2); border-color: var(--sa-orange); color: #fff; }

        .control-action-row { display: flex; gap: 14px; width: 100%; margin-top: auto; }
        .btn-action-base { border-radius: 28px; font-weight: 700; cursor: pointer; border: 1px solid transparent; box-sizing: border-box; transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .btn-reset { width: 90px; height: 62px; background: rgba(255, 255, 255, 0.04); color: #e5e5ea; border: 1px solid var(--border-glass); border-radius: 31px; font-size: 14px; font-weight: 500; }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.1); }
        
        .btn-team-assign { flex: 1; height: 46px; background: rgba(0, 122, 255, 0.08); color: #007aff; border: 1px solid rgba(0, 122, 255, 0.35); font-size: 14.5px; box-shadow: 0 0 20px rgba(0, 122, 255, 0.15); }
        .btn-team-assign:hover { background: var(--mac-blue); color: #ffffff; border-color: var(--mac-blue); box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        
        .btn-map-assign { flex: 1; height: 46px; background: rgba(255, 159, 10, 0.08); color: var(--sa-orange); border: 1px solid rgba(255, 159, 10, 0.35); font-size: 14.5px; box-shadow: 0 0 20px rgba(255, 159, 10, 0.15); }
        .btn-map-assign:hover { background: var(--sa-orange); color: #000000; border-color: var(--sa-orange); box-shadow: 0 4px 15px rgba(255, 159, 10, 0.3); }

        .right-column-area {
            background: var(--bg-glass-passive); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column; gap: 14px; min-height: 580px; box-sizing: border-box;
        }

        .team-board-zone {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; display: none; width: 100%;
        }
        
        .team-card { 
            background: rgba(255, 255, 255, 0.008); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 14px; 
            box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .team-card.drag-over { background: rgba(255, 159, 10, 0.04); border-color: var(--sa-orange); }
        .team-card.blue-team { border-top: 3px solid var(--sa-blue); }
        .team-card.red-team { border-top: 3px solid var(--sa-red); }
        
        .team-header-title { font-size: 14.5px; font-weight: 700; margin-bottom: 12px; text-align: center; letter-spacing: 0.5px; }
        .blue-team .team-header-title { color: var(--sa-blue); }
        .red-team .team-header-title { color: var(--sa-red); }
        
        .team-members-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .member-badge { 
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.06); 
            height: 38px; padding: 4px;
            font-size: 14px; font-weight: 500; color: #ffffff; text-align: center; display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; 
        }

        .leader-pick-pool-zone {
            display: none; flex-direction: column; gap: 8px; background: rgba(255,159,10,0.02); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,159,10,0.12);
        }
        .pool-zone-title { font-size: 12px; font-weight: 700; color: var(--sa-orange); }
        .pool-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        .pool-player-chip { 
            background: #141416; border: 1px solid rgba(255,255,255,0.06); padding: 5px 12px; border-radius: 6px; 
            font-size: 12.5px; font-weight: 600; color: #fff; cursor: grab;
        }

        .map-static-result-board {
            display: none; flex-direction: column; gap: 10px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); margin-top: auto;
        }
        .static-title { font-size: 11.5px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; }
        .static-row-binder { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; }
        .static-map-card {
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.04); border-radius: 6px; height: 52px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 600; color: #ffffff;
        }
        .static-map-card .card-num { font-size: 9px; color: var(--sa-orange); margin-bottom: 2px; font-weight: 700; }

        .no-result-placeholder { text-align: center; padding: 160px 0; color: #48484a; font-size: 14px; font-weight: 500; margin: auto; }

        .gacha-cinema-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 6, 0.8); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            z-index: 99999; display: none; align-items: center; 
            justify-content: flex-start; padding-top: 20vh; box-sizing: border-box;
            flex-direction: column; gap: 24px;
        }
        .cinema-title { font-size: 17px; font-weight: 700; color: #ffffff; letter-spacing: 2px; font-family: 'Space Mono', monospace; }
        .cinema-title span { color: var(--sa-orange); }
        
        .cinema-slots-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 85%; max-width: 950px;
        }
        .cinema-slot-box {
            background: #0f0f11; border: 2px solid #1c1c1f; border-radius: 6px; height: 170px;
            display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
        }
        
        .cinema-slot-box.flash-highlight { border-color: var(--mac-blue) !important; box-shadow: 0 0 16px rgba(0, 122, 255, 0.6) !important; }
        .cinema-slot-box.confirmed-jackpot { border-color: var(--sa-orange) !important; box-shadow: 0 0 30px rgba(255,159,10,0.5) !important; transform: scale(1.03); }
        .cinema-slot-box.dimmed { opacity: 0.12; filter: grayscale(100%); }

        .cinema-view-frame {
            flex: 1; display: flex; align-items: center; justify-content: center; background: #000;
            font-size: 14.5px; font-weight: 700; color: #8e8e93; text-align: center; position: relative;
        }
        .cinema-view-frame .map-mock-img {
            position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.35; pointer-events: none;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-view-frame .map-mock-img { opacity: 0.75; }

        .cinema-name-plate {
            height: 32px; background: #16161a; color: #ffffff; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; border-top: 1px solid #1c1c1f; letter-spacing: 0.5px;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-name-plate { background: var(--sa-orange); color: #000000; font-weight: 800; }
        
        .cinema-confirm-tag {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,159,10,0.12); display: none; align-items: center; justify-content: center;
            color: var(--sa-orange); font-size: 14px; font-weight: 900; letter-spacing: 2px; z-index: 10;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-confirm-tag { display: flex; }

        .mac-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .mac-alert-modal {
            background: rgba(30, 30, 30, 0.75); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; width: 270px; padding: 20px 16px 14px 16px; text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; gap: 4px; animation: macPop 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes macPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .mac-alert-msg-main { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .mac-alert-msg-sub { font-size: 11.5px; font-weight: 500; color: #a5a5a7; margin-bottom: 16px; line-height: 1.4; }
        .mac-alert-btn-container { display: flex; gap: 8px; justify-content: center; }
        .mac-alert-btn { flex: 1; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; }
        .mac-alert-btn.cancel { background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mac-alert-btn.cancel:hover { background: rgba(255, 255, 255, 0.15); }
        .mac-alert-btn.confirm { background: #007aff; color: #ffffff; }
        .mac-alert-btn.confirm:hover { background: #148cff; }
        .tier-indicator-badge {
            font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-right: 8px;
            text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; vertical-align: middle;
        }
        .tib-1 { background: rgba(255, 69, 58, 0.12); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.2); }
        .tib-2 { background: rgba(10, 132, 255, 0.12); color: #0a84ff; border: 1px solid rgba(10, 132, 255, 0.2); }
        .tib-3 { background: rgba(48, 209, 88, 0.12); color: #30d158; border: 1px solid rgba(48, 209, 88, 0.2); }
        .tib-4 { background: rgba(255, 214, 10, 0.12); color: #ffd60a; border: 1px solid rgba(255, 214, 10, 0.2); }
        .tib-5 { background: rgba(191, 90, 242, 0.12); color: #bf5af2; border: 1px solid rgba(191, 90, 242, 0.2); }
        
        .pool-player-chip { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>

<div class="mac-alert-overlay" id="macAlertOverlay">
    <div class="mac-alert-modal">
        <div class="mac-alert-msg-main" id="macAlertTitle">안내</div>
        <div class="mac-alert-msg-sub" id="macAlertSub">상세 메시지</div>
        <div class="mac-alert-btn-container" id="macAlertBtnBox"></div>
    </div>
</div>

<div class="gacha-cinema-overlay" id="gachaCinemaOverlay">
    <div class="cinema-title" id="cinemaTitleTrack">SUDDENATTACK MATCH MAP LINEUP</div>
    <div class="cinema-slots-container" id="cinemaSlotsContainer"></div>
</div>

<div class="container">
    <div class="mac-app-header">
        <h1>서모장</h1>
    </div>

    <div class="app-content">
        
        <div class="left-column-area">
            <div class="setup-box">
                <div class="control-system-row">
                    <div class="form-row">
                        <span class="form-label">팀 배정 방식</span>
                        <select id="teamAssignMode" class="mac-select" onchange="pushInputsToFirebase()">
                            <option value="balance" selected>밸런스</option>
                            <option value="allRandom">올랜덤</option>
                            <option value="leaderPick">팀뽑기</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <span class="form-label">맵 배정 방식</span>
                        <select id="mapAssignMode" class="mac-select" onchange="toggleCustomMapBox(); pushInputsToFirebase();">
                            <option value="allRandom">올랜덤</option>
                            <option value="original" selected>오리지널</option>
                            <option value="custom">커스텀</option>
                        </select>
                    </div>
                    <button class="btn-action-base btn-reset" onclick="askSaMemoReset()">초기화</button>
                </div>

                <div class="custom-map-selector-box" id="customMapBox">
                    <span class="custom-map-title">고정할 맵 선택 (최대 7개)</span>
                    <div class="custom-map-chips" id="customMapChipsContainer"></div>
                </div>

                <div class="tier-table-wrapper" id="tierTableWrapper"></div>

                <div class="control-action-row">
                    <button class="btn-action-base btn-team-assign" onclick="runSaTeamAssignment()">팀 배정</button>
                    <button class="btn-action-base btn-map-assign" onclick="runSaMapAssignment()">맵 배정</button>
                </div>
            </div>
        </div>

        <div class="right-column-area right-column-area studio-panel" id="resultContainer">
            <div class="no-result-placeholder" id="placeholderText">팀 및 맵 배정 결과가 여기에 표시됩니다.</div>
            
            <div class="team-board-zone" id="teamBoardZone">
                <div class="team-card blue-team" id="drop-zone-teamA" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropPlayer(event, 'teamA')">
                    <div class="team-header-title" id="blueTeamHeader">A 팀</div>
                    <div class="team-members-list" id="blueTeamList"></div>
                </div>
                <div class="team-card red-team" id="drop-zone-teamB" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropPlayer(event, 'teamB')">
                    <div class="team-header-title" id="redTeamHeader">B 팀</div>
                    <div class="team-members-list" id="redTeamList"></div>
                </div>
            </div>

            <div class="leader-pick-pool-zone" id="leaderPickPoolZone">
                <div class="pool-zone-title">미배정 명단</div>
                <div class="pool-chips-wrap" id="poolChipsWrap"></div>
            </div>

            <div class="history-track-anchor map-static-result-board" id="mapStaticResultBoard">
                <div class="static-title">맵 라인업</div>
                <div class="static-row-binder" id="staticRowBinder"></div>
            </div>
        </div>

    </div>
</div>

<script>
    const mapPool = [
        "드래곤로드","프로방스","시티캣","크로스포트","올드타운","데저트","제3보급창고",
        "B2연구소","골든아이","듀오릭","마린베이스","백어스","산악기지","아울렛",
        "이탈리아","제5보급창고","지하철","클럽나이트","팰리스","프로즌시티","해양중계소","화이트스콜"
    ];
    const originalMaps = ["드래곤로드","프로방스","시티캣","크로스포트","올드타운","데저트","제3보급창고"];

    var isOperating = false;
    var currentTeamSeed = null;
    var currentMapSeed = null;
    var selectedCustomMaps = [];

    function openMacAlert(title, subText, type, onConfirm) {
        const overlay = document.getElementById("macAlertOverlay");
        document.getElementById("macAlertTitle").innerText = title;
        document.getElementById("macAlertSub").innerText = subText;
        const btnBox = document.getElementById("macAlertBtnBox");
        btnBox.innerHTML = "";

        if (type === "confirm") {
            const cancelBtn = document.createElement("button");
            cancelBtn.className = "mac-alert-btn cancel";
            cancelBtn.innerText = "취소";
            cancelBtn.onclick = () => { overlay.style.display = "none"; };
            
            const confirmBtn = document.createElement("button");
            confirmBtn.className = "mac-alert-btn confirm";
            confirmBtn.innerText = "확인";
            confirmBtn.onclick = () => { overlay.style.display = "none"; if(onConfirm) onConfirm(); };
            
            btnBox.appendChild(cancelBtn);
            btnBox.appendChild(confirmBtn);
        } else {
            const alertBtn = document.createElement("button");
            alertBtn.className = "mac-alert-btn confirm";
            alertBtn.innerText = "확인";
            alertBtn.onclick = () => { overlay.style.display = "none"; };
            btnBox.appendChild(alertBtn);
        }
        overlay.style.display = "flex";
    }

    function callParentMacAlert(mainMsg, subMsg) {
        openMacAlert(mainMsg, subMsg, "alert");
    }

    const tableWrapper = document.getElementById("tierTableWrapper");
    for (let t = 1; t <= 5; t++) {
        let col = document.createElement("div");
        col.className = "tier-column";
        col.innerHTML = `<div class="tier-column-header">${t}티어</div>`;
        
        let inputsWrap = document.createElement("div");
        inputsWrap.className = "tier-inputs-vertical-list";
        for (let i = 0; i < 7; i++) {
            inputsWrap.innerHTML += `<input type="text" id="t_${t}_${i}" placeholder="-" autocomplete="off" oninput="pushInputsToFirebase()">`;
        }
        col.appendChild(inputsWrap);
        tableWrapper.appendChild(col);
    }

    const chipsContainer = document.getElementById("customMapChipsContainer");
    mapPool.forEach(map => {
        let chip = document.createElement("div");
        chip.className = "map-chip"; chip.id = `chip-${map}`; chip.innerText = map;
        chip.onclick = () => toggleMapChip(map);
        chipsContainer.appendChild(chip);
    });

    function toggleCustomMapBox() {
        const mode = document.getElementById("mapAssignMode").value;
        document.getElementById("customMapBox").style.display = (mode === 'custom') ? "flex" : "none";
    }

    function toggleMapChip(map) {
        let idx = selectedCustomMaps.indexOf(map);
        if (idx > -1) {
            selectedCustomMaps.splice(idx, 1);
        } else {
            if (selectedCustomMaps.length >= 7) {
                callParentMacAlert("지정 개수 초과", "고정할 맵은 최대 7개까지만 선택할 수 있습니다.");
                return;
            }
            selectedCustomMaps.push(map);
        }
        pushInputsToFirebase();
    }

    function syncCustomMapChipsUI() {
        document.querySelectorAll(".map-chip").forEach(chip => {
            chip.classList.toggle("selected", selectedCustomMaps.includes(chip.innerText));
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_sa_memo_session_v2");

    function pushInputsToFirebase() {
        if (isOperating) return;
        let inputs = {};
        for (let t = 1; t <= 5; t++) {
            inputs[t] = [];
            for (let i = 0; i < 7; i++) {
                inputs[t].push(document.getElementById(`t_${t}_${i}`).value.trim());
            }
        }
        db.update({
            inputs: inputs,
            teamAssignMode: document.getElementById("teamAssignMode").value,
            mapAssignMode: document.getElementById("mapAssignMode").value,
            selectedCustomMaps: selectedCustomMaps
        });
    }

    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        isOperating = true;
        if (data.inputs) {
            for (let t = 1; t <= 5; t++) {
                if (data.inputs[t]) {
                    data.inputs[t].forEach((val, i) => {
                        let el = document.getElementById(`t_${t}_${i}`);
                        if (el && el.value !== val) el.value = val;
                    });
                }
            }
        }
        if (data.teamAssignMode) document.getElementById("teamAssignMode").value = data.teamAssignMode;
        if (data.mapAssignMode) {
            document.getElementById("mapAssignMode").value = data.mapAssignMode;
            toggleCustomMapBox();
        }
        if (data.selectedCustomMaps) {
            selectedCustomMaps = data.selectedCustomMaps;
            syncCustomMapChipsUI();
        } else {
            selectedCustomMaps = [];
            syncCustomMapChipsUI();
        }

        let combined = {
            teamA: data.teamResults?.teamA || [],
            teamB: data.teamResults?.teamB || [],
            remainPool: data.teamResults?.remainPool || [],
            isLeaderPick: data.teamResults?.isLeaderPick || false,
            maps: data.mapResults?.maps || []
        };

        if (data.teamResults || data.mapResults) {
            const isBrandNewMap = data.mapResults && (Date.now() - data.mapResults.mapTimestamp < 5000);

            if (data.mapResults && currentMapSeed !== data.mapResults.mapSeed && isBrandNewMap) {
                currentMapSeed = data.mapResults.mapSeed;
                if (data.mapAssignMode !== 'original') {
                    triggerBorderFlashGacha(combined); 
                } else {
                    renderStaticResultBoard(combined);
                }
            } else {
                if (data.mapResults) currentMapSeed = data.mapResults.mapSeed;
                renderStaticResultBoard(combined);
            }
        } else {
            currentTeamSeed = null;
            currentMapSeed = null;
            clearResultsUI();
        }
        isOperating = false;
    });

    function askSaMemoReset() {
        openMacAlert("라인업 초기화", "입력창의 참가자 명단과 모든 배정 결과를 삭제하시겠습니까?", "confirm", () => {
            let emptyInputs = {};
            for(let t=1; t<=5; t++) emptyInputs[t] = Array(7).fill("");
            db.set({
                inputs: emptyInputs,
                teamAssignMode: "balance",
                mapAssignMode: "original",
                selectedCustomMaps: null,
                teamResults: null,
                mapResults: null
            });
        });
    }

    function clearResultsUI() {
        document.getElementById("placeholderText").style.display = "block";
        document.getElementById("teamBoardZone").style.display = "none";
        document.getElementById("leaderPickPoolZone").style.display = "none";
        document.getElementById("mapStaticResultBoard").style.display = "none";
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function runSaTeamAssignment() {
        let allParticipantsByTier = {};
        let totalCount = 0;
        for (let t = 1; t <= 5; t++) {
            allParticipantsByTier[t] = [];
            for (let i = 0; i < 7; i++) {
                let val = document.getElementById(`t_${t}_${i}`).value.trim();
                if (val) {
                    allParticipantsByTier[t].push(val);
                    totalCount++;
                }
            }
        }

        if (totalCount === 0) {
            callParentMacAlert("배정 실패", "참가자 명단이 비어 있습니다.");
            return;
        }

        let teamMode = document.getElementById("teamAssignMode").value;
        let teamA = []; let teamB = []; let remainPool = [];

        if (teamMode === "allRandom") {
            let flatList = [];
            for (let t in allParticipantsByTier) flatList = flatList.concat(allParticipantsByTier[t]);
            shuffle(flatList);
            teamA = flatList.slice(0, Math.ceil(flatList.length / 2));
            teamB = flatList.slice(Math.ceil(flatList.length / 2));
        } 
        else if (teamMode === "balance") {

            const tierScore = {
                1: 5,
                2: 4,
                3: 3,
                4: 2,
                5: 1
            };

            let players = [];

            for (let t = 1; t <= 5; t++) {
                let list = shuffle([...allParticipantsByTier[t]]);

                list.forEach(name => {
                    players.push({
                        name: name,
                        tier: t,
                        score: tierScore[t]
                    });
                });
            }

            players.sort((a, b) => a.tier - b.tier);

            let teamAScore = 0;
            let teamBScore = 0;

            for (const player of players) {

                const diffIfA = Math.abs((teamAScore + player.score) - teamBScore);
                const diffIfB = Math.abs(teamAScore - (teamBScore + player.score));

                if (teamA.length < teamB.length) {
                    teamA.push(player.name);
                    teamAScore += player.score;
                    continue;
                }

                if (teamB.length < teamA.length) {
                    teamB.push(player.name);
                    teamBScore += player.score;
                    continue;
                }

                if (diffIfA < diffIfB) {
                    teamA.push(player.name);
                    teamAScore += player.score;
                }
                else if (diffIfB < diffIfA) {
                    teamB.push(player.name);
                    teamBScore += player.score;
                }
                else {

                    if (teamAScore < teamBScore) {
                        teamA.push(player.name);
                        teamAScore += player.score;
                    }
                    else if (teamBScore < teamAScore) {
                        teamB.push(player.name);
                        teamBScore += player.score;
                    }
                    else {

                        if (Math.random() < 0.5) {
                            teamA.push(player.name);
                            teamAScore += player.score;
                        } else {
                            teamB.push(player.name);
                            teamBScore += player.score;
                        }
                    }
                }
            }
        }
        else if (teamMode === "leaderPick") {
            let validTiersForLeaders = [];
            for (let t = 1; t <= 5; t++) {
                if (allParticipantsByTier[t].length >= 2) validTiersForLeaders.push(t);
            }
            if (validTiersForLeaders.length === 0) {
                callParentMacAlert("배정 실패", "2명 이상 등록된 티어가 없어 팀장을 선출할 수 없습니다.");
                return;
            }
            let chosenTier = validTiersForLeaders[Math.floor(Math.random() * validTiersForLeaders.length)];
            let tierPool = shuffle([...allParticipantsByTier[chosenTier]]);
            
            teamA.push(tierPool[0]);
            teamB.push(tierPool[1]);

            for (let t = 1; t <= 5; t++) {
                allParticipantsByTier[t].forEach(p => {
                    if (p !== tierPool[0] && p !== tierPool[1]) remainPool.push(p);
                });
            }
            shuffle(remainPool);
        }

        db.child("teamResults").update({
            teamA: teamA,
            teamB: teamB,
            remainPool: remainPool,
            isLeaderPick: (teamMode === "leaderPick"),
            teamSeed: Math.random()
        });
    }

    function runSaMapAssignment() {
        let mapMode = document.getElementById("mapAssignMode").value;
        let chosenMaps = [];

        if (mapMode === "original") {
            chosenMaps = [...originalMaps];
        } 
        else if (mapMode === "allRandom") {
            let pool = shuffle([...mapPool]);
            chosenMaps = pool.slice(0, 7);
        } 
        else if (mapMode === "custom") {
            let fixedPart = [...selectedCustomMaps];
            let restPool = mapPool.filter(m => !fixedPart.includes(m));
            shuffle(restPool);
            let needed = 7 - fixedPart.length;
            let randomPart = restPool.slice(0, needed);
            chosenMaps = shuffle(fixedPart.concat(randomPart));
        }

        db.child("mapResults").update({
            maps: chosenMaps,
            mapSeed: Math.random(),
            mapTimestamp: Date.now()
        });
    }

    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
    function dragLeave(e) { e.currentTarget.classList.remove("drag-over"); }

    function dropPlayer(e, targetTeam) {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");
        let name = e.dataTransfer.getData("text/plain");
        if (!name) return;

        db.once("value", (snapshot) => {
            let data = snapshot.val();
            if (!data || !data.teamResults) return;
            let res = data.teamResults;

            if (res.remainPool) {
                let idx = res.remainPool.indexOf(name);
                if (idx > -1) res.remainPool.splice(idx, 1);
            }
            if (targetTeam === 'teamA') {
                if(!res.teamA) res.teamA = []; res.teamA.push(name);
            } else {
                if(!res.teamB) res.teamB = []; res.teamB.push(name);
            }
            db.child("teamResults").update(res);
        });
    }

    async function triggerBorderFlashGacha(combinedData) {
        const overlay = document.getElementById("gachaCinemaOverlay");
        const container = document.getElementById("cinemaSlotsContainer");
        const titleTrack = document.getElementById("cinemaTitleTrack");
        
        overlay.style.display = "flex";

        for (let matchIdx = 0; matchIdx < 7; matchIdx++) {
            titleTrack.innerHTML = `<span>${matchIdx + 1}</span> 세트 맵 선택 중...`;
            container.innerHTML = "";

            let finalSelectedMap = combinedData.maps[matchIdx];
            let currentCandidates = [finalSelectedMap];
            let filterPool = mapPool.filter(m => m !== finalSelectedMap);
            shuffle(filterPool);
            for(let i=0; i<3; i++) currentCandidates.push(filterPool[i]);
            shuffle(currentCandidates); 

            let correctSlotIndex = currentCandidates.indexOf(finalSelectedMap);

            currentCandidates.forEach((mapName, idx) => {
                let card = document.createElement("div");
                card.className = "cinema-slot-box";
                card.id = `c-slot-${idx}`;
                card.innerHTML = `
                    <div class="cinema-view-frame">
                        <div class="cinema-confirm-tag" id="c-tag-${idx}">확정</div>
                        <div class="map-mock-img" style="background: rgba(255,255,255,0.03);"></div>
                    </div>
                    <div class="cinema-name-plate">${mapName}</div>
                `;
                container.appendChild(card);
            });

            let flashState = false;
            let flashInterval = setInterval(() => {
                for(let idx=0; idx<4; idx++) {
                    let box = document.getElementById(`c-slot-${idx}`);
                    if(box) {
                        if(flashState) box.classList.add("flash-highlight");
                        else box.classList.remove("flash-highlight");
                    }
                }
                flashState = !flashState;
            }, 220); 

            await new Promise(r => setTimeout(r, 1760));
            clearInterval(flashInterval);

            for(let idx=0; idx<4; idx++) {
                let box = document.getElementById(`c-slot-${idx}`);
                if(box) {
                    box.classList.remove("flash-highlight");
                    if (idx === correctSlotIndex) {
                        box.classList.add("confirmed-jackpot");
                        document.getElementById(`c-tag-${idx}`).style.display = "flex";
                    } else {
                        box.classList.add("dimmed");
                    }
                }
            }
            await new Promise(r => setTimeout(r, 900));
        }

        overlay.style.display = "none";
        renderStaticResultBoard(combinedData);
    }

    function renderStaticResultBoard(combinedData) {
        if ((combinedData.teamA && combinedData.teamA.length > 0) || (combinedData.maps && combinedData.maps.length > 0)) {
            document.getElementById("placeholderText").style.display = "none";
        } else {
            clearResultsUI();
            return;
        }
        
        const blueList = document.getElementById("blueTeamList");
        const redList = document.getElementById("redTeamList");
        blueList.innerHTML = ""; redList.innerHTML = "";
        
        function getPlayerTierBadgeHTML(playerName) {
            if (!playerName) return "";
            let cleanName = playerName.trim();
            for (let t = 1; t <= 5; t++) {
                for (let i = 0; i < 7; i++) {
                    let inputEl = document.getElementById(`t_${t}_${i}`);
                    if (inputEl && inputEl.value.trim() === cleanName) {
                        return `<span class="tier-indicator-badge tib-${t}">${t}T</span>`;
                    }
                }
            }
            return "";
        }
        
        if(combinedData.teamA && combinedData.teamA.length > 0) {
            combinedData.teamA.forEach(p => blueList.innerHTML += `<div class="member-badge">${getPlayerTierBadgeHTML(p)}${p}</div>`);
            if (combinedData.isLeaderPick && combinedData.teamA[0] && combinedData.teamB[0]) {
                document.getElementById("blueTeamHeader").innerText = combinedData.teamA[0] + "팀";
                document.getElementById("redTeamHeader").innerText = combinedData.teamB[0] + "팀";
            } else {
                document.getElementById("blueTeamHeader").innerText = "A 팀";
                document.getElementById("redTeamHeader").innerText = "B 팀";
            }
            document.getElementById("teamBoardZone").style.display = "grid";
        } else {
            document.getElementById("teamBoardZone").style.display = "none";
        }

        if(combinedData.teamB && combinedData.teamB.length > 0) {
            combinedData.teamB.forEach(p => redList.innerHTML += `<div class="member-badge">${getPlayerTierBadgeHTML(p)}${p}</div>`);
        }

        const poolZone = document.getElementById("leaderPickPoolZone");
        const poolChipsWrap = document.getElementById("poolChipsWrap");
        poolChipsWrap.innerHTML = "";
        
        if (combinedData.isLeaderPick && combinedData.remainPool && combinedData.remainPool.length > 0) { 
            let sortedPool = [...combinedData.remainPool].sort((a, b) => {
                let tierA = 99, tierB = 99;
                for (let t = 1; t <= 5; t++) {
                    for (let i = 0; i < 7; i++) {
                        let inputEl = document.getElementById(`t_${t}_${i}`);
                        if (inputEl) {
                            if (inputEl.value.trim() === a.trim()) tierA = t;
                            if (inputEl.value.trim() === b.trim()) tierB = t;
                        }
                    }
                }         
                if (tierA !== tierB) return tierA - tierB;
                return a.localeCompare(b, 'ko');
            });

            sortedPool.forEach(p => {
                let chip = document.createElement("div");
                chip.className = "pool-player-chip"; 
                chip.innerHTML = `${getPlayerTierBadgeHTML(p)}${p}`; 
                chip.draggable = true;
                chip.ondragstart = (e) => { e.dataTransfer.setData("text/plain", p); };
                poolChipsWrap.appendChild(chip);
            });
            poolZone.style.display = "flex";
        } else {
            poolZone.style.display = "none";
        }

        const staticBinder = document.getElementById("staticRowBinder");
        staticBinder.innerHTML = "";

        if (combinedData.maps && combinedData.maps.length > 0) {
            document.getElementById("mapStaticResultBoard").style.display = "flex";
            combinedData.maps.forEach((map, idx) => {
                staticBinder.innerHTML += `
                    <div class="static-map-card">
                        <div class="card-num">${idx + 1}세트</div>
                        <div>${map}</div>
                    </div>
                `;
            });
        } else {
            document.getElementById("mapStaticResultBoard").style.display = "none";
        }
    }
