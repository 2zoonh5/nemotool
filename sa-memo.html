<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --bg-main: #08080a;
            --bg-studio: rgba(22, 22, 26, 0.75);
            --bg-input: rgba(255, 255, 255, 0.02);
            --border-studio: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 159, 10, 0.5);
            --sa-orange: #ff9f0a;
            --sa-blue: #007aff;
            --sa-red: #ff453a;
            --text-main: #f5f5f7;
            --text-gray: #8e8e93;
        }
        
        body {
            background: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", sans-serif;
            margin: 0; padding: 24px; overflow-y: auto; box-sizing: border-box;
            min-height: 100vh; user-select: none; position: relative;
        }

        .network-badge { 
            position: absolute; top: 12px; left: 20px; display: flex; align-items: center; gap: 6px; 
            font-size: 11px; color: #34c759; font-weight: 600; background: rgba(0,0,0,0.4); 
            padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .network-dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759; }

        .container {
            max-width: 1440px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 16px;
        }

        .mac-app-header h1 {
            font-size: 26px; font-weight: 700; text-align: center; margin: 0 0 5px 0; letter-spacing: 4px; 
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 💻 [수평&비율 정밀 동기화 구조] */
        .app-content {
            display: grid; grid-template-columns: 1.15fr 1fr; gap: 18px; align-items: stretch; width: 100%;
        }

        /* ✨ [Mac OS 오리지널 스튜디오 패널 대개편] */
        .studio-panel {
            background: var(--bg-studio); 
            border: 1px solid var(--border-studio);
            border-radius: 8px; padding: 22px; 
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; gap: 14px; 
            backdrop-filter: blur(35px) saturate(180%); -webkit-backdrop-filter: blur(35px) saturate(180%);
            box-sizing: border-box; min-height: 565px;
        }
        
        /* 헤더 컨트롤 라인 */
        .control-system-row { display: flex; gap: 10px; width: 100%; align-items: flex-end; }
        
        .form-row { 
            flex: 1; display: flex; flex-direction: column; gap: 5px;
            background: rgba(0, 0, 0, 0.2); border-radius: 4px; padding: 6px 12px; border: 1px solid var(--border-studio); 
        }
        .form-label { font-size: 10.5px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .mac-select {
            background: rgba(255,255,255,0.03); color: #ffffff; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px; padding: 6px 20px 6px 8px; font-size: 12px; font-weight: 600; outline: none; cursor: pointer; width: 100%; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 10px;
            transition: border-color 0.15s;
        }
        .mac-select:focus { border-color: var(--sa-orange); }

        /* 📸 [네모 스퀘어 그리드 최적화] */
        .tier-table-wrapper {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%;
        }
        .tier-column {
            border: 1px solid rgba(255,255,255,0.03); border-radius: 4px; overflow: hidden; background: rgba(0,0,0,0.25);
            display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .tier-column-header {
            padding: 8px 2px; font-size: 12px; font-weight: 700; text-align: center; color: #ffffff; letter-spacing: 0.5px;
        }
        /* 고급스러운 매트 톤다운 테마 색상 부여 */
        .tier-column:nth-child(1) .tier-column-header { background: rgba(255, 69, 58, 0.15); border-bottom: 2px solid rgba(255, 69, 58, 0.35); }
        .tier-column:nth-child(2) .tier-column-header { background: rgba(10, 132, 255, 0.15); border-bottom: 2px solid rgba(10, 132, 255, 0.35); }
        .tier-column:nth-child(3) .tier-column-header { background: rgba(48, 209, 88, 0.15); border-bottom: 2px solid rgba(48, 209, 88, 0.35); }
        .tier-column:nth-child(4) .tier-column-header { background: rgba(255, 214, 10, 0.15); border-bottom: 2px solid rgba(255, 214, 10, 0.35); }
        .tier-column:nth-child(5) .tier-column-header { background: rgba(191, 90, 242, 0.15); border-bottom: 2px solid rgba(191, 90, 242, 0.35); }

        .tier-inputs-vertical-list {
            padding: 8px; display: flex; flex-direction: column; gap: 6px;
        }
        
        /* 🔗 [디자인 통일]: 명단 인풋창 서든어택 스퀘어 스타일 정의 */
        .tier-inputs-vertical-list input[type="text"] {
            background: var(--bg-input); border: 1px solid rgba(255,255,255,0.04); border-radius: 4px;
            color: #ffffff; font-size: 13px; height: 32px; padding: 4px; outline: none; width: 100%; box-sizing: border-box; text-align: center; font-weight: 500;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .tier-inputs-vertical-list input[type="text"]:focus { 
            border-color: var(--border-focus); 
            background: rgba(255, 159, 10, 0.03);
            box-shadow: 0 0 10px rgba(255, 159, 10, 0.15);
        }

        .custom-map-selector-box { display: none; flex-direction: column; gap: 4px; background: rgba(255,255,255,0.01); border-radius: 4px; padding: 8px; border: 1px solid rgba(255,255,255,0.04); }
        .custom-map-chips { display: flex; flex-wrap: wrap; gap: 4px; max-height: 70px; overflow-y: auto; }
        .map-chip { font-size: 11px; padding: 3px 6px; background: rgba(255,255,255,0.04); border-radius: 3px; cursor: pointer; }
        .map-chip.selected { background: rgba(255,159,10,0.2); border-color: var(--sa-orange); color: #fff; }

        /* 🛠️ 하단 2분할 액션 컨트롤러 디자인 */
        .control-action-row { display: flex; gap: 10px; width: 100%; margin-top: auto; }
        .btn-action-base { height: 38px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 13px; border: 1px solid transparent; box-sizing: border-box; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .btn-reset { width: 85px; height: 34px; background: rgba(255,255,255,0.03); color: var(--text-gray); border-color: var(--border-glass); font-weight: 500; margin-bottom: 2px; }
        .btn-reset:hover { background: rgba(255, 69, 58, 0.1); color: var(--sa-red); border-color: rgba(255, 69, 58, 0.2); }
        
        .btn-team-assign { flex: 1; background: rgba(0, 122, 255, 0.06); color: var(--sa-blue); border-color: rgba(0, 122, 255, 0.25); }
        .btn-team-assign:hover { background: var(--sa-blue); color: #ffffff; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        
        .btn-map-assign { flex: 1; background: rgba(255, 159, 10, 0.06); color: var(--sa-orange); border-color: rgba(255, 159, 10, 0.25); }
        .btn-map-assign:hover { background: var(--sa-orange); color: #000000; box-shadow: 0 4px 15px rgba(255, 159, 10, 0.3); }

        /* 📊 우측 매칭 스페이스 결과 보드 */
        .team-board-zone {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; display: none; width: 100%;
        }
        .team-card { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.02); border-radius: 4px; padding: 14px; 
            box-sizing: border-box; transition: all 0.2s;
        }
        .team-card.drag-over { background: rgba(0, 122, 255, 0.02); border-color: var(--sa-blue); }
        .team-card.blue-team { border-top: 3px solid var(--sa-blue); box-shadow: inset 0 10px 20px rgba(0, 122, 255, 0.02); }
        .team-card.red-team { border-top: 3px solid var(--sa-red); box-shadow: inset 0 10px 20px rgba(255, 69, 58, 0.02); }
        
        .team-header-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; text-align: center; letter-spacing: 0.5px; }
        .blue-team .team-header-title { color: var(--sa-blue); }
        .red-team .team-header-title { color: var(--sa-red); }
        
        /* 🔗 [디자인 통일]: 결과창 명단 뱃지를 좌측 인풋 32px 사각형 규격과 완전 동기화 */
        .team-members-list { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .member-badge { 
            background: rgba(255,255,255,0.015); height: 32px; padding: 0; border-radius: 4px; 
            font-size: 13px; font-weight: 500; color: #ffffff; text-align: center; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.03); box-sizing: border-box; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        /* 미배정 드래그 대기 풀 */
        .leader-pick-pool-zone {
            display: none; flex-direction: column; gap: 8px; background: rgba(255,159,10,0.02); border-radius: 4px; padding: 12px; border: 1px solid rgba(255,159,10,0.12);
        }
        .pool-zone-title { font-size: 12px; font-weight: 700; color: var(--sa-orange); }
        .pool-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        .pool-player-chip { 
            background: #141416; border: 1px solid rgba(255,255,255,0.06); padding: 5px 12px; border-radius: 4px; 
            font-size: 12.5px; font-weight: 600; color: #fff; cursor: grab;
        }

        /* 상시 결과 노출용 하단 매치 맵 카드 보드 */
        .map-static-result-board {
            display: none; flex-direction: column; gap: 10px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); margin-top: auto;
        }
        .static-title { font-size: 11.5px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; }
        .static-row-binder { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; }
        .static-map-card {
            background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255,255,255,0.03); border-radius: 4px; height: 52px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 600; color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .static-map-card .card-num { font-size: 9px; color: var(--sa-orange); margin-bottom: 2px; font-weight: 700; }

        .no-result-placeholder { text-align: center; padding: 160px 0; color: #3a3a3c; font-size: 13px; font-weight: 500; margin: auto; }

        /* 🎰 [시네마틱 오버레이 대수선]: 블루 서치 라이트 앤 "확정 딱!" 이펙트 */
        .gacha-cinema-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 5, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 99999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 24px;
        }
        .cinema-title { font-size: 17px; font-weight: 700; color: #ffffff; letter-spacing: 2px; font-family: 'Space Mono', monospace; }
        .cinema-title span { color: var(--sa-orange); }
        
        .cinema-slots-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 85%; max-width: 950px;
        }
        .cinema-slot-box {
            background: #0f0f11; border: 2px solid #1c1c1f; border-radius: 4px; height: 140px;
            display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
        }
        
        /* ⚡ [가챠 임팩트 교정]: 정갈한 블루 발광 점멸 및 0.22초 긴장감 스케일 가이드 */
        .cinema-slot-box.flash-highlight { border-color: var(--sa-blue) !important; box-shadow: 0 0 16px rgba(10, 132, 255, 0.6) !important; }
        
        /* 당첨 스퀘어 락 온 */
        .cinema-slot-box.confirmed-jackpot { border-color: var(--sa-orange) !important; box-shadow: 0 0 30px rgba(255,159,10,0.5) !important; transform: scale(1.03); }
        .cinema-slot-box.dimmed { opacity: 0.12; filter: grayscale(100%); }

        .cinema-view-frame {
            flex: 1; display: flex; align-items: center; justify-content: center; background: #000;
            font-size: 14.5px; font-weight: 700; color: #8e8e93; text-align: center; position: relative;
        }
        .cinema-view-frame .map-mock-img {
            position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.35; pointer-events: none;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-view-frame .map-mock-img { opacity: 0.75; }

        .cinema-name-plate {
            height: 32px; background: #16161a; color: #ffffff; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; border-top: 1px solid #1c1c1f; letter-spacing: 0.5px;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-name-plate { background: var(--sa-orange); color: #000000; font-weight: 800; }
        
        .cinema-confirm-tag {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,159,10,0.12); display: none; align-items: center; justify-content: center;
            color: var(--sa-orange); font-size: 14px; font-weight: 900; letter-spacing: 2px; z-index: 10;
        }
        .cinema-slot-box.confirmed-jackpot .cinema-confirm-tag { display: flex; }
    </style>
</head>
<body>

<div class="network-badge"><div class="network-dot"></div><span>실시간</span></div>

<!-- 🎰 가챠 오버레이 스크린 -->
<div class="gacha-cinema-overlay" id="gachaCinemaOverlay">
    <div class="cinema-title" id="cinemaTitleTrack">SUDDENATTACK MATCH MAP LINEUP</div>
    <div class="cinema-slots-container" id="cinemaSlotsContainer"></div>
</div>

<div class="container">
    <div class="mac-app-header">
        <h1>서모장</h1>
    </div>

    <!-- 💻 완벽하게 균형이 맞춰진 2열 오리지널 패널 그리드 -->
    <div class="app-content">
        
        <!-- [좌측 컨트롤 스튜디오 패널] -->
        <div class="left-column-area">
            <div class="studio-panel">
                <div class="control-system-row">
                    <div class="form-row">
                        <span class="form-label">팀 배정 방식</span>
                        <select id="teamAssignMode" class="mac-select" onchange="pushInputsToFirebase()">
                            <option value="balance" selected>밸런스</option>
                            <option value="allRandom">올랜덤</option>
                            <option value="leaderPick">팀뽑기</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <span class="form-label">맵 배정 방식</span>
                        <select id="mapAssignMode" class="mac-select" onchange="toggleCustomMapBox(); pushInputsToFirebase();">
                            <option value="allRandom">올랜덤</option>
                            <option value="original" selected>오리지널</option>
                            <option value="custom">커스텀</option>
                        </select>
                    </div>
                    <button class="btn-action-base btn-reset" onclick="askSaMemoReset()">초기화</button>
                </div>

                <div class="custom-map-selector-box" id="customMapBox">
                    <span class="custom-map-title">고정할 맵 선택 (최대 7개)</span>
                    <div class="custom-map-chips" id="customMapChipsContainer"></div>
                </div>

                <!-- 🔗 가로형 5열 스퀘어 명단 (높이 32px 정밀 싱크) -->
                <div class="tier-table-wrapper" id="tierTableWrapper"></div>

                <!-- 하단 팀배정 / 맵배정 2열 슬림 배역 배정기 -->
                <div class="control-action-row">
                    <button class="btn-action-base btn-team-assign" onclick="runSaTeamAssignment()">팀 배정</button>
                    <button class="btn-action-base btn-map-assign" onclick="runSaMapAssignment()">맵 배정</button>
                </div>
            </div>
        </div>

        <!-- [우측 결과 스튜디오 패널] -->
        <div class="right-column-area studio-panel" id="resultContainer">
            <div class="no-result-placeholder" id="placeholderText">팀 배정 및 맵 매칭 결과가 여기에 표시됩니다.</div>
            
            <div class="team-board-zone" id="teamBoardZone">
                <div class="team-card blue-team" id="drop-zone-teamA" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropPlayer(event, 'teamA')">
                    <div class="team-header-title" id="blueTeamHeader">A 팀</div>
                    <div class="team-members-list" id="blueTeamList"></div>
                </div>
                <div class="team-card red-team" id="drop-zone-teamB" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropPlayer(event, 'teamB')">
                    <div class="team-header-title" id="redTeamHeader">B 팀</div>
                    <div class="team-members-list" id="redTeamList"></div>
                </div>
            </div>

            <!-- 팀뽑기 드래그 대기 풀 -->
            <div class="leader-pick-pool-zone" id="leaderPickPoolZone">
                <div class="pool-zone-title">미배정 대기 명단 (호명 후 상단 팀 칸으로 드래그앤드롭하세요)</div>
                <div class="pool-chips-wrap" id="poolChipsWrap"></div>
            </div>

            <!-- 상시 고정 결과 하단 보드 -->
            <div class="history-track-anchor map-static-result-board" id="mapStaticResultBoard">
                <div class="static-title">MATCH MAP LINEUP (7판 4선승제)</div>
                <div class="static-row-binder" id="staticRowBinder"></div>
            </div>
        </div>

    </div>
</div>

<script>
    const mapPool = [
        "드래곤로드","프로방스","시티캣","크로스포트","올드타운","데저트","제3보급창고",
        "듀오릭","팰리스","백어스","산악기지","마린베이스","이탈리아","아울렛",
        "B2연구소","지하철","제5보급창고","화이트스콜","해양중계소","프로즌시티","골든아이","클럽나이트"
    ];
    const originalMaps = ["드래곤로드","프로방스","시티캣","크로스포트","올드타운","데저트","제3보급창고"];

    var isOperating = false;
    var currentTeamSeed = null;
    var currentMapSeed = null;
    var selectedCustomMaps = [];

    function callParentMacAlert(mainMsg, subMsg) {
        if (window.parent && typeof window.parent.showMacAlert === "function") {
            window.parent.showMacAlert(mainMsg, subMsg);
        } else {
            alert(mainMsg + "\n" + subMsg);
        }
    }

    // 📸 가로 5열 명단 그리드 32px 싱크 빌드업
    const tableWrapper = document.getElementById("tierTableWrapper");
    for (let t = 1; t <= 5; t++) {
        let col = document.createElement("div");
        col.className = "tier-column";
        col.innerHTML = `<div class="tier-column-header">${t}티어</div>`;
        
        let inputsWrap = document.createElement("div");
        inputsWrap.className = "tier-inputs-vertical-list";
        for (let i = 0; i < 7; i++) {
            inputsWrap.innerHTML += `<input type="text" id="t_${t}_${i}" placeholder="-" autocomplete="off" oninput="pushInputsToFirebase()">`;
        }
        col.appendChild(inputsWrap);
        tableWrapper.appendChild(col);
    }

    const chipsContainer = document.getElementById("customMapChipsContainer");
    mapPool.forEach(map => {
        let chip = document.createElement("div");
        chip.className = "map-chip"; chip.id = `chip-${map}`; chip.innerText = map;
        chip.onclick = () => toggleMapChip(map);
        chipsContainer.appendChild(chip);
    });

    function toggleCustomMapBox() {
        const mode = document.getElementById("mapAssignMode").value;
        document.getElementById("customMapBox").style.display = (mode === 'custom') ? "flex" : "none";
    }

    function toggleMapChip(map) {
        let idx = selectedCustomMaps.indexOf(map);
        if (idx > -1) {
            selectedCustomMaps.splice(idx, 1);
        } else {
            if (selectedCustomMaps.length >= 7) {
                callParentMacAlert("지정 한도 초과", "고정할 맵은 최대 7개까지만 선택할 수 있습니다.");
                return;
            }
            selectedCustomMaps.push(map);
        }
        pushInputsToFirebase();
    }

    function syncCustomMapChipsUI() {
        document.querySelectorAll(".map-chip").forEach(chip => {
            chip.classList.toggle("selected", selectedCustomMaps.includes(chip.innerText));
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBzRTNZDkTGT9v0KaBKYqqy7AWb3PZ1SJc",
        authDomain: "nemotool.firebaseapp.com",
        databaseURL: "https://nemotool-default-rtdb.firebaseio.com",
        projectId: "nemotool",
        storageBucket: "nemotool.firebasestorage.app",
        messagingSenderId: "1003940918420",
        appId: "1:1003940918420:web:4f30a616c31fce71c0f081"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("nemo_sa_memo_session_v2");

    function pushInputsToFirebase() {
        if (isOperating) return;
        let inputs = {};
        for (let t = 1; t <= 5; t++) {
            inputs[t] = [];
            for (let i = 0; i < 7; i++) {
                inputs[t].push(document.getElementById(`t_${t}_${i}`).value.trim());
            }
        }
        db.update({
            inputs: inputs,
            teamAssignMode: document.getElementById("teamAssignMode").value,
            mapAssignMode: document.getElementById("mapAssignMode").value,
            selectedCustomMaps: selectedCustomMaps
        });
    }

    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        isOperating = true;
        if (data.inputs) {
            for (let t = 1; t <= 5; t++) {
                if (data.inputs[t]) {
                    data.inputs[t].forEach((val, i) => {
                        let el = document.getElementById(`t_${t}_${i}`);
                        if (el && el.value !== val) el.value = val;
                    });
                }
            }
        }
        if (data.teamAssignMode) document.getElementById("teamAssignMode").value = data.teamAssignMode;
        if (data.mapAssignMode) {
            document.getElementById("mapAssignMode").value = data.mapAssignMode;
            toggleCustomMapBox();
        }
        if (data.selectedCustomMaps) {
            selectedCustomMaps = data.selectedCustomMaps;
            syncCustomMapChipsUI();
        } else {
            selectedCustomMaps = [];
            syncCustomMapChipsUI();
        }

        // 🟢 [버그 완전 차단]: 결과 처리 데이터 결합 로직 교정완료
        let combined = {
            teamA: data.teamResults?.teamA || [],
            teamB: data.teamResults?.teamB || [],
            remainPool: data.teamResults?.remainPool || [],
            isLeaderPick: data.teamResults?.isLeaderPick || false,
            maps: data.mapResults?.maps || []
        };

        if (data.teamResults || data.mapResults) {
            if (data.mapResults && currentMapSeed !== data.mapResults.mapSeed) {
                currentMapSeed = data.mapResults.mapSeed;
                if (data.mapAssignMode !== 'original') {
                    triggerBorderFlashGacha(combined); 
                } else {
                    renderStaticResultBoard(combined);
                }
            } else {
                renderStaticResultBoard(combined);
            }
        } else {
            currentTeamSeed = null;
            currentMapSeed = null;
            clearResultsUI();
        }
        isOperating = false;
    });

    function askSaMemoReset() {
        let emptyInputs = {};
        for(let t=1; t<=5; t++) emptyInputs[t] = Array(7).fill("");
        db.set({
            inputs: emptyInputs,
            teamAssignMode: "balance",
            mapAssignMode: "original",
            selectedCustomMaps: null,
            teamResults: null,
            mapResults: null
        });
        callParentMacAlert("초기화 완료", "모든 매칭 데이터가 정상 리셋되었습니다.");
    }

    function clearResultsUI() {
        document.getElementById("placeholderText").style.display = "block";
        document.getElementById("teamBoardZone").style.display = "none";
        document.getElementById("leaderPickPoolZone").style.display = "none";
        document.getElementById("mapStaticResultBoard").style.display = "none";
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function runSaTeamAssignment() {
        let allParticipantsByTier = {};
        let totalCount = 0;
        for (let t = 1; t <= 5; t++) {
            allParticipantsByTier[t] = [];
            for (let i = 0; i < 7; i++) {
                let val = document.getElementById(`t_${t}_${i}`).value.trim();
                if (val) {
                    allParticipantsByTier[t].push(val);
                    totalCount++;
                }
            }
        }

        if (totalCount === 0) {
            callParentMacAlert("배정 실패", "참가자 명단이 비어 있습니다.");
            return;
        }

        let teamMode = document.getElementById("teamAssignMode").value;
        let teamA = []; let teamB = []; let remainPool = [];

        if (teamMode === "allRandom") {
            let flatList = [];
            for (let t in allParticipantsByTier) flatList = flatList.concat(allParticipantsByTier[t]);
            shuffle(flatList);
            teamA = flatList.slice(0, Math.ceil(flatList.length / 2));
            teamB = flatList.slice(Math.ceil(flatList.length / 2));
        } 
        else if (teamMode === "balance") {
            for (let t = 1; t <= 5; t++) {
                let tierList = shuffle([...allParticipantsByTier[t]]);
                tierList.forEach((player, idx) => {
                    if (idx % 2 === 0) {
                        if (teamA.length <= teamB.length) teamA.push(player); else teamB.push(player);
                    } else {
                        if (teamB.length <= teamA.length) teamB.push(player); else teamA.push(player);
                    }
                });
            }
        } 
        else if (teamMode === "leaderPick") {
            let validTiersForLeaders = [];
            for (let t = 1; t <= 5; t++) {
                if (allParticipantsByTier[t].length >= 2) validTiersForLeaders.push(t);
            }
            if (validTiersForLeaders.length === 0) {
                callParentMacAlert("선출 실패", "2명 이상 등록된 티어가 없어 팀장을 선출할 수 없습니다.");
                return;
            }
            let chosenTier = validTiersForLeaders[Math.floor(Math.random() * validTiersForLeaders.length)];
            let tierPool = shuffle([...allParticipantsByTier[chosenTier]]);
            
            teamA.push(tierPool[0] + " (👑)");
            teamB.push(tierPool[1] + " (👑)");

            for (let t = 1; t <= 5; t++) {
                allParticipantsByTier[t].forEach(p => {
                    if (p !== tierPool[0] && p !== tierPool[1]) remainPool.push(p);
                });
            }
            shuffle(remainPool);
        }

        db.child("teamResults").update({
            teamA: teamA,
            teamB: teamB,
            remainPool: remainPool,
            isLeaderPick: (teamMode === "leaderPick"),
            teamSeed: Math.random()
        });
    }

    function runSaMapAssignment() {
        let mapMode = document.getElementById("mapAssignMode").value;
        let chosenMaps = [];

        if (mapMode === "original") {
            chosenMaps = [...originalMaps];
        } 
        else if (mapMode === "allRandom") {
            let pool = shuffle([...mapPool]);
            chosenMaps = pool.slice(0, 7);
        } 
        else if (mapMode === "custom") {
            let fixedPart = [...selectedCustomMaps];
            let restPool = mapPool.filter(m => !fixedPart.includes(m));
            shuffle(restPool);
            let needed = 7 - fixedPart.length;
            let randomPart = restPool.slice(0, needed);
            chosenMaps = shuffle(fixedPart.concat(randomPart));
        }

        db.child("mapResults").update({
            maps: chosenMaps,
            mapSeed: Math.random()
        });
    }

    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
    function dragLeave(e) { e.currentTarget.classList.remove("drag-over"); }

    function dropPlayer(e, targetTeam) {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");
        let name = e.dataTransfer.getData("text/plain");
        if (!name) return;

        db.once("value", (snapshot) => {
            let data = snapshot.val();
            if (!data || !data.teamResults) return;
            let res = data.teamResults;

            if (res.remainPool) {
                let idx = res.remainPool.indexOf(name);
                if (idx > -1) res.remainPool.splice(idx, 1);
            }
            if (targetTeam === 'teamA') {
                if(!res.teamA) res.teamA = []; res.teamA.push(name);
            } else {
                if(!res.teamB) res.teamB = []; res.teamB.push(name);
            }
            db.child("teamResults").update(res);
        });
    }

    // 🎰 [블루 서치 점멸 추첨 가챠 시퀀스]
    async function triggerBorderFlashGacha(combinedData) {
        const overlay = document.getElementById("gachaCinemaOverlay");
        const container = document.getElementById("cinemaSlotsContainer");
        const titleTrack = document.getElementById("cinemaTitleTrack");
        
        overlay.style.display = "flex";

        for (let matchIdx = 0; matchIdx < 7; matchIdx++) {
            titleTrack.innerHTML = `SELECTING MATCH <span>0${matchIdx + 1}</span> MAP...`;
            container.innerHTML = "";

            let finalSelectedMap = combinedData.maps[matchIdx];

            let currentCandidates = [finalSelectedMap];
            let filterPool = mapPool.filter(m => m !== finalSelectedMap);
            shuffle(filterPool);
            for(let i=0; i<3; i++) currentCandidates.push(filterPool[i]);
            shuffle(currentCandidates); 

            let correctSlotIndex = currentCandidates.indexOf(finalSelectedMap);

            currentCandidates.forEach((mapName, idx) => {
                let card = document.createElement("div");
                card.className = "cinema-slot-box";
                card.id = `c-slot-${idx}`;
                card.innerHTML = `
                    <div class="cinema-view-frame">
                        <div class="cinema-confirm-tag" id="c-tag-${idx}">확정</div>
                        <div class="map-mock-img" style="background: rgba(255,255,255,0.03);"></div>
                        <span>[ MAP IMAGE ]</span>
                    </div>
                    <div class="cinema-name-plate">${mapName}</div>
                `;
                container.appendChild(card);
            });

            let flashState = false;
            let flashInterval = setInterval(() => {
                for(let idx=0; idx<4; idx++) {
                    let box = document.getElementById(`c-slot-${idx}`);
                    if(box) {
                        if(flashState) box.classList.add("flash-highlight");
                        else box.classList.remove("flash-highlight");
                    }
                }
                flashState = !flashState;
            }, 220); 

            await new Promise(r => setTimeout(r, 1760));
            clearInterval(flashInterval);

            for(let idx=0; idx<4; idx++) {
                let box = document.getElementById(`c-slot-${idx}`);
                if(box) {
                    box.classList.remove("flash-highlight");
                    if (idx === correctSlotIndex) {
                        box.classList.add("confirmed-jackpot");
                        document.getElementById(`c-tag-${idx}`).style.display = "flex";
                    } else {
                        box.classList.add("dimmed");
                    }
                }
            }

            await new Promise(r => setTimeout(r, 900));
        }

        overlay.style.display = "none";
        renderStaticResultBoard(combinedData);
    }

    // 🔴 [오류 완벽 수선]: penultimate 버그 및 공백 차단용 가이드 마운트 완료
    function renderStaticResultBoard(combinedData) {
        if ((combinedData.teamA && combinedData.teamA.length > 0) || (combinedData.maps && combinedData.maps.length > 0)) {
            document.getElementById("placeholderText").style.display = "none";
        } else {
            clearResultsUI();
            return;
        }
        
        const blueList = document.getElementById("blueTeamList");
        const redList = document.getElementById("redTeamList");
        blueList.innerHTML = ""; redList.innerHTML = "";
        
        if(combinedData.teamA && combinedData.teamA.length > 0) {
            combinedData.teamA.forEach(p => blueList.innerHTML += `<div class="member-badge">${p}</div>`);
            if (combinedData.isLeaderPick && combinedData.teamA[0] && combinedData.teamB[0]) {
                document.getElementById("blueTeamHeader").innerText = combinedData.teamA[0].replace(" (👑)", "") + "팀";
                document.getElementById("redTeamHeader").innerText = combinedData.teamB[0].replace(" (👑)", "") + "팀";
            } else {
                document.getElementById("blueTeamHeader").innerText = "A 팀 (" + combinedData.teamA.length + "명)";
                document.getElementById("redTeamHeader").innerText = "B 팀 (" + combinedData.teamB.length + "명)";
            }
            document.getElementById("teamBoardZone").style.display = "grid";
        } else {
            document.getElementById("teamBoardZone").style.display = "none";
        }

        if(combinedData.teamB && combinedData.teamB.length > 0) {
            combinedData.teamB.forEach(p => redList.innerHTML += `<div class="member-badge">${p}</div>`);
        }

        const poolZone = document.getElementById("leaderPickPoolZone");
        const poolChipsWrap = document.getElementById("poolChipsWrap");
        poolChipsWrap.innerHTML = "";
        
        if (combinedData.isLeaderPick && combinedData.remainPool && combinedData.remainPool.length > 0) {
            combinedData.remainPool.forEach(p => {
                let chip = document.createElement("div");
                chip.className = "pool-player-chip"; chip.innerText = p; chip.draggable = true;
                chip.ondragstart = (e) => { e.dataTransfer.setData("text/plain", p); };
                poolChipsWrap.appendChild(chip);
            });
            poolZone.style.display = "flex";
        } else {
            poolZone.style.display = "none";
        }

        const staticBinder = document.getElementById("staticRowBinder");
        staticBinder.innerHTML = "";

        if (combinedData.maps && combinedData.maps.length > 0) {
            document.getElementById("mapStaticResultBoard").style.display = "flex";
            combinedData.maps.forEach((map, idx) => {
                staticBinder.innerHTML += `
                    <div class="static-map-card">
                        <div class="card-num">0${idx+1} SET</div>
                        <div>${map}</div>
                    </div>
                `;
            });
        } else {
            document.getElementById("mapStaticResultBoard").style.display = "none";
        }
    }
</script>
